<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorkDesk — Timeline</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/themes.css">
<style>
/* ── TIMELINE PAGE ── */
.tl-header-row {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.tl-page-title {
  font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.tl-new-btn {
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:20px;border:none;
  background:var(--neon);color:#0c0c0f;
  font-family:var(--sans);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.tl-new-btn:active { transform:scale(.96) }

/* ── PROJECT CARD ── */
.tl-project {
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--rr);margin-bottom:12px;
  overflow:hidden;box-shadow:var(--shadow-card);
  border-left:4px solid;
}
.tl-project-hd {
  padding:14px 14px 12px;
}
.tl-project-top {
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:10px;gap:8px;
}
.tl-project-name {
  font-size:15px;font-weight:800;color:var(--text);
  letter-spacing:-.01em;line-height:1.2;flex:1;
}
.tl-project-dates {
  font-size:10px;color:var(--text3);font-weight:600;
  text-align:right;flex-shrink:0;line-height:1.5;
}
.tl-project-menu {
  background:none;border:none;color:var(--text3);
  font-size:18px;cursor:pointer;padding:0 0 0 6px;line-height:1;
  -webkit-tap-highlight-color:transparent;
}

/* ── DUAL PROGRESS ── */
.tl-dual-progress { display:flex;flex-direction:column;gap:7px }
.tl-prog-row { display:flex;align-items:center;gap:8px }
.tl-prog-label {
  font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;width:58px;flex-shrink:0;
}
.tl-prog-bar-bg {
  flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;
}
.tl-prog-bar-fill {
  height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);
}
.tl-prog-pct {
  font-family:var(--mono);font-size:11px;font-weight:500;
  width:32px;text-align:right;flex-shrink:0;
}
.tl-status-row {
  display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;
}
.tl-stat-chip {
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;
  background:var(--bg3);color:var(--text2);border:1px solid var(--border);
}

/* ── GANTT — EXCEL STYLE ── */
.tl-gantt-wrap {
  border-top:2px solid var(--border2);
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  position:relative;
}
.tl-gantt-wrap::-webkit-scrollbar { height:5px }
.tl-gantt-wrap::-webkit-scrollbar-thumb { background:var(--border2);border-radius:3px }
.tl-gantt-table {
  width:100%;border-collapse:collapse;min-width:600px;
  font-family:var(--sans);
}
/* Header rows */
.tl-gh-month td, .tl-gh-month-cell {
  font-size:10px;font-weight:700;color:var(--text);
  text-align:center;padding:5px 4px;
  background:var(--bg3);border:1px solid var(--border2);
  text-transform:uppercase;letter-spacing:.06em;
}
.tl-gh-week td {
  font-size:9px;color:var(--text3);font-weight:600;
  text-align:center;padding:3px 2px;
  background:var(--bg3);border:1px solid var(--border2);
  white-space:nowrap;
}
/* Task rows */
.tl-gt-row td {
  border:1px solid var(--border);height:32px;padding:0;
  vertical-align:middle;
}
.tl-gt-row:hover .tl-gt-name-cell { background:var(--bg3) }
.tl-gt-name-cell {
  padding:0 10px;font-size:11px;font-weight:600;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:180px;min-width:160px;
  background:var(--bg2);position:sticky;left:0;z-index:2;
  cursor:pointer;transition:background .1s;
  border-right:2px solid var(--border2) !important;
}
.tl-gt-name-cell.done { color:var(--text3);text-decoration:line-through }
.tl-gt-name-cell:hover { background:var(--bg3) }
.tl-gt-cell {
  position:relative;min-width:28px;
  background:var(--bg2);
}
.tl-gt-cell.weekend { background:var(--bg3) }
.tl-gt-cell.today-col { background:rgba(255,69,58,.04);border-left:1.5px solid rgba(255,69,58,.5) !important }
.tl-bar-cell {
  position:absolute;top:4px;bottom:4px;left:0;right:0;
  border-radius:3px;cursor:pointer;
  transition:filter .12s, transform .12s;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;
  overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.tl-bar-cell:hover { filter:brightness(1.12);transform:scaleY(1.05) }
.tl-bar-cell.bar-start { border-radius:3px 0 0 3px;left:2px }
.tl-bar-cell.bar-mid   { border-radius:0;left:0;right:0 }
.tl-bar-cell.bar-end   { border-radius:0 3px 3px 0;right:2px }
.tl-bar-cell.bar-single { border-radius:3px;left:2px;right:2px }
/* Today marker */
.tl-today-marker {
  position:absolute;top:0;bottom:0;left:50%;width:2px;
  background:var(--red);pointer-events:none;z-index:3;
}
/* Row status stripe */
.tl-gt-row.done-row .tl-gt-cell { background:rgba(52,199,89,.03) }
.tl-gt-row.onhold-row .tl-gt-cell { background:rgba(94,92,230,.03) }

/* Task detail drawer */
.tl-drawer {
  position:fixed;right:0;top:0;bottom:0;width:320px;z-index:600;
  background:var(--panel);border-left:1px solid var(--border2);
  box-shadow:-8px 0 32px rgba(0,0,0,.35);
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;overflow:hidden;
}
.tl-drawer.open { transform:translateX(0) }
.tl-drawer-hd {
  display:flex;align-items:center;justify-content:space-between;
  padding:16px;border-bottom:1px solid var(--border2);flex-shrink:0;
}
.tl-drawer-title { font-size:15px;font-weight:800;color:var(--text);flex:1;padding-right:8px }
.tl-drawer-close {
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:4px 12px;cursor:pointer;
  font-family:var(--sans);font-size:11px;font-weight:700;color:var(--text2);
}
.tl-drawer-body { padding:16px;overflow-y:auto;flex:1 }
.tl-drawer-row { margin-bottom:14px }
.tl-drawer-label {
  font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;
}
.tl-drawer-val { font-size:13px;color:var(--text);font-weight:500 }
.tl-drawer-actions {
  padding:12px 16px;border-top:1px solid var(--border2);
  display:flex;flex-direction:column;gap:8px;flex-shrink:0;
}
.tl-drawer-btn {
  width:100%;padding:10px;border-radius:var(--r);border:none;
  font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;
  transition:all .15s;
}
.tl-drawer-btn.primary { background:var(--neon);color:#0c0c0f }
.tl-drawer-btn.success { background:var(--green);color:#0c0c0f }
.tl-drawer-btn.hold    { background:rgba(94,92,230,.15);color:var(--purple);border:1px solid rgba(94,92,230,.3) }
.tl-drawer-btn.danger  { background:rgba(255,69,58,.1);color:var(--red);border:1px solid rgba(255,69,58,.25) }
.tl-drawer-btn.secondary { background:var(--bg3);color:var(--text2);border:1px solid var(--border2) }
.tl-drawer-btn:active { transform:scale(.98) }

/* Export btn */
.tl-export-btn {
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:20px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--text2);font-family:var(--sans);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;
}
.tl-export-btn:hover { border-color:var(--green);color:var(--green) }

/* ── PROJECT NOTES ── */
.tl-notes-section {
  border-top:1px solid var(--border);
  padding:12px 14px;
}
.tl-notes-hd {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.tl-notes-title {
  font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;
  display:flex;align-items:center;gap:6px;
}
.tl-notes-toggle {
  font-size:10px;color:var(--text3);transition:transform .2s;
}
.tl-notes-toggle.open { transform:rotate(180deg) }
.tl-notes-body { display:none }
.tl-notes-body.open { display:block }
.tl-note-item {
  display:flex;gap:8px;padding:7px 0;
  border-bottom:1px solid var(--border);
}
.tl-note-item:last-of-type { border-bottom:none }
.tl-note-av {
  width:24px;height:24px;border-radius:50%;flex-shrink:0;
  background:rgba(10,132,255,.1);border:1px solid rgba(10,132,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:var(--neon);
}
.tl-note-content { flex:1;min-width:0 }
.tl-note-author { font-size:10px;font-weight:700;color:var(--neon);margin-bottom:2px }
.tl-note-text { font-size:12px;color:var(--text2);line-height:1.5;white-space:pre-wrap }
.tl-note-time { font-size:9px;color:var(--text3);margin-top:2px }
.tl-note-empty { font-size:12px;color:var(--text3);font-style:italic;padding:4px 0 8px }
.tl-notes-input-row {
  display:flex;gap:8px;margin-top:10px;align-items:flex-end;
}
.tl-note-inp {
  flex:1;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:8px 11px;color:var(--text);
  font-family:var(--sans);font-size:13px;resize:none;
  outline:none;min-height:36px;max-height:80px;line-height:1.4;
  transition:border-color .15s;
}
.tl-note-inp:focus { border-color:rgba(10,132,255,.4) }
.tl-note-send {
  width:34px;height:34px;border-radius:10px;border:none;
  background:var(--neon);color:#fff;font-size:15px;
  cursor:pointer;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;transition:all .15s;
}
.tl-note-send:active { transform:scale(.94) }

/* ── MOBILE GANTT ── */
.tl-gantt-toggle {
  display:none;
  width:100%;padding:8px 14px;
  border:none;background:var(--bg3);
  color:var(--text2);font-family:var(--sans);
  font-size:11px;font-weight:700;cursor:pointer;
  border-top:1px solid var(--border);
  text-align:left;
}
@media (max-width:600px) {
  .tl-gantt-toggle { display:block }
  .tl-gantt-wrap { display:none }
  .tl-gantt-wrap.mobile-open { display:block }
}

/* ── ADD TASK ROW ── */
.tl-add-task {
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-top:1px solid var(--border);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:background .12s;
}
.tl-add-task:hover { background:var(--bg3) }
.tl-add-task-icon {
  width:22px;height:22px;border-radius:6px;
  background:rgba(10,132,255,.1);border:1px dashed rgba(10,132,255,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--neon);flex-shrink:0;
}
.tl-add-task-label { font-size:12px;color:var(--text3);font-weight:600 }

/* ── MODALS ── */
.tl-modal {
  position:fixed;inset:0;z-index:500;
  display:none;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
}
.tl-modal.open { display:flex }
.tl-modal-box {
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--rr) var(--rr) 0 0;
  padding:20px 16px calc(env(safe-area-inset-bottom,0px) + 24px);
  width:100%;max-width:680px;
  max-height:88vh;overflow-y:auto;
  animation:sheet-up .22s ease-out;
}
@keyframes sheet-up {
  from{transform:translateY(20px);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.tl-modal-title {
  font-size:16px;font-weight:800;color:var(--text);
  margin-bottom:16px;display:flex;align-items:center;
  justify-content:space-between;
}
.tl-close-btn {
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:4px 12px;cursor:pointer;
  font-family:var(--sans);font-size:11px;font-weight:700;
  color:var(--text2);
}
.tl-field-label {
  font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:6px;margin-top:14px;
}
.tl-field-label:first-of-type { margin-top:0 }
.tl-field-inp {
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r);padding:10px 12px;color:var(--text);
  font-family:var(--sans);font-size:14px;outline:none;
  transition:border-color .15s;
}
.tl-field-inp:focus { border-color:rgba(10,132,255,.4) }
.tl-date-row { display:flex;gap:8px }
.tl-date-row .tl-field-inp { flex:1 }
.tl-color-row { display:flex;gap:8px;margin-top:6px }
.tl-color-chip {
  width:28px;height:28px;border-radius:8px;cursor:pointer;
  border:2px solid transparent;transition:all .12s;flex-shrink:0;
}
.tl-color-chip.sel { border-color:var(--text);transform:scale(1.15) }
.tl-member-chips { display:flex;flex-wrap:wrap;gap:6px;margin-top:6px }
.tl-member-chip {
  padding:5px 11px;border-radius:20px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--text2);font-family:var(--sans);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;
}
.tl-member-chip.sel {
  background:rgba(94,92,230,.1);border-color:rgba(94,92,230,.35);color:var(--purple);
}
.tl-modal-btns { display:flex;gap:8px;margin-top:18px }
.tl-modal-save {
  flex:1;padding:11px;border-radius:var(--r);border:none;
  background:var(--neon);color:#0c0c0f;
  font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;
}
.tl-modal-cancel {
  padding:11px 18px;border-radius:var(--r);
  border:1px solid var(--border2);background:none;
  color:var(--text2);font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;
}
.tl-modal-delete {
  padding:11px 14px;border-radius:var(--r);
  border:1px solid rgba(255,69,58,.3);background:none;
  color:var(--red);font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;
}

/* ── EMPTY ── */
.tl-empty {
  text-align:center;padding:48px 16px;color:var(--text3);
}
.tl-empty-icon { font-size:40px;margin-bottom:12px;opacity:.3 }
.tl-empty-title { font-size:15px;font-weight:700;margin-bottom:6px }
.tl-empty-sub { font-size:13px;line-height:1.5 }
</style>
</head>
<body>

<!-- SheetJS for Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- TASK DETAIL DRAWER -->
<div class="tl-drawer" id="tl-drawer">
  <div class="tl-drawer-hd">
    <div class="tl-drawer-title" id="drawer-title">Task Detail</div>
    <button class="tl-drawer-close" onclick="closeDrawer()">✕ Close</button>
  </div>
  <div class="tl-drawer-body" id="drawer-body"></div>
  <div class="tl-drawer-actions" id="drawer-actions"></div>
</div>
<div id="drawer-overlay" onclick="closeDrawer()"
  style="display:none;position:fixed;inset:0;z-index:599;background:rgba(0,0,0,.3)"></div>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <span class="brand-word"><span class="brand-work">Work</span><span class="brand-desk">desk</span></span>
    <span class="brand-dot"></span>
  </a>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleThemePanel()">🎨 Theme</button>
  </div>
</nav>

<div class="page" style="padding-top:14px;max-width:1100px;margin:0 auto">

  <div class="tl-header-row">
    <div class="tl-page-title">📅 Timeline</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="tl-export-btn" onclick="exportAllExcel()">⬇ Excel</button>
      <button class="tl-new-btn" onclick="openProjectModal()">＋ New Project</button>
    </div>
  </div>

  <div id="tl-list">
    <div id="tl-loader" class="tl-empty">
      <div class="loader"></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="bn-item"><span class="bn-icon">⊞</span><span class="bn-label">Dashboard</span></a>
  <a href="input.html" class="bn-item"><span class="bn-icon">＋</span><span class="bn-label">Input</span></a>
  <a href="report.html" class="bn-item"><span class="bn-icon">▤</span><span class="bn-label">Report</span></a>
  <a href="timeline.html" class="bn-item active"><span class="bn-icon">📅</span><span class="bn-label">Timeline</span></a>
  <a href="ideas.html" class="bn-item"><span class="bn-icon">💡</span><span class="bn-label">Ideas</span></a>
</nav>

<!-- PROJECT MODAL -->
<div class="tl-modal" id="proj-modal" onclick="if(event.target===this)closeProjModal()">
  <div class="tl-modal-box">
    <div class="tl-modal-title">
      <span id="proj-modal-title">📅 New Project</span>
      <button class="tl-close-btn" onclick="closeProjModal()">Cancel</button>
    </div>
    <div class="tl-field-label">Project Name *</div>
    <input class="tl-field-inp" id="proj-name" placeholder="e.g. SMF 2026, Brand Refresh…">
    <div class="tl-field-label">Date Range *</div>
    <div class="tl-date-row">
      <input type="date" class="tl-field-inp" id="proj-start" placeholder="Start">
      <input type="date" class="tl-field-inp" id="proj-end" placeholder="End">
    </div>
    <div class="tl-field-label">Colour</div>
    <div class="tl-color-row" id="proj-colors"></div>
    <div class="tl-modal-btns">
      <button class="tl-modal-cancel" id="proj-delete-btn" style="display:none" onclick="deleteProject()">🗑 Delete</button>
      <button class="tl-modal-save" onclick="saveProject()">✓ Save Project</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="tl-modal" id="task-modal" onclick="if(event.target===this)closeTaskModal()">
  <div class="tl-modal-box">
    <div class="tl-modal-title">
      <span id="task-modal-title">＋ Add Task</span>
      <button class="tl-close-btn" onclick="closeTaskModal()">Cancel</button>
    </div>
    <div class="tl-field-label">Task Name *</div>
    <input class="tl-field-inp" id="task-name" placeholder="e.g. Video Production, Email Campaign…">
    <div class="tl-field-label">Date Range *</div>
    <div class="tl-date-row">
      <input type="date" class="tl-field-inp" id="task-start">
      <input type="date" class="tl-field-inp" id="task-end">
    </div>
    <div class="tl-field-label">Assign Members</div>
    <div class="tl-member-chips" id="task-members"></div>
    <div class="tl-field-label">Priority</div>
    <div style="display:flex;gap:6px;margin-top:6px" id="task-priority-row">
      <button class="tl-member-chip" data-p="critical" onclick="selectTaskPriority(this)">🔴 Critical</button>
      <button class="tl-member-chip" data-p="high"     onclick="selectTaskPriority(this)">🟠 High</button>
      <button class="tl-member-chip sel" data-p="medium"  onclick="selectTaskPriority(this)">🔵 Medium</button>
      <button class="tl-member-chip" data-p="low"      onclick="selectTaskPriority(this)">🟢 Low</button>
    </div>
    <div class="tl-modal-btns">
      <button class="tl-modal-delete" id="task-delete-btn" style="display:none" onclick="deleteTask()">🗑</button>
      <button class="tl-modal-cancel" onclick="closeTaskModal()">Cancel</button>
      <button class="tl-modal-save" onclick="saveTask()">✓ Save Task</button>
    </div>
  </div>
</div>

<script type="module">
import { onUserReady, getMembers, addTask, updateTask, deleteTask as fbDeleteTask, WORKSPACE_ID } from './js/firebase.js';
import { initTheme, toggleThemePanel } from './js/theme.js';
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

initTheme();
window.toggleThemePanel = toggleThemePanel;

const db = getFirestore(getApps()[0]);

const taskDocRef = (pid,tid)=> doc(db, 'workspaces', WORKSPACE_ID, 'timeline_projects', pid, 'tasks', tid);

// ── STATE ──────────────────────────────────────────────────────────────────
let projects = [];
let wdTasks = []; // WorkDesk main tasks
let projectTasks = {}; // { projectId: [tasks] }
let allMembers = [];
let editingProjId = null;
let editingTaskId = null;
let editingTaskProjId = null;
let selectedTaskMembers = {};
let selectedTaskPriority = 'medium';
let selectedColor = '#0a84ff';
let unsubProjects = null;
let unsubTasks = {};
let unsubNotes = {};
let projectNotes = {};
let openNotesPanels = new Set();

const COLORS = ['#0a84ff','#34c759','#ff9f0a','#ff453a','#5e5ce6','#ff375f','#30d158','#64d2ff'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function parseDate(s){ return s ? new Date(s+'T00:00:00') : null; }
function fmtDate(s){
  if (!s) return '';
  const d = parseDate(s);
  return d.getDate()+' '+MONTHS[d.getMonth()];
}
function diffDays(a, b){ return Math.round((b-a)/(1000*60*60*24)); }
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── INIT ──────────────────────────────────────────────────────────────────
onUserReady(async () => {
  allMembers = await getMembers();
  loadProjects();
});

// WorkDesk main tasks collection
const wdTaskCol = () => collection(db, 'workspaces', WORKSPACE_ID, 'tasks');

function loadProjects() {
  const q = query(projCol(), orderBy('createdAt','asc'));
  unsubProjects = onSnapshot(q, snap => {
    projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    projects.forEach(p => {
      if (!unsubTasks[p.id]) {
        const tq = query(taskCol(p.id), orderBy('startDate','asc'));
        unsubTasks[p.id] = onSnapshot(tq, tsnap => {
          projectTasks[p.id] = tsnap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderAll();
        });
      }
      if (!unsubNotes[p.id]) {
        const nq = query(notesCol(p.id), orderBy('createdAt','asc'));
        unsubNotes[p.id] = onSnapshot(nq, nsnap => {
          projectNotes[p.id] = nsnap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderNotesFor(p.id);
        });
      }
    });
    renderAll();
    document.getElementById('tl-loader')?.remove();
  });

  // Also subscribe to main WorkDesk tasks — merge those matching project name
  onSnapshot(query(wdTaskCol(), orderBy('createdAt','desc')), snap => {
    wdTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  });
}

// ── RENDER ALL ────────────────────────────────────────────────────────────
function renderAll() {
  const el = document.getElementById('tl-list');
  if (!projects.length) {
    el.innerHTML = `<div class="tl-empty">
      <div class="tl-empty-icon">📅</div>
      <div class="tl-empty-title">No projects yet</div>
      <div class="tl-empty-sub">Tap + New Project to create your first timeline</div>
    </div>`;
    return;
  }
  el.innerHTML = projects.map(p => renderProject(p)).join('');
}

function renderProject(p) {
  // Merge timeline tasks + WorkDesk tasks that match this project name (no date = span full project)
  const tlTasks = projectTasks[p.id] || [];
  const tlTaskNames = tlTasks.map(t => (t.name||'').toLowerCase());
  const wdMatches = wdTasks.filter(t => {
    if (!t.project) return false;
    if (t.project.toLowerCase() !== (p.name||'').toLowerCase()) return false;
    if (t.fromTimeline) return false; // already in timeline
    if (tlTaskNames.includes((t.label||'').toLowerCase())) return false; // avoid dupes
    return true;
  }).map(t => ({
    id: 'wd-'+t.id,
    name: t.label || '',
    startDate: t.dueDate || p.startDate,
    endDate: t.taskDueDate || p.endDate,
    status: t.status || 'todo',
    members: t.members || [],
    priority: t.priority || 'medium',
    fromWorkDesk: true,
  }));
  const tasks = [...tlTasks, ...wdMatches];
  const color = p.color || '#0a84ff';
  const today = todayStr();
  const pStart = p.startDate, pEnd = p.endDate;
  const totalDays = diffDays(parseDate(pStart), parseDate(pEnd));
  const elapsedDays = Math.max(0, Math.min(totalDays, diffDays(parseDate(pStart), new Date())));
  const timePct = totalDays > 0 ? Math.round(elapsedDays/totalDays*100) : 0;
  const doneTasks = tasks.filter(t => t.status === 'done').length;
  const taskPct = tasks.length ? Math.round(doneTasks/tasks.length*100) : 0;
  const daysLeft = diffDays(new Date(), parseDate(pEnd));
  const isOverdue = daysLeft < 0;

  // Gantt
  const ganttHTML = renderGantt(p, tasks, color);

  return `<div class="tl-project" style="border-left-color:${color}">
    <div class="tl-project-hd">
      <div class="tl-project-top">
        <div class="tl-project-name">${esc(p.name)}</div>
        <div style="display:flex;align-items:center;gap:4px">
          <div class="tl-project-dates">${fmtDate(pStart)}<br>${fmtDate(pEnd)}</div>
          <button class="tl-project-menu" onclick="openProjectModal('${p.id}')">⋯</button>
        </div>
      </div>

      <!-- DUAL PROGRESS -->
      <div class="tl-dual-progress">
        <div class="tl-prog-row">
          <div class="tl-prog-label">Tasks</div>
          <div class="tl-prog-bar-bg">
            <div class="tl-prog-bar-fill" style="width:${taskPct}%;background:${color}"></div>
          </div>
          <div class="tl-prog-pct" style="color:${color}">${taskPct}%</div>
        </div>
        <div class="tl-prog-row">
          <div class="tl-prog-label">Time</div>
          <div class="tl-prog-bar-bg">
            <div class="tl-prog-bar-fill" style="width:${timePct}%;background:${isOverdue?'var(--red)':'var(--amber)'}"></div>
          </div>
          <div class="tl-prog-pct" style="color:${isOverdue?'var(--red)':'var(--amber)'}">
            ${isOverdue ? 'Overdue' : daysLeft+'d left'}
          </div>
        </div>
      </div>

      <!-- STATUS CHIPS -->
      <div class="tl-status-row">
        <span class="tl-stat-chip">📋 ${tasks.length} task${tasks.length!==1?'s':''}</span>
        <span class="tl-stat-chip">✅ ${doneTasks} done</span>
        ${tasks.length - doneTasks > 0 ? `<span class="tl-stat-chip">🔄 ${tasks.length-doneTasks} active</span>` : ''}
        ${isOverdue ? '<span class="tl-stat-chip" style="color:var(--red);border-color:rgba(255,69,58,.3)">⚠ Overdue</span>' : ''}
      </div>
    </div>

    <!-- GANTT -->
    ${ganttHTML}

    <!-- NOTES -->
    <div class="tl-notes-section">
      <div class="tl-notes-hd" onclick="toggleNotes('${p.id}')">
        <div class="tl-notes-title">
          💬 Project Notes
          <span id="note-count-${p.id}" style="color:var(--text3);font-weight:600"></span>
        </div>
        <span class="tl-notes-toggle" id="notes-toggle-${p.id}">▾</span>
      </div>
      <div class="tl-notes-body" id="notes-body-${p.id}">
        <div id="notes-list-${p.id}"><div class="tl-note-empty">No notes yet</div></div>
        <div class="tl-notes-input-row">
          <textarea class="tl-note-inp" id="note-inp-${p.id}"
            placeholder="Add a note, decision, or update…"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addProjectNote('${p.id}')}"
            rows="1"></textarea>
          <button class="tl-note-send" onclick="addProjectNote('${p.id}')">↑</button>
        </div>
      </div>
    </div>

    <!-- ADD TASK -->
    <div class="tl-add-task" onclick="openTaskModal('${p.id}')">
      <div class="tl-add-task-icon">＋</div>
      <div class="tl-add-task-label">Add task to timeline</div>
    </div>
  </div>`;
}

// ── EXCEL-STYLE GANTT ────────────────────────────────────────────────────
function renderGantt(p, tasks, color) {
  if (!tasks.length) return '<div style="padding:12px 14px;font-size:12px;color:var(--text3)">No tasks yet — tap ＋ below to add</div>';

  const pStart = parseDate(p.startDate);
  const pEnd   = parseDate(p.endDate);
  const today  = new Date();

  // Build array of days in project range
  const days = [];
  let d = new Date(pStart);
  while (d <= pEnd) {
    days.push(new Date(d));
    d.setDate(d.getDate()+1);
  }

  // Group days by month for header
  const months = [];
  days.forEach((day, i) => {
    const mo = day.getMonth();
    if (!months.length || months[months.length-1].month !== mo) {
      months.push({ month: mo, year: day.getFullYear(), label: MONTHS[mo], startIdx: i, count: 1 });
    } else {
      months[months.length-1].count++;
    }
  });

  // Week labels (every 7 days — show date)
  const CELL_W = Math.max(22, Math.min(36, Math.floor(900/days.length)));

  // Month header row
  const monthCells = months.map(m =>
    `<td colspan="${m.count}" class="tl-gh-month-cell" style="min-width:${m.count*CELL_W}px">
      ${m.label} ${m.year}
    </td>`
  ).join('');

  // Day header row — show day number, weekend highlighted
  const dayCells = days.map((day, i) => {
    const isWeekend = day.getDay()===0||day.getDay()===6;
    const isToday   = day.toDateString()===today.toDateString();
    const showLabel = CELL_W >= 22 && (i===0||day.getDate()===1||day.getDate()%5===0||isToday);
    return `<td style="min-width:${CELL_W}px;${isWeekend?'background:var(--bg4);':''};${isToday?'background:rgba(255,69,58,.08);border-bottom:2px solid var(--red);':''};
      font-size:8px;font-weight:${isToday?'800':'600'};color:${isToday?'var(--red)':'var(--text3)'};
      text-align:center;padding:2px 0;border:1px solid var(--border)">
      ${showLabel?day.getDate():''}
    </td>`;
  }).join('');

  // Task rows
  const taskRows = tasks.map(t => {
    const tStart = parseDate(t.startDate);
    const tEnd   = parseDate(t.endDate);
    if (!tStart || !tEnd) return '';
    const isDone   = t.status === 'done';
    const isOnhold = t.status === 'onhold';
    const barColor = isDone?'#34c759':isOnhold?'#5e5ce6':color;
    const rowClass = isDone?'done-row':isOnhold?'onhold-row':'';

    // Build cells — mark which days fall within the task
    const taskCells = days.map((day, i) => {
      const inRange  = day >= tStart && day <= tEnd;
      const isStart  = day.toDateString()===tStart.toDateString();
      const isEnd    = day.toDateString()===tEnd.toDateString();
      const isWknd   = day.getDay()===0||day.getDay()===6;
      const isTodayD = day.toDateString()===today.toDateString();

      if (inRange) {
        const radius = isStart&&isEnd?'3px' : isStart?'3px 0 0 3px' : isEnd?'0 3px 3px 0' : '0';
        const leftPad  = isStart?'2px':'0';
        const rightPad = isEnd?'2px':'0';
        return `<td style="min-width:${CELL_W}px;padding:0;border:1px solid var(--border);${isTodayD?'border-left:1.5px solid rgba(255,69,58,.5);':''}position:relative;">
          <div onclick="openDrawer('${p.id}','${t.id}')"
            style="position:absolute;top:4px;bottom:4px;left:${leftPad};right:${rightPad};
              background:${barColor};border-radius:${radius};cursor:pointer;
              transition:filter .1s;opacity:${isDone?.75:1};"
            onmouseover="this.style.filter='brightness(1.12)'"
            onmouseout="this.style.filter=''"
            title="${esc(t.name)}"></div>
        </td>`;
      }
      return `<td style="min-width:${CELL_W}px;background:${isWknd?'var(--bg4)':'var(--bg2)'};border:1px solid var(--border);${isTodayD?'border-left:1.5px solid rgba(255,69,58,.4);':''}"></td>`;
    }).join('');

    const pct = isDone?'✓':isOnhold?'⏸':'';

    return `<tr class="tl-gt-row ${rowClass}">
      <td class="tl-gt-name-cell${isDone?' done':''}"
        onclick="openDrawer('${p.id}','${t.id}')"
        title="${esc(t.name)}">
        ${pct?`<span style="color:${barColor};margin-right:4px;font-size:10px">${pct}</span>`:''}${esc(t.name)}
      </td>
      ${taskCells}
    </tr>`;
  }).join('');

  return `<button class="tl-gantt-toggle" onclick="toggleMobileGantt(this)">
    📊 Show Gantt Chart ▾
  </button>
  <div class="tl-gantt-wrap">
    <table class="tl-gantt-table">
      <colgroup><col style="width:180px;min-width:160px"></colgroup>
      <thead>
        <tr class="tl-gh-month">
          <td style="background:var(--bg3);border:1px solid var(--border2);font-size:10px;font-weight:700;color:var(--text3);padding:5px 10px">TASK</td>
          ${monthCells}
        </tr>
        <tr class="tl-gh-week">
          <td style="background:var(--bg3);border:1px solid var(--border2)"></td>
          ${dayCells}
        </tr>
      </thead>
      <tbody>${taskRows}</tbody>
    </table>
  </div>`;
}

// ── TASK DRAWER ───────────────────────────────────────────────────────────
let drawerProjId = null, drawerTaskId = null;

window.toggleMobileGantt = (btn) => {
  const wrap = btn.nextElementSibling;
  const isOpen = wrap.classList.toggle('mobile-open');
  btn.textContent = isOpen ? '📊 Hide Gantt ▴' : '📊 Show Gantt Chart ▾';
};

window.openDrawer = (projId, taskId) => {
  drawerProjId = projId;
  drawerTaskId = taskId;
  const proj  = projects.find(p => p.id === projId);
  const tasks = projectTasks[projId] || [];
  const t     = tasks.find(t => t.id === taskId);
  if (!t) return;

  const isDone   = t.status === 'done';
  const isOnhold = t.status === 'onhold';
  const color    = isDone?'#34c759':isOnhold?'#5e5ce6':(proj?.color||'#0a84ff');
  const members  = (t.members||[]).map(m=>m.name).join(', ') || '—';
  const priority = t.priority || 'medium';
  const prioColor = {critical:'var(--red)',high:'var(--amber)',medium:'var(--neon)',low:'var(--green)'}[priority];

  document.getElementById('drawer-title').textContent = t.name;
  document.getElementById('drawer-body').innerHTML = `
    <div class="tl-drawer-row">
      <div class="tl-drawer-label">Status</div>
      <div class="tl-drawer-val">
        <span style="color:${color};font-weight:700">
          ${isDone?'✅ Done':isOnhold?'⏸ On Hold':'🔄 Active'}
        </span>
      </div>
    </div>
    <div class="tl-drawer-row">
      <div class="tl-drawer-label">Project</div>
      <div class="tl-drawer-val">${esc(proj?.name||'')}</div>
    </div>
    <div class="tl-drawer-row">
      <div class="tl-drawer-label">Date Range</div>
      <div class="tl-drawer-val">${fmtDate(t.startDate)} → ${fmtDate(t.endDate)}</div>
    </div>
    <div class="tl-drawer-row">
      <div class="tl-drawer-label">Priority</div>
      <div class="tl-drawer-val" style="color:${prioColor};text-transform:capitalize">${priority}</div>
    </div>
    <div class="tl-drawer-row">
      <div class="tl-drawer-label">Assigned To</div>
      <div class="tl-drawer-val">${esc(members)}</div>
    </div>
    ${t.fromWorkDesk ? '<div style="font-size:10px;color:var(--text3);margin-top:8px">📋 Added from WorkDesk Input</div>' : ''}
  `;

  document.getElementById('drawer-actions').innerHTML = `
    ${!isDone ? `<button class="tl-drawer-btn success" onclick="setDrawerTaskDone()">✓ Mark as Done</button>` : `<button class="tl-drawer-btn secondary" onclick="setDrawerTaskStatus('todo')">↩ Reopen Task</button>`}
    ${!isOnhold && !isDone ? `<button class="tl-drawer-btn hold" onclick="setDrawerTaskStatus('onhold')">⏸ Put On Hold</button>` : ''}
    ${isOnhold ? `<button class="tl-drawer-btn secondary" onclick="setDrawerTaskStatus('todo')">▶ Resume Task</button>` : ''}
    ${!t.fromWorkDesk ? `<button class="tl-drawer-btn primary" onclick="openTaskModal('${projId}','${taskId}');closeDrawer()">✎ Edit Task</button>` : ''}
    ${!t.fromWorkDesk ? `<button class="tl-drawer-btn danger" onclick="deleteTaskFromDrawer('${projId}','${taskId}')">🗑 Delete</button>` : ''}
  `;

  document.getElementById('tl-drawer').classList.add('open');
  document.getElementById('drawer-overlay').style.display = '';
};

window.closeDrawer = () => {
  document.getElementById('tl-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').style.display = 'none';
};

window.setDrawerTaskDone = async () => {
  if (!drawerTaskId || !drawerProjId) return;
  const t = (projectTasks[drawerProjId]||[]).find(t=>t.id===drawerTaskId);
  if (!t) return;
  await updateDoc(taskDocRef(drawerProjId,drawerTaskId), {status:'done'});
  // Also update in WorkDesk tasks if linked
  toast('✅ Task marked done');
  closeDrawer();
};

window.setDrawerTaskStatus = async (status) => {
  if (!drawerTaskId || !drawerProjId) return;
  await updateDoc(taskDocRef(drawerProjId,drawerTaskId), {status});
  const labels={todo:'Moved to Active',onhold:'⏸ On Hold'};
  toast(labels[status]||'Updated');
  closeDrawer();
};

window.deleteTaskFromDrawer = async (projId, taskId) => {
  if (!confirm('Remove this task from the timeline?')) return;
  await deleteDoc(taskDocRef(projId, taskId));
  closeDrawer();
  toast('Task removed');
};

// ── PROJECT NOTES ────────────────────────────────────────────────────────
const MY_NAME_TL = localStorage.getItem('wd_myname') || 'Team';

window.toggleNotes = (projId) => {
  const body    = document.getElementById('notes-body-'+projId);
  const toggle  = document.getElementById('notes-toggle-'+projId);
  if (!body) return;
  const isOpen  = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  toggle?.classList.toggle('open', !isOpen);
  if (!isOpen) renderNotesFor(projId);
};

function renderNotesFor(projId) {
  const notes  = projectNotes[projId] || [];
  const listEl = document.getElementById('notes-list-'+projId);
  const cntEl  = document.getElementById('note-count-'+projId);
  if (cntEl) cntEl.textContent = notes.length ? `(${notes.length})` : '';
  if (!listEl) return;

  if (!notes.length) {
    listEl.innerHTML = '<div class="tl-note-empty">No notes yet — add the first one</div>';
    return;
  }

  listEl.innerHTML = notes.map(n => {
    const initials = (n.author||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const d = n.createdAt?.toDate ? n.createdAt.toDate() : new Date(n.createdAt||0);
    const timeStr = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' ' +
                    d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    return `<div class="tl-note-item">
      <div class="tl-note-av">${initials}</div>
      <div class="tl-note-content">
        <div class="tl-note-author">${esc(n.author||'Team')}</div>
        <div class="tl-note-text">${esc(n.text||'')}</div>
        <div class="tl-note-time">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
}

window.addProjectNote = async (projId) => {
  const inp  = document.getElementById('note-inp-'+projId);
  const text = inp?.value.trim();
  if (!text) return;
  inp.value = '';
  await addDoc(notesCol(projId), {
    text,
    author: MY_NAME_TL,
    createdAt: serverTimestamp(),
  });
  toast('Note added');
};

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────
window.exportAllExcel = () => {
  if (!window.XLSX) { toast('Excel library not loaded yet'); return; }
  const wb = XLSX.utils.book_new();

  projects.forEach(p => {
    const tasks = projectTasks[p.id] || [];
    const today = new Date();
    const pStart = parseDate(p.startDate), pEnd = parseDate(p.endDate);
    const totalDays = diffDays(pStart,pEnd)||1;
    const timePct = Math.round(Math.max(0,Math.min(100,diffDays(pStart,today)/totalDays*100)));
    const done = tasks.filter(t=>t.status==='done').length;
    const taskPct = tasks.length?Math.round(done/tasks.length*100):0;

    const rows = [
      [p.name],
      [`Period: ${p.startDate} to ${p.endDate}  |  Task completion: ${taskPct}%  |  Time elapsed: ${timePct}%`],
      [],
      ['Task Name','Start Date','End Date','Duration (days)','Assigned To','Priority','Status'],
      ...tasks.map(t => [
        t.name||'',
        t.startDate||'',
        t.endDate||'',
        t.startDate&&t.endDate ? diffDays(parseDate(t.startDate),parseDate(t.endDate)) : '',
        (t.members||[]).map(m=>m.name).join(', '),
        t.priority||'medium',
        t.status==='done'?'Done':t.status==='onhold'?'On Hold':t.status==='inprog'?'In Progress':'Todo',
      ]),
      [],
      [`Total tasks: ${tasks.length}`, `Done: ${done}`, `Completion: ${taskPct}%`],
    ];

    const ws = XLSX.utils.aoa_to_sheet(rows);

    // Column widths
    ws['!cols'] = [
      {wch:35},{wch:12},{wch:12},{wch:16},{wch:25},{wch:12},{wch:14}
    ];

    // Merge project name across columns
    ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:6}}];

    const sheetName = p.name.slice(0,30).replace(/[:\\/\?\*\[\]]/g,'_');
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  if (!projects.length) { toast('No projects to export'); return; }
  XLSX.writeFile(wb, `WorkDesk_Timeline_${todayStr()}.xlsx`);
  toast('📊 Excel exported!');
};

window.openProjectModal = (projId) => {
  editingProjId = projId || null;
  const modal = document.getElementById('proj-modal');
  const title = document.getElementById('proj-modal-title');
  const delBtn = document.getElementById('proj-delete-btn');

  // Render color chips

    `<div class="tl-color-chip${col===selectedColor?' sel':''}"
      style="background:${col}" onclick="selectColor('${col}',this)"></div>`
  ).join('');

  if (projId) {
    const p = projects.find(p => p.id === projId);
    if (!p) return;
    title.textContent = '✎ Edit Project';
    document.getElementById('proj-name').value  = p.name || '';
    document.getElementById('proj-start').value = p.startDate || '';
    document.getElementById('proj-end').value   = p.endDate || '';
    selectedColor = p.color || '#0a84ff';
    delBtn.style.display = '';
  } else {
    title.textContent = '📅 New Project';
    document.getElementById('proj-name').value  = '';
    document.getElementById('proj-start').value = '';
    document.getElementById('proj-end').value   = '';
    selectedColor = '#0a84ff';
    delBtn.style.display = 'none';
  }

  // Re-render colors with correct selection
  document.getElementById('proj-colors').innerHTML = COLORS.map(col =>
    `<div class="tl-color-chip${col===selectedColor?' sel':''}"
      style="background:${col}" onclick="selectColor('${col}',this)"></div>`
  ).join('');

  modal.classList.add('open');
  setTimeout(() => document.getElementById('proj-name').focus(), 200);
};

window.closeProjModal = () => {
  document.getElementById('proj-modal').classList.remove('open');
  editingProjId = null;
};

window.selectColor = (col, el) => {
  selectedColor = col;
  document.querySelectorAll('.tl-color-chip').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
};

window.saveProject = async () => {
  const name  = document.getElementById('proj-name').value.trim();
  const start = document.getElementById('proj-start').value;
  const end   = document.getElementById('proj-end').value;
  if (!name || !start || !end) { toast('Fill in name and dates'); return; }
  if (start >= end) { toast('End date must be after start date'); return; }

  if (editingProjId) {
    await updateDoc(projDoc(editingProjId), { name, startDate:start, endDate:end, color:selectedColor });
    toast('Project updated ✓');
  } else {
    await addDoc(projCol(), { name, startDate:start, endDate:end, color:selectedColor, createdAt:serverTimestamp() });
    toast('Project created ✓');
  }
  closeProjModal();
};

window.deleteProject = async () => {
  if (!editingProjId) return;
  if (!confirm('Delete this project and all its timeline tasks?')) return;
  // Delete all tasks first
  const tasks = projectTasks[editingProjId] || [];
  await Promise.all(tasks.map(t => deleteDoc(taskDocRef(editingProjId, t.id))));
  await deleteDoc(projDoc(editingProjId));
  if (unsubTasks[editingProjId]) { unsubTasks[editingProjId](); delete unsubTasks[editingProjId]; }
  delete projectTasks[editingProjId];
  closeProjModal();
  toast('Project deleted');
};

// ── TASK MODAL ────────────────────────────────────────────────────────────
window.openTaskModal = (projId, taskId) => {
  editingTaskProjId = projId;
  editingTaskId = taskId || null;
  selectedTaskMembers = {};
  selectedTaskPriority = 'medium';

  const modal = document.getElementById('task-modal');
  const title = document.getElementById('task-modal-title');
  const delBtn = document.getElementById('task-delete-btn');
  const proj = projects.find(p => p.id === projId);

  // Member chips
  document.getElementById('task-members').innerHTML = allMembers.map(m =>
    `<div class="tl-member-chip" id="tm-${m.id}" onclick="toggleTaskMember('${m.id}','${esc(m.name)}')">${esc(m.name)}</div>`
  ).join('');

  // Reset priority
  document.querySelectorAll('[data-p]').forEach(b => b.classList.toggle('sel', b.dataset.p === 'medium'));

  if (taskId) {
    const t = (projectTasks[projId]||[]).find(t => t.id === taskId);
    if (!t) return;
    title.textContent = '✎ Edit Task';
    document.getElementById('task-name').value  = t.name || '';
    document.getElementById('task-start').value = t.startDate || proj?.startDate || '';
    document.getElementById('task-end').value   = t.endDate   || proj?.endDate || '';
    selectedTaskPriority = t.priority || 'medium';
    // Pre-select members
    (t.members||[]).forEach(m => {
      selectedTaskMembers[m.id] = m;
      document.getElementById('tm-'+m.id)?.classList.add('sel');
    });
    // Pre-select priority
    document.querySelectorAll('[data-p]').forEach(b => b.classList.toggle('sel', b.dataset.p === selectedTaskPriority));
    delBtn.style.display = '';
  } else {
    title.textContent = '＋ Add Task';
    document.getElementById('task-name').value  = '';
    document.getElementById('task-start').value = proj?.startDate || '';
    document.getElementById('task-end').value   = proj?.endDate   || '';
    delBtn.style.display = 'none';
  }

  modal.classList.add('open');
  setTimeout(() => document.getElementById('task-name').focus(), 200);
};

window.closeTaskModal = () => {
  document.getElementById('task-modal').classList.remove('open');
  editingTaskId = editingTaskProjId = null;
};

window.toggleTaskMember = (id, name) => {
  if (selectedTaskMembers[id]) {
    delete selectedTaskMembers[id];
    document.getElementById('tm-'+id)?.classList.remove('sel');
  } else {
    selectedTaskMembers[id] = { id, name };
    document.getElementById('tm-'+id)?.classList.add('sel');
  }
};

window.selectTaskPriority = (btn) => {
  selectedTaskPriority = btn.dataset.p;
  document.querySelectorAll('[data-p]').forEach(b => b.classList.toggle('sel', b.dataset.p === selectedTaskPriority));
};

window.saveTask = async () => {
  const name  = document.getElementById('task-name').value.trim();
  const start = document.getElementById('task-start').value;
  const end   = document.getElementById('task-end').value;
  if (!name || !start || !end) { toast('Fill in task name and dates'); return; }

  const proj = projects.find(p => p.id === editingTaskProjId);
  const members = Object.values(selectedTaskMembers).map(m => ({ id:m.id, name:m.name }));
  const today = todayStr();

  const taskData = {
    name, startDate:start, endDate:end,
    members, priority: selectedTaskPriority,
    status: editingTaskId ? ((projectTasks[editingTaskProjId]||[]).find(t=>t.id===editingTaskId)?.status || 'todo') : 'todo',
    projectId: editingTaskProjId, projectName: proj?.name || '',
  };

  if (editingTaskId) {
    await updateDoc(taskDocRef(editingTaskProjId, editingTaskId), taskData);
    toast('Task updated ✓');
  } else {
    // Save to timeline
    await addDoc(taskCol(editingTaskProjId), { ...taskData, createdAt:serverTimestamp() });
    // Also push to WorkDesk tasks (one-way: timeline → workdesk)
    await addTask({
      label: name,
      project: proj?.name || '',
      priority: selectedTaskPriority,
      members,
      taskDueDate: end,
      dueDate: start,
      taskType: 'mbc',
      fromTimeline: true,
    });
    toast('Task added to timeline + WorkDesk ✓');
  }
  closeTaskModal();
};

window.deleteTask = async () => {
  if (!editingTaskId || !editingTaskProjId) return;
  if (!confirm('Remove this task from the timeline?')) return;
  await deleteDoc(taskDocRef(editingTaskProjId, editingTaskId));
  closeTaskModal();
  toast('Task removed from timeline');
};

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg) {
  let el = document.getElementById('tl-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'tl-toast';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = 'toast show';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
</body>
</html>
