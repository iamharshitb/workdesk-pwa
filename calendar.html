<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorkDesk — Calendar</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/themes.css">
<style>
/* ── CALENDAR GRID ── */
.cal-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--rr);margin-bottom:12px;
  box-shadow:var(--shadow-card);
}
.cal-month-label {
  font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.01em;
}
.cal-nav-btn {
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--border2);background:var(--bg2);
  color:var(--text2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.cal-nav-btn:hover { border-color:var(--neon);color:var(--neon); }

.cal-grid {
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--rr);overflow:hidden;
  box-shadow:var(--shadow-card);margin-bottom:12px;
}
.cal-dow-row {
  display:grid;grid-template-columns:repeat(7,1fr);
  border-bottom:1px solid var(--border);
}
.cal-dow {
  text-align:center;padding:8px 0;
  font-size:10px;font-weight:700;color:var(--text2);
  letter-spacing:.08em;text-transform:uppercase;
}
.cal-days {
  display:grid;grid-template-columns:repeat(7,1fr);
}
.cal-day {
  min-height:90px;padding:6px 5px;
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;
  position:relative;
}
.cal-day:nth-child(7n) { border-right:none }
.cal-day:hover { background:var(--bg3) }
.cal-day.today { background:rgba(0,229,184,.06) }
.cal-day.today .cal-day-num { color:var(--neon);font-weight:800 }
.cal-day.other-month { opacity:.35 }
.cal-day.has-events { background:rgba(157,126,255,.05) }
.cal-day-num {
  font-size:13px;font-weight:600;color:var(--text2);
  margin-bottom:4px;line-height:1;
}
.cal-event-dot {
  display:block;
  font-size:10px;font-weight:700;
  padding:3px 6px;border-radius:5px;
  margin-bottom:3px;
  max-width:100%;
  line-height:1.3;
  overflow:hidden;
}
.dot-video      { background:rgba(248,113,113,.15);color:#f87171; }
.dot-blog       { background:rgba(96,165,250,.15);color:#60a5fa; }
.dot-email      { background:rgba(251,191,36,.15);color:#fbbf24; }
.dot-event      { background:rgba(52,211,153,.15);color:#34d399; }
.dot-social     { background:rgba(167,139,250,.15);color:#a78bfa; }
.dot-livestream { background:rgba(249,115,22,.15);color:#f97316; }
.dot-other      { background:rgba(107,114,128,.15);color:#9ca3af; }

/* ── EVENT MODAL ── */
.event-modal-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:200;display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.event-modal-overlay.open { display:flex }
.event-modal {
  background:var(--panel);
  border:1.5px solid var(--border2);
  border-radius:20px 20px 0 0;
  padding:20px 16px 36px;
  width:100%;max-width:500px;
  box-shadow:0 -8px 40px rgba(0,0,0,.4);
  max-height:85vh;overflow-y:auto;
  animation:slide-up .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-drag-handle {
  width:36px;height:4px;border-radius:2px;
  background:var(--border2);margin:0 auto 16px;
}
.modal-date-label {
  font-size:15px;font-weight:800;color:var(--text);
  margin-bottom:16px;
}
/* Existing events list */
.event-list { margin-bottom:16px }
.event-item {
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-radius:12px;margin-bottom:8px;
  background:var(--bg2);border:1px solid var(--border2);
}
.event-item-color { width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px }
.event-item-body  { flex:1;min-width:0 }
.event-item-subject { font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px }
.event-item-meta    { font-size:11px;color:var(--text2) }
.event-item-del {
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  border:1px solid var(--border2);background:none;
  color:var(--text3);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.event-item-del:hover { border-color:rgba(255,58,94,.4);color:var(--red) }

/* Add event form */
.add-event-form { border-top:1px solid var(--border);padding-top:14px }
.form-label {
  font-size:11px;font-weight:700;color:var(--text2);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;margin-top:12px;
}
.form-input {
  width:100%;background:var(--bg2);border:1.5px solid var(--border2);
  border-radius:10px;padding:10px 12px;color:var(--text);
  font-family:var(--sans);font-size:14px;font-weight:500;
  outline:none;transition:border-color .15s;
}
.form-input:focus { border-color:var(--neon) }
.form-input::placeholder { color:var(--text3) }
.type-pills { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px }
.type-pill {
  padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;
  border:1.5px solid var(--border2);background:var(--bg2);
  color:var(--text2);cursor:pointer;transition:all .15s;
}
.type-pill.selected { border-color:var(--neon);background:rgba(0,229,184,.08);color:var(--neon) }
.add-btn {
  width:100%;padding:12px;border-radius:12px;border:none;
  background:var(--neon);color:var(--bg);
  font-family:var(--sans);font-size:14px;font-weight:800;
  cursor:pointer;margin-top:14px;
  box-shadow:0 4px 0 rgba(0,0,0,.2),0 2px 12px rgba(0,229,184,.2);
  transition:all .15s;
}
.add-btn:hover { filter:brightness(1.08);transform:translateY(-1px) }
.add-btn:active { transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.2) }

/* ── STATUS BADGES ── */
.status-pill {
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:800;cursor:pointer;
  border:1.5px solid transparent;transition:all .15s;
  user-select:none;
}
.status-planned  { background:rgba(96,165,250,.12);color:#60a5fa;border-color:rgba(96,165,250,.3) }
.status-sent     { background:rgba(52,211,153,.12);color:#34d399;border-color:rgba(52,211,153,.3) }
.status-delayed  { background:rgba(248,113,113,.12);color:#f87171;border-color:rgba(248,113,113,.3) }
.status-pill:hover { filter:brightness(1.2) }
.event-item-status { display:flex;align-items:center;gap:6px;margin-top:6px }

/* ── YEAR HISTORY ── */
.history-toggle {
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--rr);margin-top:12px;
  cursor:pointer;transition:all .15s;
  box-shadow:var(--shadow-card);
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.history-toggle:hover { border-color:var(--neon2) }
.history-toggle-label {
  font-size:13px;font-weight:700;color:var(--text2);
  display:flex;align-items:center;gap:8px;
}
.history-toggle-count {
  font-size:11px;padding:2px 8px;border-radius:20px;
  background:rgba(157,126,255,.12);color:var(--purple);
  border:1px solid rgba(157,126,255,.25);font-weight:700;
}
.history-arrow { font-size:12px;color:var(--text3);transition:transform .2s }
.history-arrow.open { transform:rotate(180deg) }
.history-body {
  display:none;
  background:var(--panel);border:1px solid var(--border2);
  border-top:none;border-radius:0 0 var(--rr) var(--rr);
  overflow:hidden;margin-top:-4px;
  margin-bottom:16px;
  box-shadow:var(--shadow-card);
}
.history-body.open { display:block }
.history-month-group {
  border-bottom:1px solid var(--border);
}
.history-month-label {
  font-size:11px;font-weight:800;color:var(--text2);
  letter-spacing:.08em;text-transform:uppercase;
  padding:8px 14px;background:var(--bg2);
}
.history-item {
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;border-bottom:1px solid var(--border);
}
.history-item:last-child { border-bottom:none }
.history-item-date {
  font-size:11px;font-weight:700;color:var(--text3);
  min-width:52px;flex-shrink:0;
}
.history-item-type {
  font-size:10px;font-weight:800;padding:2px 7px;
  border-radius:4px;flex-shrink:0;
}
.history-item-subject {
  font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.history-item-status {
  font-size:10px;font-weight:700;flex-shrink:0;
}
.history-empty {
  padding:20px;text-align:center;
  font-size:13px;color:var(--text3);font-weight:600;
}

/* ── LEGEND ── */
.cal-legend {
  display:flex;flex-wrap:wrap;gap:6px;
  padding:12px 14px;
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--rr);margin-bottom:12px;
  box-shadow:var(--shadow-card);
}
.legend-item {
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;color:var(--text2);
}
.legend-dot { width:8px;height:8px;border-radius:2px }
</style>
</head>

    <span class="bn-icon">＋</span><span class="bn-label">Input</span>
  </a>
  <a href="report.html" class="bn-item">
    <span class="bn-icon">▤</span><span class="bn-label">Report</span>

    <span class="bn-icon">📅</span><span class="bn-label">Calendar</span>
  </a>

<script type="module">
import { initTheme, toggleThemePanel } from './js/theme.js';
import { getMuted, toggleMute, initAudio } from './js/sounds.js';
import { onUserReady, saveCalendarData, onCalendarDataChanged } from './js/firebase.js';

initTheme(); window.toggleThemePanel = toggleThemePanel;
initAudio();
function updateMuteBtn(){const b=document.getElementById('mute-btn');if(b)b.textContent=getMuted()?'🔇':'🔊';}
window.handleMuteToggle=()=>{toggleMute();updateMuteBtn();}
updateMuteBtn();

// ── STATE ──────────────────────────────────────────────────────────────────
let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth(); // 0-indexed
let events    = {}; // { 'YYYY-MM-DD': [ { subject, type, people, id } ] }
let selectedDate = null;
let selectedType = null;

const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const TYPE_COLORS = {
  Video:'dot-video', Blog:'dot-blog', Email:'dot-email',
  Event:'dot-event', Social:'dot-social', Livestream:'dot-livestream', Other:'dot-other'
};
const TYPE_HEX = {
  Video:'#f87171', Blog:'#60a5fa', Email:'#fbbf24',
  Event:'#34d399', Social:'#a78bfa', Livestream:'#f97316', Other:'#9ca3af'
};

// ── FIRESTORE SYNC ─────────────────────────────────────────────────────────
onUserReady(async () => {
  // Render immediately with empty state so calendar grid shows on load
  renderCalendar();

  // Then subscribe — will re-render when Firestore data arrives
  onCalendarDataChanged((events_data) => {
    // events_data is already parsed by onCalendarDataChanged
    if (typeof events_data === 'object' && events_data !== null) {
      events = events_data;
    }
    renderCalendar();
  });
});

async function saveCalendar() {
  try {
    await saveCalendarData(events);
    console.log('Calendar saved OK:', Object.keys(events).length, 'dates');
  } catch(e) {
    console.error('Calendar save failed:', e);
    toast('Save failed', 'err');
  }
}

// ── RENDER CALENDAR ────────────────────────────────────────────────────────
function renderCalendar() {
  const now   = new Date();
  const label = MONTHS[viewMonth] + ' ' + viewYear;
  document.getElementById('cal-month-label').textContent = label;
  // Count only events in the currently viewed month
  const monthPrefix = viewYear + '-' + String(viewMonth+1).padStart(2,'0');
  const monthEvents = Object.entries(events)
    .filter(([date]) => date.startsWith(monthPrefix))
    .reduce((s,[,arr]) => s + arr.length, 0);
  document.getElementById('cal-sub-label').textContent = monthEvents
    ? monthEvents + ' communication' + (monthEvents>1?'s':'') + ' planned this month'
    : 'Click any date to add communications';

  // First day of month (0=Sun…6=Sat), convert to Mon=0 grid
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const gridStart = (firstDay + 6) % 7; // Mon-based offset
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();

  const grid = document.getElementById('cal-days');
  grid.innerHTML = '';

  const totalCells = Math.ceil((gridStart + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day';

    let dayNum, dateStr, isOther = false;
    if (i < gridStart) {
      dayNum = daysInPrev - gridStart + i + 1;
      const prevMonth = viewMonth === 0 ? 11 : viewMonth - 1;
      const prevYear  = viewMonth === 0 ? viewYear - 1 : viewYear;
      dateStr = `${prevYear}-${String(prevMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      isOther = true;
    } else if (i >= gridStart + daysInMonth) {
      dayNum = i - gridStart - daysInMonth + 1;
      const nextMonth = viewMonth === 11 ? 0 : viewMonth + 1;
      const nextYear  = viewMonth === 11 ? viewYear + 1 : viewYear;
      dateStr = `${nextYear}-${String(nextMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      isOther = true;
    } else {
      dayNum = i - gridStart + 1;
      dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    }

    if (isOther) cell.classList.add('other-month');

    const todayStr = now.toISOString().slice(0,10);
    if (dateStr === todayStr) cell.classList.add('today');

    const dayEvents = events[dateStr] || [];
    if (dayEvents.length) cell.classList.add('has-events');

    const STATUS_DOT = { Planned:'', Sent:' ✓', Delayed:' ⚠' };
    cell.innerHTML = `<div class="cal-day-num">${dayNum}</div>` +
      dayEvents.slice(0,3).map(ev => {
        const peopleShort = ev.people
          ? ev.people.split(',').map(p => p.trim().split(' ')[0]).join(', ')
          : '';
        return `<span class="cal-event-dot ${TYPE_COLORS[ev.type]||'dot-other'}">
          <span style="display:block;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ev.subject}${STATUS_DOT[ev.status||'Planned']}</span>
          ${peopleShort ? `<span style="display:block;font-size:9px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${peopleShort}</span>` : ''}
        </span>`;
      }).join('') +
      (dayEvents.length > 3 ? `<span style="font-size:9px;color:var(--text3);font-weight:700">+${dayEvents.length-3} more</span>` : '');

    cell.onclick = () => openModal(dateStr);
    grid.appendChild(cell);
  }
  updateHistoryCount();
}

// ── MONTH NAV ──────────────────────────────────────────────────────────────
window.prevMonth = () => {
  if (viewMonth === 0) { viewMonth = 11; viewYear--; }
  else viewMonth--;
  renderCalendar();
};
window.nextMonth = () => {
  if (viewMonth === 11) { viewMonth = 0; viewYear++; }
  else viewMonth++;
  renderCalendar();
};

// ── MODAL ──────────────────────────────────────────────────────────────────
window.openModal = (dateStr) => {
  selectedDate = dateStr;
  selectedType = null;

  // Format date nicely
  const [y,m,d] = dateStr.split('-');
  const dn = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  document.getElementById('modal-date-label').textContent =
    dn.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // Clear form
  document.getElementById('ev-subject').value = '';
  document.getElementById('ev-people').value  = '';
  document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('selected'));

  renderEventList();
  document.getElementById('event-modal').classList.add('open');
  setTimeout(() => document.getElementById('ev-subject').focus(), 300);
};

window.handleModalClick = (e) => {
  if (e.target === document.getElementById('event-modal')) closeModal();
};

function closeModal() {
  document.getElementById('event-modal').classList.remove('open');
  selectedDate = null;
}

function renderEventList() {
  const list = document.getElementById('event-list');
  const dayEvents = events[selectedDate] || [];
  if (!dayEvents.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);font-weight:600;padding:4px 0 8px">No communications planned</div>';
    return;
  }
  const STATUS_NEXT = { Planned:'Sent', Sent:'Delayed', Delayed:'Planned' };
  const STATUS_ICON = { Planned:'🔵', Sent:'✅', Delayed:'⚠️' };
  list.innerHTML = dayEvents.map((ev, idx) => {
    const st = ev.status || 'Planned';
    const stClass = 'status-' + st.toLowerCase();
    return `
    <div class="event-item">
      <div class="event-item-color" style="background:${TYPE_HEX[ev.type]||'#9ca3af'}"></div>
      <div class="event-item-body">
        <div class="event-item-subject">${esc(ev.subject)}</div>
        <div class="event-item-meta">
          ${ev.type ? `<span style="font-weight:700;color:${TYPE_HEX[ev.type]||'#9ca3af'}">${ev.type}</span>` : ''}
          ${ev.people ? ` · 👥 ${esc(ev.people)}` : ''}
        </div>
        <div class="event-item-status">
          <span class="status-pill ${stClass}" onclick="cycleStatus(${idx})" title="Click to change status">
            ${STATUS_ICON[st]} ${st}
          </span>
        </div>
      </div>
      <button class="event-item-del" onclick="deleteEvent(${idx})" title="Delete">✕</button>
    </div>`;
  }).join('');
}

window.selectType = (el) => {
  document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = el.dataset.type;
};

window.addEvent = async () => {
  const subject = document.getElementById('ev-subject').value.trim();
  const people  = document.getElementById('ev-people').value.trim();
  if (!subject)      { toast('Enter a subject', 'err'); return; }
  if (!selectedType) { toast('Pick a type', 'err'); return; }

  if (!events[selectedDate]) events[selectedDate] = [];
  events[selectedDate].push({
    id: Date.now(),
    subject, type: selectedType, people,
    status: 'Planned',
  });

  await saveCalendar();

  // Reset form
  document.getElementById('ev-subject').value = '';
  document.getElementById('ev-people').value  = '';
  document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('selected'));
  selectedType = null;

  renderEventList();
  renderCalendar();
  toast('Added ✓');
};

window.cycleStatus = async (idx) => {
  if (!selectedDate || !events[selectedDate]) return;
  const ev = events[selectedDate][idx];
  const next = { Planned:'Sent', Sent:'Delayed', Delayed:'Planned' };
  ev.status = next[ev.status || 'Planned'];
  await saveCalendar();
  renderEventList();
  renderCalendar();
  toast('Status: ' + ev.status);
};

window.deleteEvent = async (idx) => {
  if (!selectedDate || !events[selectedDate]) return;
  events[selectedDate].splice(idx, 1);
  if (!events[selectedDate].length) delete events[selectedDate];
  await saveCalendar();
  renderEventList();
  renderCalendar();
  toast('Removed');
};

// ── YEAR HISTORY ──────────────────────────────────────────────────────────
let historyOpen = false;

window.toggleHistory = () => {
  historyOpen = !historyOpen;
  document.getElementById('history-body').classList.toggle('open', historyOpen);
  document.getElementById('history-arrow').classList.toggle('open', historyOpen);
  if (historyOpen) renderHistory();
};

function renderHistory() {
  const currentYear = new Date().getFullYear();
  const yearPrefix  = String(currentYear);

  // Collect all events this year, sorted by date desc
  const allEntries = [];
  Object.entries(events)
    .filter(([date]) => date.startsWith(yearPrefix))
    .forEach(([date, evts]) => {
      evts.forEach(ev => allEntries.push({ date, ...ev }));
    });
  allEntries.sort((a,b) => b.date.localeCompare(a.date));

  // Update count badge
  document.getElementById('history-count').textContent = allEntries.length;
  document.getElementById('history-label').textContent = 'Communications ' + yearPrefix;

  const body = document.getElementById('history-body');
  if (!allEntries.length) {
    body.innerHTML = '<div class="history-empty">No communications recorded this year yet</div>';
    return;
  }

  // Group by month
  const byMonth = {};
  allEntries.forEach(e => {
    const mKey = e.date.slice(0,7); // YYYY-MM
    if (!byMonth[mKey]) byMonth[mKey] = [];
    byMonth[mKey].push(e);
  });

  const STATUS_COLOR = { Sent:'#34d399', Planned:'#60a5fa', Delayed:'#f87171' };
  const STATUS_ICON  = { Sent:'✅', Planned:'🔵', Delayed:'⚠️' };

  body.innerHTML = Object.entries(byMonth)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .map(([mKey, items]) => {
      const [y,m] = mKey.split('-');
      const monthName = MONTHS[parseInt(m)-1] + ' ' + y;
      const rows = items.map(e => {
        const dayLabel = e.date.slice(8); // DD
        const typeColor = TYPE_HEX[e.type] || '#9ca3af';
        const st = e.status || 'Planned';
        return `<div class="history-item">
          <div class="history-item-date">${dayLabel} ${MONTHS[parseInt(m)-1].slice(0,3)}</div>
          <div class="history-item-type" style="background:${typeColor}22;color:${typeColor}">${e.type||'Other'}</div>
          <div class="history-item-subject">${esc(e.subject)}</div>
          <div class="history-item-status" style="color:${STATUS_COLOR[st]}">${STATUS_ICON[st]} ${st}</div>
        </div>`;
      }).join('');
      return `<div class="history-month-group">
        <div class="history-month-label">${monthName} · ${items.length} communication${items.length>1?'s':''}</div>
        ${rows}
      </div>`;
    }).join('');
}

// Update history count whenever calendar re-renders
function updateHistoryCount() {
  const currentYear = String(new Date().getFullYear());
  const total = Object.entries(events)
    .filter(([d]) => d.startsWith(currentYear))
    .reduce((s,[,arr]) => s + arr.length, 0);
  const badge = document.getElementById('history-count');
  if (badge) badge.textContent = total;
  if (historyOpen) renderHistory();
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type;
  void el.offsetWidth;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/workdesk-pwa/sw.js', { scope: '/workdesk-pwa/' });
  });
}
</script>
</body>
