<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorkDesk — Player Cards</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/themes.css">
<style>

/* ── PAGE ── */
.cards-page {
  min-height:100vh;padding:16px 16px 100px;
  max-width:500px;margin:0 auto;
}

/* ── SECTION HEADER ── */
.cards-hero {
  text-align:center;padding:20px 16px 16px;
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--rr);margin-bottom:16px;
  box-shadow:var(--shadow-card);
}

/* ── CARD GALLERY ── */
.cards-gallery {
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;margin-bottom:20px;
}

/* ── PLAYER CARD ── */
.player-card {
  position:relative;border-radius:16px;
  aspect-ratio:3/4;cursor:pointer;
  perspective:800px;
  -webkit-tap-highlight-color:transparent;
}
.card-inner {
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.4,0,.2,1);
  border-radius:16px;
}
.player-card.flipped .card-inner {
  transform:rotateY(180deg);
}
.card-front, .card-back {
  position:absolute;inset:0;
  border-radius:16px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
}
.card-back {
  transform:rotateY(180deg);
  display:flex;flex-direction:column;
  padding:14px 12px;
}

/* Rarity tiers */
.tier-rookie   { background:linear-gradient(160deg,#1a1a2e,#16213e);border:1.5px solid rgba(148,163,184,.4) }
.tier-contributor { background:linear-gradient(160deg,#0f3460,#1a1a2e);border:1.5px solid rgba(96,165,250,.5) }
.tier-pro      { background:linear-gradient(160deg,#4a2c0a,#1a0a00);border:1.5px solid rgba(245,158,11,.5) }
.tier-elite    { background:linear-gradient(160deg,#1a0a2e,#0d1018);border:1.5px solid rgba(167,139,250,.6) }
.tier-legend   { background:linear-gradient(160deg,#2d0a0a,#1a0a2e);border:2px solid rgba(239,68,68,.7) }

/* Card glow by tier */
.tier-rookie   { box-shadow:0 4px 20px rgba(0,0,0,.5) }
.tier-contributor { box-shadow:0 4px 24px rgba(96,165,250,.15),0 0 0 1px rgba(96,165,250,.1) }
.tier-pro      { box-shadow:0 4px 24px rgba(245,158,11,.2),0 0 0 1px rgba(245,158,11,.1) }
.tier-elite    { box-shadow:0 4px 28px rgba(167,139,250,.25),0 0 0 1px rgba(167,139,250,.15) }
.tier-legend   { box-shadow:0 4px 32px rgba(239,68,68,.3),0 0 0 1px rgba(239,68,68,.2) }

/* Holographic shine overlay */
.card-shine {
  position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(
    105deg,
    transparent 20%,
    rgba(255,255,255,.06) 40%,
    rgba(255,255,255,.1) 50%,
    rgba(255,255,255,.06) 60%,
    transparent 80%
  );
  pointer-events:none;
  transition:background-position .1s;
  mix-blend-mode:overlay;
}

/* Card front content */
.card-tier-label {
  position:absolute;top:10px;left:10px;
  font-size:8px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;
  backdrop-filter:blur(8px);
}
.card-tier-rookie     { background:rgba(148,163,184,.2);color:#94a3b8;border:1px solid rgba(148,163,184,.3) }
.card-tier-contributor{ background:rgba(96,165,250,.2);color:#60a5fa;border:1px solid rgba(96,165,250,.3) }
.card-tier-pro        { background:rgba(245,158,11,.2);color:#f59e0b;border:1px solid rgba(245,158,11,.3) }
.card-tier-elite      { background:rgba(167,139,250,.2);color:#a78bfa;border:1px solid rgba(167,139,250,.3) }
.card-tier-legend     { background:rgba(239,68,68,.2);color:#ef4444;border:1px solid rgba(239,68,68,.3) }

.card-flip-hint {
  position:absolute;top:10px;right:10px;
  font-size:9px;color:rgba(255,255,255,.3);font-weight:600;
}

.card-avatar {
  position:absolute;top:50%;left:50%;transform:translate(-50%,-62%);
  font-size:56px;line-height:1;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
  transition:transform .2s;
}
.player-card:hover .card-avatar { transform:translate(-50%,-65%) scale(1.05) }

.card-name-area {
  position:absolute;bottom:0;left:0;right:0;
  padding:10px 12px 12px;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);
}
.card-name {
  font-size:14px;font-weight:900;color:#fff;
  letter-spacing:-.01em;margin-bottom:3px;
  text-shadow:0 1px 4px rgba(0,0,0,.5);
}
.card-role {
  font-size:9px;font-weight:700;color:rgba(255,255,255,.6);
  letter-spacing:.08em;text-transform:uppercase;
}
.card-badges-preview {
  display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;
}
.card-badge-mini { font-size:13px }

/* Stat bars on front */
.card-stat-area {
  position:absolute;left:10px;right:10px;bottom:72px;
}
.card-stat-row {
  display:flex;align-items:center;gap:5px;margin-bottom:4px;
}
.card-stat-label {
  font-size:8px;font-weight:800;color:rgba(255,255,255,.5);
  letter-spacing:.06em;text-transform:uppercase;width:28px;flex-shrink:0;
}
.card-stat-bar {
  flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;
}
.card-stat-fill { height:100%;border-radius:2px;transition:width .4s ease }
.card-stat-val {
  font-size:9px;font-weight:800;color:rgba(255,255,255,.7);
  width:20px;text-align:right;flex-shrink:0;
}

/* Card BACK */
.card-back-header {
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
  padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.1);
}
.card-back-avatar { font-size:28px }
.card-back-name { font-size:13px;font-weight:900;color:#fff }
.card-back-tier { font-size:9px;color:rgba(255,255,255,.5);font-weight:700;margin-top:2px }
.card-back-stats {
  display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;
}
.card-stat-box {
  background:rgba(255,255,255,.07);border-radius:8px;padding:7px;text-align:center;
}
.card-stat-box-num { font-size:18px;font-weight:900;color:#fff;line-height:1 }
.card-stat-box-lbl { font-size:8px;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;margin-top:2px }
.card-back-badges-title {
  font-size:9px;font-weight:800;color:rgba(255,255,255,.4);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;
}
.card-back-badges {
  display:flex;flex-wrap:wrap;gap:6px;
}
.card-badge-full {
  display:flex;align-items:center;gap:4px;
  padding:4px 8px;border-radius:20px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  font-size:10px;color:rgba(255,255,255,.8);font-weight:600;
}
.card-back-flip {
  margin-top:auto;text-align:center;
  font-size:10px;color:rgba(255,255,255,.25);font-weight:600;padding-top:8px;
}

/* ── AVATAR PICKER ── */
.avatar-picker-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:300;display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(6px);
}
.avatar-picker-overlay.open { display:flex }
.avatar-picker {
  background:var(--panel);border:1.5px solid var(--border2);
  border-radius:20px 20px 0 0;padding:20px 16px 36px;
  width:100%;max-width:500px;
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
  animation:slide-up .25s cubic-bezier(.34,1.56,.64,1);
}
.avatar-grid {
  display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:14px 0;
}
.av-opt {
  font-size:28px;text-align:center;padding:8px;border-radius:10px;
  cursor:pointer;border:2px solid transparent;transition:all .15s;
  background:var(--bg2);
}
.av-opt:hover { background:var(--bg3);transform:scale(1.1) }
.av-opt.selected { border-color:var(--neon);background:rgba(0,229,184,.08) }
.av-save {
  width:100%;padding:12px;border-radius:12px;border:none;
  background:var(--neon);color:var(--bg);
  font-family:var(--sans);font-size:14px;font-weight:800;
  cursor:pointer;
}

/* MY CARD section */
.my-card-section {
  margin-bottom:20px;
}
.section-title {
  font-size:11px;font-weight:800;color:var(--text2);
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-title::after {
  content:'';flex:1;height:1px;background:var(--border2);
}

.my-card-wrap {
  display:flex;justify-content:center;
}
.my-card-wrap .player-card {
  width:180px;
}

.change-avatar-btn {
  display:block;text-align:center;margin:10px auto 0;
  padding:7px 18px;border-radius:20px;
  border:1.5px solid var(--border2);background:none;
  color:var(--text2);font-family:var(--sans);font-size:12px;
  font-weight:700;cursor:pointer;transition:all .15s;
}
.change-avatar-btn:hover { border-color:var(--neon);color:var(--neon) }

</style>

<script type="module">
import { initTheme, toggleThemePanel } from './js/theme.js';
import { onUserReady, getMembers, getTasks, getUserData, saveUserData } from './js/firebase.js';
initTheme(); window.toggleThemePanel = toggleThemePanel;

// ── AVATARS ────────────────────────────────────────────────────────────────
const AVATARS = [
  '🧑‍💻','👩‍💻','🧑‍🎨','👩‍🎨','🧑‍🚀','👩‍🚀',
  '🦸','🦸‍♀️','🧙','🧙‍♀️','🥷','🦊',
  '🐺','🐉','🦅','🤖','👾','🎭',
  '🦁','🐯','🦋','🌟','⚡','🔥',
  '💎','🎯','🚀','🎮','🏆','🎪',
];

// ── TIERS ──────────────────────────────────────────────────────────────────
function getTier(tasksDone) {
  if (tasksDone >= 100) return { id:'legend',   label:'LEGEND',      class:'tier-legend',   tagClass:'card-tier-legend',   color:'#ef4444' };
  if (tasksDone >= 50)  return { id:'elite',    label:'ELITE',       class:'tier-elite',    tagClass:'card-tier-elite',    color:'#a78bfa' };
  if (tasksDone >= 25)  return { id:'pro',      label:'PRO',         class:'tier-pro',      tagClass:'card-tier-pro',      color:'#f59e0b' };
  if (tasksDone >= 10)  return { id:'contributor',label:'CONTRIBUTOR',class:'tier-contributor',tagClass:'card-tier-contributor',color:'#60a5fa' };
  return                       { id:'rookie',   label:'ROOKIE',      class:'tier-rookie',   tagClass:'card-tier-rookie',   color:'#94a3b8' };
}

// ── BADGES ─────────────────────────────────────────────────────────────────
function getBadges(m, allTasks, streakVal) {
  const mDone = allTasks.filter(t => {
    const ms = (t.memberStatus||{})[m.id];
    return ms === 'done' || t.status === 'done';
  });
  const badges = [];
  if (mDone.length >= 1)  badges.push({ icon:'🎯', label:'First Strike' });
  if (mDone.length >= 10) badges.push({ icon:'🏆', label:'Taskmaster' });
  if (mDone.length >= 25) badges.push({ icon:'💎', label:'Diamond' });
  if (mDone.length >= 50) badges.push({ icon:'🌟', label:'All-Star' });

  // Check completion hours
  const hours = mDone.filter(t=>t.completedAt).map(t=>{
    const d = t.completedAt.toDate?t.completedAt.toDate():new Date(t.completedAt);
    return d.getHours();
  });
  if (hours.filter(h=>h<9).length >= 1)  badges.push({ icon:'🌅', label:'Early Bird' });
  if (hours.filter(h=>h>=20).length >= 1) badges.push({ icon:'🦉', label:'Night Owl' });

  // Speed run — task done same day it was registered
  const speedRuns = allTasks.filter(t => {
    if (!t.completedAt || !t.createdAt) return false;
    if (!((t.memberStatus||{})[m.id] === 'done' || t.status === 'done')) return false;
    const created   = t.createdAt.toDate?t.createdAt.toDate():new Date(t.createdAt);
    const completed = t.completedAt.toDate?t.completedAt.toDate():new Date(t.completedAt);
    return created.toISOString().slice(0,10) === completed.toISOString().slice(0,10);
  });
  if (speedRuns.length >= 1) badges.push({ icon:'⚡', label:'Speed Run' });

  return badges;
}

// ── STAT BARS ──────────────────────────────────────────────────────────────
function statBar(label, value, max, color) {
  const pct = Math.min(100, max > 0 ? Math.round(value/max*100) : 0);
  return `<div class="card-stat-row">
    <div class="card-stat-label">${label}</div>
    <div class="card-stat-bar"><div class="card-stat-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="card-stat-val">${value}</div>
  </div>`;
}

// ── BUILD CARD HTML ────────────────────────────────────────────────────────
function buildCard(m, allTasks, avatarMap, maxDone, isMyCard) {
  const mTasks  = allTasks.filter(t=>(t.members||[]).some(mm=>mm.id===m.id));
  const done    = mTasks.filter(t=>{const ms=(t.memberStatus||{})[m.id];return ms==='done'||t.status==='done';}).length;
  const inprog  = mTasks.filter(t=>t.status==='inprog').length;
  const tier    = getTier(done);
  const badges  = getBadges(m, allTasks, 0);
  const avatar  = avatarMap[m.name.toLowerCase()] || '🧑‍💻';
  const pct     = mTasks.length ? Math.round(done/mTasks.length*100) : 0;

  // Stat bars — normalised against team max
  const statsHTML = statBar('DONE', done, Math.max(maxDone,1), tier.color)
    + statBar('ACTV', inprog, 10, '#f59e0b')
    + statBar('COMP', pct, 100, '#34d399');

  const badgesPreview = badges.slice(0,4).map(b=>`<span class="card-badge-mini">${b.icon}</span>`).join('');
  const badgesBack = badges.length
    ? badges.map(b=>`<div class="card-badge-full">${b.icon} ${b.label}</div>`).join('')
    : '<div style="font-size:11px;color:rgba(255,255,255,.3)">Complete tasks to earn badges</div>';

  return `<div class="player-card" onclick="flipCard(this)">
    <div class="card-inner">
      <!-- FRONT -->
      <div class="card-front ${tier.class}">
        <div class="card-shine" id="shine-${m.id}"></div>
        <span class="card-tier-label ${tier.tagClass}">${tier.label}</span>
        <span class="card-flip-hint">tap to flip</span>
        <div class="card-avatar">${avatar}</div>
        <div class="card-stat-area">${statsHTML}</div>
        <div class="card-name-area">
          <div class="card-name">${esc(m.name)}</div>
          <div class="card-role">Internal Comms</div>
          <div class="card-badges-preview">${badgesPreview}</div>
        </div>
      </div>
      <!-- BACK -->
      <div class="card-back ${tier.class}" style="padding:12px">
        <div class="card-back-header">
          <span class="card-back-avatar">${avatar}</span>
          <div>
            <div class="card-back-name">${esc(m.name)}</div>
            <div class="card-back-tier">${tier.label} · ${done} tasks done</div>
          </div>
        </div>
        <div class="card-back-stats">
          <div class="card-stat-box">
            <div class="card-stat-box-num" style="color:${tier.color}">${done}</div>
            <div class="card-stat-box-lbl">Done</div>
          </div>
          <div class="card-stat-box">
            <div class="card-stat-box-num" style="color:#f59e0b">${inprog}</div>
            <div class="card-stat-box-lbl">Active</div>
          </div>
          <div class="card-stat-box">
            <div class="card-stat-box-num" style="color:#34d399">${pct}%</div>
            <div class="card-stat-box-lbl">Rate</div>
          </div>
          <div class="card-stat-box">
            <div class="card-stat-box-num" style="color:#a78bfa">${badges.length}</div>
            <div class="card-stat-box-lbl">Badges</div>
          </div>
        </div>
        <div class="card-back-badges-title">Badges Earned</div>
        <div class="card-back-badges">${badgesBack}</div>
        <div class="card-back-flip">tap to flip back</div>
      </div>
    </div>
  </div>`;
}

// ── HOLOGRAPHIC MOUSE SHINE ────────────────────────────────────────────────
document.addEventListener('mousemove', (e) => {
  document.querySelectorAll('.card-front').forEach(card => {
    const rect = card.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    const shine = card.querySelector('.card-shine');
    if (shine) {
      shine.style.background = `radial-gradient(circle at ${x}% ${y}%,rgba(255,255,255,.12) 0%,transparent 60%)`;
    }
  });
});

// Touch shine for mobile
document.addEventListener('touchmove', (e) => {
  const touch = e.touches[0];
  document.querySelectorAll('.card-front').forEach(card => {
    const rect = card.getBoundingClientRect();
    const x = ((touch.clientX - rect.left) / rect.width) * 100;
    const y = ((touch.clientY - rect.top) / rect.height) * 100;
    const shine = card.querySelector('.card-shine');
    if (shine) {
      shine.style.background = `radial-gradient(circle at ${x}% ${y}%,rgba(255,255,255,.12) 0%,transparent 60%)`;
    }
  });
}, { passive:true });

// ── FLIP ──────────────────────────────────────────────────────────────────
window.flipCard = (card) => card.classList.toggle('flipped');

// ── AVATAR PICKER ──────────────────────────────────────────────────────────
let selectedAvatar = null;
let MY_NAME = localStorage.getItem('wd_myname') || '';

window.openAvatarPicker = () => {
  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = AVATARS.map(av => `
    <div class="av-opt${av === selectedAvatar ? ' selected' : ''}"
      onclick="selectAvatar('${av}',this)">${av}</div>
  `).join('');
  document.getElementById('avatar-overlay').classList.add('open');
};

window.selectAvatar = (av, el) => {
  selectedAvatar = av;
  document.querySelectorAll('.av-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
};

window.closeAvatarPicker = () => {
  document.getElementById('avatar-overlay').classList.remove('open');
};

window.saveAvatar = async () => {
  if (!selectedAvatar || !MY_NAME) return;
  await saveUserData(MY_NAME, { avatar: selectedAvatar });
  closeAvatarPicker();
  toast('Avatar saved! ✓');
  loadCards(); // re-render
};

// ── LOAD EVERYTHING ────────────────────────────────────────────────────────
async function loadCards() {
  const [members, tasks] = await Promise.all([getMembers(), getTasks()]);

  // Load avatars for all members
  const avatarMap = {};
  await Promise.all(members.map(async m => {
    const data = await getUserData(m.name.toLowerCase());
    avatarMap[m.name.toLowerCase()] = data?.avatar || '🧑‍💻';
    if (m.name.toLowerCase() === MY_NAME.toLowerCase()) {
      selectedAvatar = data?.avatar || '🧑‍💻';
    }
  }));

  // Max done across team for normalisation
  const maxDone = Math.max(...members.map(m =>
    tasks.filter(t=>(t.members||[]).some(mm=>mm.id===m.id)).filter(t=>{
      const ms=(t.memberStatus||{})[m.id];return ms==='done'||t.status==='done';
    }).length
  ), 1);

  // My card
  const me = members.find(m => m.name.toLowerCase() === MY_NAME.toLowerCase());
  if (me) {
    document.getElementById('my-card-wrap').innerHTML =
      buildCard(me, tasks, avatarMap, maxDone, true);
  }

  // Team gallery (others sorted by done desc)
  const others = members
    .filter(m => m.name.toLowerCase() !== MY_NAME.toLowerCase())
    .sort((a,b) => {
      const aDone = tasks.filter(t=>(t.members||[]).some(mm=>mm.id===a.id)&&((t.memberStatus||{})[a.id]==='done'||t.status==='done')).length;
      const bDone = tasks.filter(t=>(t.members||[]).some(mm=>mm.id===b.id)&&((t.memberStatus||{})[b.id]==='done'||t.status==='done')).length;
      return bDone - aDone;
    });

  document.getElementById('cards-gallery').innerHTML =
    others.map(m => buildCard(m, tasks, avatarMap, maxDone, false)).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show';
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);
}

onUserReady(() => { loadCards(); });
</script>

  });
}
</script>
