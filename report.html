<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorkDesk — Report</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/themes.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── REPORT PAGE STYLES ── */
.rpt-tabs { display:flex; border-bottom:1px solid var(--border2); background:var(--bg2); }
.rpt-tab {
  flex:1; padding:12px 4px; text-align:center;
  font-family:var(--sans); font-size:11px; font-weight:700;
  color:var(--text3); cursor:pointer; border:none; background:none;
  border-bottom:2px solid transparent; transition:all .15s;
  margin-bottom:-1px; letter-spacing:.04em; text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;
}
.rpt-tab:hover { color:var(--text2) }
.rpt-tab.active { color:var(--neon); border-bottom-color:var(--neon) }

.rpt-panel { display:none }
.rpt-panel.active { display:block }

/* ── STAT GRID ── */
.rpt-stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:12px }
.rpt-stat {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--rr); padding:14px 12px; text-align:center;
  box-shadow:var(--shadow-card);
}
.rpt-stat-n { font-family:var(--mono); font-size:26px; font-weight:500; line-height:1; margin-bottom:4px }
.rpt-stat-l { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.08em }

/* ── SECTION HEADERS ── */
.rpt-sec-hd {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px; margin-top:16px;
}
.rpt-sec-title {
  font-size:11px; font-weight:700; color:var(--text2);
  text-transform:uppercase; letter-spacing:.1em;
  display:flex; align-items:center; gap:7px;
}
.rpt-sec-title::before {
  content:''; width:3px; height:11px; border-radius:2px;
  background:var(--neon); box-shadow:0 0 6px rgba(10,132,255,.4);
}
.rpt-sec-count { font-size:11px; color:var(--text3); font-weight:600 }

/* ── TASK ROWS ── */
.rpt-task {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 13px; background:var(--bg2);
  border:1px solid var(--border); border-radius:var(--r);
  margin-bottom:6px; border-left-width:3px;
}
.rpt-task-body { flex:1; min-width:0 }
.rpt-task-name { font-size:13px; font-weight:500; color:var(--text); line-height:1.4; margin-bottom:5px }
.rpt-task-meta { display:flex; flex-wrap:wrap; gap:4px; align-items:center }
.rpt-task-members { font-size:10px; color:var(--text3); margin-top:3px }

/* ── PROJECT BLOCK ── */
.rpt-project {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--rr); margin-bottom:8px;
  overflow:hidden; box-shadow:var(--shadow-card);
}
.rpt-project-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 14px; cursor:pointer; -webkit-tap-highlight-color:transparent;
  transition:background .12s;
}
.rpt-project-hd:hover { background:var(--bg3) }
.rpt-project-name { font-size:13px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:7px }
.rpt-project-meta { display:flex; align-items:center; gap:8px }
.rpt-project-pct { font-family:var(--mono); font-size:12px; font-weight:500 }
.rpt-project-bar-wrap {
  width:60px; height:3px; background:var(--bg4); border-radius:2px; overflow:hidden;
}
.rpt-project-bar { height:100%; border-radius:2px; transition:width .4s }
.rpt-project-body { padding:0 14px 12px; border-top:1px solid var(--border) }
.rpt-project-arrow { font-size:10px; color:var(--text3); transition:transform .2s; flex-shrink:0 }
.rpt-project-arrow.open { transform:rotate(180deg) }

/* ── PROGRESS RING (compact) ── */
.rpt-ring-wrap { display:flex; align-items:center; gap:14px; margin-bottom:14px }
.rpt-ring-labels { flex:1 }
.rpt-ring-pct { font-family:var(--mono); font-size:28px; font-weight:500; line-height:1; margin-bottom:2px }
.rpt-ring-sub { font-size:11px; color:var(--text2) }

/* ── FILTER ROW ── */
.rpt-filter-row {
  display:flex; gap:6px; padding:10px 16px;
  background:var(--bg2); border-bottom:1px solid var(--border2);
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.rpt-filter-row::-webkit-scrollbar { display:none }
.rpt-filter-sel {
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:8px; padding:6px 10px; color:var(--text2);
  font-family:var(--sans); font-size:11px; font-weight:600;
  outline:none; cursor:pointer; white-space:nowrap; flex-shrink:0;
  -webkit-appearance:none; appearance:none;
}
.rpt-filter-sel:focus { border-color:var(--neon) }
.rpt-clear-btn {
  background:none; border:1px solid var(--border2);
  border-radius:8px; padding:6px 10px; color:var(--text3);
  font-family:var(--sans); font-size:11px; font-weight:700;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.rpt-clear-btn:hover { border-color:var(--red); color:var(--red) }
.rpt-filter-count { font-size:11px; color:var(--text3); padding:6px 4px; flex-shrink:0; white-space:nowrap }

/* ── CHART CARD ── */
.rpt-chart-card {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--rr); padding:14px; margin-bottom:8px;
  box-shadow:var(--shadow-card);
}
.rpt-chart-title { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px }
.rpt-chart-wrap { position:relative; height:180px; width:100%; overflow:hidden }
.rpt-charts-grid { display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:12px }

/* ── MY REPORT PERIOD PILLS ── */
.rpt-period-row { display:flex; gap:6px; padding:10px 0; flex-wrap:wrap }
.rpt-period-btn {
  padding:6px 14px; border-radius:20px; border:1px solid var(--border2);
  background:var(--bg3); color:var(--text2); font-family:var(--sans);
  font-size:11px; font-weight:700; cursor:pointer; transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.rpt-period-btn.active {
  background:var(--neon); color:#0c0c0f; border-color:var(--neon);
}
.rpt-period-btn:active { transform:scale(.96) }

/* ── EXPORT BUTTON ── */
.rpt-export-btn {
  display:flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:10px; border:none;
  background:var(--neon); color:#0c0c0f;
  font-family:var(--sans); font-size:12px; font-weight:700;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.rpt-export-btn:hover { filter:brightness(1.08) }
.rpt-export-btn:active { transform:scale(.97) }

/* ── MEMBER ROW ── */
.rpt-member-row {
  display:flex; align-items:center; gap:10px;
  padding:11px 13px; background:var(--bg2);
  border:1px solid var(--border2); border-radius:var(--r);
  margin-bottom:6px;
}
.rpt-member-av {
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  background:rgba(94,92,230,.08); border:1px solid rgba(94,92,230,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:var(--purple);
}
.rpt-member-info { flex:1; min-width:0 }
.rpt-member-name { font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px }
.rpt-member-bar-bg { height:3px; background:var(--bg4); border-radius:2px; overflow:hidden }
.rpt-member-bar-fill { height:100%; background:var(--neon2); border-radius:2px; transition:width .4s }
.rpt-member-pct { font-family:var(--mono); font-size:13px; font-weight:500; color:var(--neon2); flex-shrink:0 }

/* ── EMPTY STATE ── */
.rpt-empty { text-align:center; padding:32px 16px; color:var(--text3); font-size:13px }
.rpt-empty-icon { font-size:28px; margin-bottom:8px; opacity:.3 }

/* ── WEEKLY DIGEST ── */
.digest-stat { flex:1; text-align:center; padding:10px 6px; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--r) }
.digest-stat-n { font-family:var(--mono); font-size:22px; font-weight:500; line-height:1; margin-bottom:3px }
.digest-stat-l { font-size:9px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.08em }

/* ── TAGS ── (reuse from style.css pattern) */
.rt { font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px; border:1px solid; text-transform:uppercase; letter-spacing:.04em }
.rt-done  { color:#34c759; background:rgba(52,199,89,.08);  border-color:rgba(52,199,89,.2) }
.rt-ip    { color:var(--amber); background:rgba(255,159,10,.08); border-color:rgba(255,159,10,.2) }
.rt-todo  { color:var(--text2); background:var(--bg3); border-color:var(--border2) }
.rt-crit  { color:var(--red); background:rgba(255,69,58,.08); border-color:rgba(255,69,58,.2) }
.rt-high  { color:var(--amber); background:rgba(255,159,10,.08); border-color:rgba(255,159,10,.2) }
.rt-med   { color:var(--neon); background:rgba(10,132,255,.08); border-color:rgba(10,132,255,.2) }
.rt-low   { color:var(--text3); background:var(--bg3); border-color:var(--border) }
.rt-proj  { color:var(--purple); background:rgba(94,92,230,.08); border-color:rgba(94,92,230,.2) }

/* ── AI NARRATIVE CARD ── */
.rpt-ai-card {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--rr); padding:14px 16px; margin-bottom:12px;
  box-shadow:var(--shadow-card); position:relative; overflow:hidden;
}
.rpt-ai-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--neon),var(--purple));
}
.rpt-ai-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
}
.rpt-ai-label {
  font-size:10px; font-weight:700; color:var(--text3);
  text-transform:uppercase; letter-spacing:.1em;
  display:flex; align-items:center; gap:6px;
}
.rpt-ai-label::before {
  content:'✦'; color:var(--neon); font-size:10px;
}
.rpt-ai-regen {
  background:none; border:1px solid var(--border2); border-radius:8px;
  padding:4px 10px; color:var(--text3); font-family:var(--sans);
  font-size:10px; font-weight:700; cursor:pointer; transition:all .15s;
}
.rpt-ai-regen:hover { border-color:var(--neon); color:var(--neon) }
.rpt-ai-regen:disabled { opacity:.4; cursor:not-allowed }
.rpt-ai-body {
  font-size:13px; line-height:1.65; color:var(--text2);
  font-style:italic;
}
.rpt-ai-skeleton {
  display:flex; flex-direction:column; gap:8px;
}
.rpt-ai-skel-line {
  height:12px; background:var(--bg4); border-radius:4px;
  animation:skel-pulse 1.4s ease-in-out infinite;
}
@keyframes skel-pulse {
  0%,100%{opacity:.4} 50%{opacity:.8}
}

/* ── SCORECARD ── */
.rpt-scorecard {
  display:grid; grid-template-columns:repeat(2,1fr); gap:8px;
  margin-bottom:12px;
}
.rpt-sc-item {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--r); padding:10px 12px;
}
.rpt-sc-val { font-family:var(--mono); font-size:18px; font-weight:500; line-height:1; margin-bottom:3px }
.rpt-sc-label { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.07em }

/* ── OVERDUE / CIP ALERT ── */
.rpt-alert {
  display:flex; align-items:flex-start; gap:8px;
  padding:10px 12px; border-radius:var(--r); margin-bottom:8px;
  border:1px solid;
}
.rpt-alert-warn { background:rgba(255,159,10,.06); border-color:rgba(255,159,10,.25) }
.rpt-alert-info { background:rgba(94,92,230,.06); border-color:rgba(94,92,230,.25) }
.rpt-alert-icon { font-size:14px; flex-shrink:0; margin-top:1px }
.rpt-alert-body { flex:1; min-width:0 }
.rpt-alert-title { font-size:11px; font-weight:700; color:var(--text); margin-bottom:3px }
.rpt-alert-text { font-size:11px; color:var(--text3); line-height:1.5 }

/* ── PRINT / PDF ── */
@media print {
  nav, .rpt-tabs, .rpt-filter-row, .rpt-period-row,
  .rpt-export-btn, .bottom-nav { display:none !important }
  body { background:#fff !important; color:#111 !important }
  .rpt-panel { display:block !important }
  .rpt-chart-card, .rpt-project, .rpt-stat, .rpt-task { break-inside:avoid }
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <span class="brand-word"><span class="brand-work">Work</span><span class="brand-desk">desk</span></span>
    <span class="brand-dot"></span>
  </a>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleThemePanel()">🎨 Theme</button>
    <button class="theme-toggle" id="mute-btn" onclick="handleMuteToggle()">🔊</button>
  </div>
</nav>

<!-- TOP CONTROLS -->
<div style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border2)">
  <select id="month-sel" onchange="loadReport()"
    style="background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:7px 12px;color:var(--text);font-family:var(--sans);font-size:13px;font-weight:600;outline:none;cursor:pointer;flex:1;-webkit-appearance:none"></select>
  <button onclick="exportPDF()" class="rpt-export-btn">⬇ PDF</button>
</div>

<!-- REPORT TABS -->
<div class="rpt-tabs">
  <button class="rpt-tab active" id="tab-monthly" onclick="switchRptTab('monthly')">Monthly</button>
  <button class="rpt-tab" id="tab-weekly" onclick="switchRptTab('weekly')">Weekly</button>
  <button class="rpt-tab" id="tab-myreport" onclick="switchRptTab('myreport')">My Report</button>
</div>

<!-- FILTER ROW (monthly only) -->
<div class="rpt-filter-row" id="filter-row">
  <select id="filter-project" class="rpt-filter-sel" onchange="applyFilters()"><option value="">All Projects</option></select>
  <select id="filter-member"  class="rpt-filter-sel" onchange="applyFilters()"><option value="">All Members</option></select>
  <select id="filter-priority" class="rpt-filter-sel" onchange="applyFilters()">
    <option value="">All Priorities</option>
    <option value="critical">Critical</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
  <select id="filter-status" class="rpt-filter-sel" onchange="applyFilters()">
    <option value="">All Status</option>
    <option value="done">Done</option>
    <option value="inprog">In Progress</option>
    <option value="todo">Todo</option>
  </select>
  <button class="rpt-clear-btn" onclick="clearFilters()">✕</button>
  <span class="rpt-filter-count" id="filter-count"></span>
</div>

<!-- ═══ MONTHLY PANEL ═══ -->
<div class="rpt-panel active page" id="panel-monthly" style="padding-top:12px">
  <div id="monthly-content">
    <div class="rpt-empty"><div class="rpt-empty-icon">📊</div>Loading…</div>
  </div>
</div>

<!-- ═══ MY REPORT PANEL ═══ -->
<div class="rpt-panel page" id="panel-myreport" style="padding-top:12px">
  <!-- Member selector + period + export -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <select id="my-report-member" onchange="renderMyReport()"
      style="background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:7px 11px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;flex:1;-webkit-appearance:none"></select>
    <button onclick="exportMyReportPDF()" class="rpt-export-btn" style="flex-shrink:0">⬇ PDF</button>
  </div>
  <div class="rpt-period-row">
    <button class="rpt-period-btn active" data-period="month" onclick="setMyReportPeriod('month',this)">This Month</button>
    <button class="rpt-period-btn" data-period="week" onclick="setMyReportPeriod('week',this)">Last Week</button>
    <button class="rpt-period-btn" data-period="quarter" onclick="setMyReportPeriod('quarter',this)">Last Quarter</button>
  </div>
  <div id="my-report-content" style="margin-top:4px">
    <div class="rpt-empty"><div class="rpt-empty-icon">👤</div>Select a period above</div>
  </div>
</div>

<!-- ═══ WEEKLY DIGEST PANEL ═══ -->
<div class="rpt-panel page" id="panel-weekly" style="padding-top:12px">
  <div id="weekly-content">
    <div class="rpt-empty"><div class="rpt-empty-icon">📅</div>Loading…</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html"    class="bn-item"><span class="bn-icon">⊞</span><span class="bn-label">Dashboard</span></a>
  <a href="input.html"    class="bn-item"><span class="bn-icon">＋</span><span class="bn-label">Input</span></a>
  <a href="report.html"   class="bn-item active"><span class="bn-icon">▤</span><span class="bn-label">Report</span></a>
  <a href="calendar.html" class="bn-item"><span class="bn-icon">📅</span><span class="bn-label">Calendar</span></a>
</nav>

<script type="module">
import { onUserReady, getTasks, getMembers, getCalendarEvents, getProjects, setProjectComplete, reopenProject } from './js/firebase.js';
import { initTheme, toggleThemePanel } from './js/theme.js';
import { initAudio, getMuted, toggleMute } from './js/sounds.js';
initTheme();
window.toggleThemePanel = toggleThemePanel;
initAudio();
function updateMuteBtn(){const b=document.getElementById('mute-btn');if(b)b.textContent=getMuted()?'🔇':'🔊';}
window.handleMuteToggle=()=>{toggleMute();updateMuteBtn();}
updateMuteBtn();

// ── STATE ──────────────────────────────────────────────────────────────────
let allTasks=[], allMembers=[], calendarEvents={}, projectsData={};
let selMonth='';
let activeFilters={project:'',member:'',priority:'',status:''};
let chartInstances={};
let myReportPeriod='month';
let activeRptTab='monthly';

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const pad=n=>String(n).padStart(2,'0');

// ── INIT MONTH SELECTOR ────────────────────────────────────────────────────
(function initMonths(){
  const sel=document.getElementById('month-sel');
  const now=new Date();
  let opts='';
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const val=`${d.getFullYear()}-${pad(d.getMonth()+1)}`;
    const lbl=MONTHS[d.getMonth()]+' '+d.getFullYear();
    opts+=`<option value="${val}"${i===0?' selected':''}>${lbl}</option>`;
  }
  sel.innerHTML=opts;
  selMonth=sel.value;
})();

// ── LOAD DATA ──────────────────────────────────────────────────────────────
window.loadReport=()=>{
  selMonth=document.getElementById('month-sel').value;
  renderActiveTab();
};

onUserReady(async()=>{
  [allTasks,allMembers,calendarEvents,projectsData]=await Promise.all([getTasks(),getMembers(),getCalendarEvents(),getProjects()]);
  populateMemberSelector();
  renderActiveTab();
});

function renderActiveTab(){
  if(activeRptTab==='monthly')  renderMonthly();
  if(activeRptTab==='myreport') renderMyReport();
  if(activeRptTab==='weekly')   renderWeekly();
}

// ── TAB SWITCHING ──────────────────────────────────────────────────────────
window.switchRptTab=(tab)=>{
  activeRptTab=tab;
  document.querySelectorAll('.rpt-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.rpt-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  // Show/hide filter row
  document.getElementById('filter-row').style.display=tab==='monthly'?'flex':'none';
  renderActiveTab();
};

// ── UTILS ──────────────────────────────────────────────────────────────────
function isProjectCompleted(projName, month) {
  // A project is hidden if it was completed in a PREVIOUS month
  const p = projectsData[btoa(projName)];
  if (!p || !p.completedMonth) return false;
  return p.completedMonth < month; // hide only from months AFTER completion
}

function isProjectCompletedForMonth(projName, month) {
  const p = projectsData[btoa(projName)];
  if (!p) return false;
  return !!p.completedMonth;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day} ${MONTHS[parseInt(m)-1]}`;}
function monthLabel(m){const[y,mo]=m.split('-');return MONTHS[parseInt(mo)-1]+' '+y;}
function pctColor(p){return p>=80?'var(--green)':p>=50?'var(--amber)':'var(--red)';}
function priorityBorderColor(p){return{critical:'var(--red)',high:'var(--amber)',medium:'var(--neon)',low:'var(--text3)'}[p||'medium'];}

// ── NARRATIVE (MANUAL) ────────────────────────────────────────────────────
let _cachedNarrative = '';

function getNarrativeKey(month) { return 'wd_narrative_' + month; }
function loadSavedNarrative(month) { return localStorage.getItem(getNarrativeKey(month)) || ''; }
function saveNarrative(month, text) { localStorage.setItem(getNarrativeKey(month), text); _cachedNarrative = text; }

function buildPrompt(tasks, month) {
  const lbl = monthLabel(month);
  const done = tasks.filter(t=>t.status==='done');
  const pending = tasks.filter(t=>t.status!=='done');
  const cips = tasks.filter(t=>t.project==='CIPs');
  const critDone = tasks.filter(t=>t.priority==='critical'&&t.status==='done');
  const overdue = tasks.filter(t=>{
    if(t.status==='done') return false;
    if(!t.taskDueDate) return false;
    return t.taskDueDate < month+'-31' && t.taskDueDate < new Date().toISOString().slice(0,10);
  });

  const pct = tasks.length ? Math.round(done.length/tasks.length*100) : 0;
  const lines = [
    'You are writing the internal narrative summary for an Internal Communications team monthly report at Bosch Mobility India.',
    '',
    'Data for ' + lbl + ':',
    '- Total tasks: ' + tasks.length + ' | Done: ' + done.length + ' | Pending: ' + pending.length + ' | Completion: ' + pct + '%',
    '- Criticals closed: ' + critDone.length + ' of ' + tasks.filter(t=>t.priority==='critical').length,
    '- Overdue (past due, not done): ' + overdue.length,
    '- Projects active: ' + [...new Set(tasks.map(t=>t.project).filter(Boolean))].join(', '),
    '- CIPs pipeline: ' + cips.length + ' items, ' + cips.filter(t=>t.status==='done').length + ' done',
    '- Completed tasks: ' + done.map(t=>t.label).join(' | '),
    '- Pending tasks: ' + pending.map(t=>t.label+' ['+t.priority+(t.taskDueDate?', due '+fmtDate(t.taskDueDate):'')+']').join(' | '),
    '',
    'Write a 3-sentence executive narrative for this months Internal Communications report.',
    '- Sentence 1: What the month was dominated by / the main theme (reference specific project names)',
    '- Sentence 2: Completion health - honest context on the ' + pct + '% rate (note: all criticals closed is a strong positive even when overall % looks low due to CIPs)',
    '- Sentence 3: Forward look - what is coming based on pending tasks and CIPs pipeline',
    '',
    'Tone: professional, honest, direct. IC Lead writing for their manager - not a press release.',
    'Under 80 words. Return only the narrative text, no labels or preamble.'
  ];
  return lines.join('\n');
}

function buildScorecardHTML(mt, allMt) {
  const total = mt.length;
  const done = mt.filter(t=>t.status==='done').length;
  const critTotal = mt.filter(t=>t.priority==='critical').length;
  const critDone = mt.filter(t=>t.priority==='critical'&&t.status==='done').length;
  const highTotal = mt.filter(t=>t.priority==='high').length;
  const highDone = mt.filter(t=>t.priority==='high'&&t.status==='done').length;
  const carryFwd = mt.filter(t=>t.status!=='done').length;
  const highPct = highTotal ? Math.round(highDone/highTotal*100) : 0;
  const critStatus = critTotal===0 ? '—' : critDone===critTotal ? `${critDone}/${critTotal} ✓` : `${critDone}/${critTotal}`;
  const critColor = critTotal===0?'var(--text3)':critDone===critTotal?'var(--green)':'var(--red)';

  return `
  <div class="rpt-scorecard">
    <div class="rpt-sc-item">
      <div class="rpt-sc-val" style="color:${critColor}">${critStatus}</div>
      <div class="rpt-sc-label">Criticals Closed</div>
    </div>
    <div class="rpt-sc-item">
      <div class="rpt-sc-val" style="color:${highPct>=80?'var(--green)':highPct>=50?'var(--amber)':'var(--red)'}">${highPct}%</div>
      <div class="rpt-sc-label">High-Pri Done</div>
    </div>
    <div class="rpt-sc-item">
      <div class="rpt-sc-val" style="color:var(--text)">${done}</div>
      <div class="rpt-sc-label">Tasks Shipped</div>
    </div>
    <div class="rpt-sc-item">
      <div class="rpt-sc-val" style="color:var(--amber)">${carryFwd}</div>
      <div class="rpt-sc-label">Carry Forward</div>
    </div>
  </div>`;
}

function buildAlertsHTML(mt, selMonth) {
  const today = new Date().toISOString().slice(0,10);
  const overdue = mt.filter(t=>{
    if(t.status==='done') return false;
    if(!t.taskDueDate) return false;
    return t.taskDueDate < today;
  });
  const cipTasks = mt.filter(t=>t.project==='CIPs');
  const cipDone = cipTasks.filter(t=>t.status==='done').length;

  let html = '';

  if(overdue.length) {
    const names = overdue.slice(0,3).map(t=>`"${t.label}"`).join(', ');
    const more = overdue.length>3 ? ` +${overdue.length-3} more` : '';
    html += `<div class="rpt-alert rpt-alert-warn">
      <div class="rpt-alert-icon">⚠️</div>
      <div class="rpt-alert-body">
        <div class="rpt-alert-title">${overdue.length} Overdue Task${overdue.length>1?'s':''}</div>
        <div class="rpt-alert-text">${names}${more} — past due with no completion recorded.</div>
      </div>
    </div>`;
  }

  if(cipTasks.length && cipDone===0) {
    const nextDue = cipTasks.filter(t=>t.taskDueDate).sort((a,b)=>a.taskDueDate.localeCompare(b.taskDueDate))[0];
    const nextLabel = nextDue ? ` Next due: ${fmtDate(nextDue.taskDueDate)} — "${nextDue.label}"` : '';
    html += `<div class="rpt-alert rpt-alert-info">
      <div class="rpt-alert-icon">📋</div>
      <div class="rpt-alert-body">
        <div class="rpt-alert-title">CIPs: ${cipTasks.length} items in pipeline, execution in progress</div>
        <div class="rpt-alert-text">${cipDone}/${cipTasks.length} complete — these are process improvement items, not day-to-day tasks.${nextLabel}</div>
      </div>
    </div>`;
  }

  return html;
}

// ── FILTERS ────────────────────────────────────────────────────────────────
window.applyFilters=()=>{
  activeFilters.project  = document.getElementById('filter-project')?.value||'';
  activeFilters.member   = document.getElementById('filter-member')?.value||'';
  activeFilters.priority = document.getElementById('filter-priority')?.value||'';
  activeFilters.status   = document.getElementById('filter-status')?.value||'';
  renderMonthly();
};
window.clearFilters=()=>{
  ['filter-project','filter-member','filter-priority','filter-status'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  activeFilters={project:'',member:'',priority:'',status:''};
  renderMonthly();
};
function applyActiveFilters(tasks){
  let r=[...tasks];
  if(activeFilters.project)  r=r.filter(t=>(t.project||'')===activeFilters.project);
  if(activeFilters.member)   r=r.filter(t=>(t.members||[]).some(m=>m.name===activeFilters.member));
  if(activeFilters.priority) r=r.filter(t=>t.priority===activeFilters.priority);
  if(activeFilters.status)   r=r.filter(t=>t.status===activeFilters.status);
  return r;
}
function populateFilterDropdowns(mt){
  const pSel=document.getElementById('filter-project');
  if(pSel){
    const projects=[...new Set(mt.map(t=>t.project).filter(Boolean))].sort();
    const cur=pSel.value;
    pSel.innerHTML='<option value="">All Projects</option>'+projects.map(p=>`<option value="${esc(p)}"${cur===p?' selected':''}>${esc(p)}</option>`).join('');
  }
  const mSel=document.getElementById('filter-member');
  if(mSel){
    const names=[...new Set(mt.flatMap(t=>(t.members||[]).map(m=>m.name)))].sort();
    const cur=mSel.value;
    mSel.innerHTML='<option value="">All Members</option>'+names.map(n=>`<option value="${esc(n)}"${cur===n?' selected':''}>${esc(n)}</option>`).join('');
  }
  const filtered=applyActiveFilters(mt);
  const hasF=Object.values(activeFilters).some(v=>v);
  const countEl=document.getElementById('filter-count');
  if(countEl) countEl.textContent=hasF?`${filtered.length}/${mt.length}`:'';
}

// ── CHARTS ─────────────────────────────────────────────────────────────────
function destroyCharts(){
  Object.values(chartInstances).forEach(ch=>{try{ch.destroy()}catch(e){}});
  chartInstances={};
}
const chartBase={animation:false,responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};
// Read actual CSS vars at render time so light/dark themes both work
const _cs = getComputedStyle(document.body);
const _textColor = _cs.getPropertyValue('--text2').trim() || 'rgba(100,100,100,.8)';
const _gridColor = _cs.getPropertyValue('--border').trim() || 'rgba(0,0,0,.08)';
const chartFont={font:{size:10,family:"'DM Sans',system-ui,sans-serif"},color:_textColor};
const chartGrid={color:_gridColor};

function renderCharts(mt){
  destroyCharts();
  if(!mt.length) return;

  // Status donut
  try {
    chartInstances.status=new Chart(document.getElementById('chart-status'),{
      type:'doughnut',
      data:{labels:['Done','In Prog','Todo'],datasets:[{
        data:[mt.filter(t=>t.status==='done').length,mt.filter(t=>t.status==='inprog').length,mt.filter(t=>t.status==='todo').length],
        backgroundColor:['#34c759','#ff9f0a',_cs.getPropertyValue('--bg4').trim()||'#e5e7eb'],
        borderWidth:0,hoverOffset:3,
      }]},
      options:{...chartBase,plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9,family:"'DM Sans',system-ui,sans-serif"},color:_textColor,boxWidth:10,padding:6}}}}
    });
  } catch(e){}

  // Priority bar
  try {
    chartInstances.priority=new Chart(document.getElementById('chart-priority'),{
      type:'bar',
      data:{labels:['Crit','High','Med','Low'],datasets:[{
        data:['critical','high','medium','low'].map(p=>mt.filter(t=>t.priority===p).length),
        backgroundColor:['#ff453a','#ff9f0a','#0a84ff','#34c759'],
        borderRadius:4,borderWidth:0,
      }]},
      options:{...chartBase,scales:{x:{ticks:chartFont,grid:{display:false}},y:{ticks:chartFont,grid:chartGrid,beginAtZero:true}}}
    });
  } catch(e){}

  // Member bar
  const memberMap={};
  mt.forEach(t=>{(t.members||[]).forEach(m=>{
    if(!memberMap[m.name]) memberMap[m.name]={done:0,total:0};
    memberMap[m.name].total++;
    const ms=(t.memberStatus||{})[m.id]||t.status;
    if(ms==='done') memberMap[m.name].done++;
  });});
  const mNames=Object.keys(memberMap).sort();
  try {
    chartInstances.member=new Chart(document.getElementById('chart-member'),{
      type:'bar',
      data:{labels:mNames.map(n=>n.split(' ')[0]),datasets:[
        {label:'Done',data:mNames.map(n=>memberMap[n].done),backgroundColor:'#34c759',borderRadius:3,borderWidth:0},
        {label:'Open',data:mNames.map(n=>memberMap[n].total-memberMap[n].done),backgroundColor:_cs.getPropertyValue('--bg4').trim()||'rgba(0,0,0,.08)',borderRadius:3,borderWidth:0},
      ]},
      options:{...chartBase,scales:{x:{ticks:chartFont,grid:{display:false},stacked:true},y:{ticks:chartFont,grid:chartGrid,beginAtZero:true,stacked:true}},
        plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9,family:"'DM Sans',system-ui,sans-serif"},color:_textColor,boxWidth:10,padding:6}}}}
    });
  } catch(e){}

  // Project bar
  const projMap={};
  mt.forEach(t=>{const p=t.project||'(none)';if(!projMap[p]) projMap[p]={done:0,total:0};projMap[p].total++;if(t.status==='done')projMap[p].done++;});
  const pNames=Object.keys(projMap).filter(p=>p!=='(none)').sort();
  if(pNames.length>0){
    try {
      chartInstances.project=new Chart(document.getElementById('chart-project'),{
        type:'bar',
        data:{labels:pNames.map(n=>n.length>12?n.slice(0,11)+'…':n),datasets:[
          {label:'Done',data:pNames.map(n=>projMap[n].done),backgroundColor:'#5e5ce6',borderRadius:3,borderWidth:0},
          {label:'Open',data:pNames.map(n=>projMap[n].total-projMap[n].done),backgroundColor:_cs.getPropertyValue('--purple-glow').trim()||'rgba(94,92,230,.15)',borderRadius:3,borderWidth:0},
        ]},
        options:{...chartBase,scales:{x:{ticks:chartFont,grid:{display:false},stacked:true},y:{ticks:chartFont,grid:chartGrid,beginAtZero:true,stacked:true}},
          plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9,family:"'DM Sans',system-ui,sans-serif"},color:_textColor,boxWidth:10,padding:6}}}}
      });
    } catch(e){}
  } else {
    const el=document.getElementById('chart-project');
    if(el) el.closest('.rpt-chart-card')?.remove();
  }
}

// ── TASK ROW HTML ──────────────────────────────────────────────────────────
function taskRowHTML(t){
  const stClass={done:'rt-done',inprog:'rt-ip',todo:'rt-todo'}[t.status]||'rt-todo';
  const stLabel={done:'Done',inprog:'In Progress',todo:'Todo'}[t.status]||'Todo';
  const prioClass={critical:'rt-crit',high:'rt-high',medium:'rt-med',low:'rt-low'}[t.priority||'medium'];
  const members=(t.members||[]).map(m=>m.name).join(', ');
  return `<div class="rpt-task" style="border-left-color:${priorityBorderColor(t.priority)}">
    <div class="rpt-task-body">
      <div class="rpt-task-name">${esc(t.label)}</div>
      <div class="rpt-task-meta">
        <span class="rt ${stClass}">${stLabel}</span>
        <span class="rt ${prioClass}">${t.priority||'medium'}</span>
        ${t.project?`<span class="rt rt-proj">&#128193; ${esc(t.project)}</span>`:''}
        ${t.taskDueDate&&t.status!=='done'?`<span class="rt rt-todo">📅 ${fmtDate(t.taskDueDate)}</span>`:''}
      </div>
      ${members?`<div class="rpt-task-members">👥 ${esc(members)}</div>`:''}
    </div>
  </div>`;
}

// ── MONTHLY REPORT ─────────────────────────────────────────────────────────
function renderMonthly(){
  // Filter tasks: exclude projects completed in a prior month
  const allMt=allTasks.filter(t=>{
    if(t.month!==selMonth) return false;
    if((t.taskType||'mbc')!=='mbc') return false;
    if(t.project && isProjectCompleted(t.project, selMonth)) return false;
    return true;
  });
  populateFilterDropdowns(allMt);
  const mt=applyActiveFilters(allMt);
  const el=document.getElementById('monthly-content');

  if(!allMt.length){
    el.innerHTML=`<div class="rpt-empty"><div class="rpt-empty-icon">📊</div>No tasks for ${monthLabel(selMonth)}</div>`;
    return;
  }

  const total=mt.length, done=mt.filter(t=>t.status==='done').length;
  const inprog=mt.filter(t=>t.status==='inprog').length;
  const crit=mt.filter(t=>t.priority==='critical'&&t.status!=='done').length;
  const pct=total?Math.round(done/total*100):0;
  const pc=pctColor(pct);
  const R=36,C=2*Math.PI*R,off=C-(pct/100)*C;

  // Group by project
  const byProj={};
  mt.forEach(t=>{const p=t.project||'';if(!byProj[p])byProj[p]=[];byProj[p].push(t);});
  const projKeys=Object.keys(byProj).sort((a,b)=>{if(!a)return 1;if(!b)return-1;return a.localeCompare(b);});
  const namedProjs=projKeys.filter(k=>k);

  const shipped=mt.filter(t=>t.status==='done');
  const pending=mt.filter(t=>t.status!=='done');
  const critOpen=mt.filter(t=>t.priority==='critical'&&t.status!=='done');

  el.innerHTML=`
    <!-- STATS -->
    <div class="rpt-stat-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="rpt-stat"><div class="rpt-stat-n" style="color:var(--neon)">${total}</div><div class="rpt-stat-l">Total</div></div>
      <div class="rpt-stat"><div class="rpt-stat-n" style="color:var(--green)">${done}</div><div class="rpt-stat-l">Done</div></div>
      <div class="rpt-stat"><div class="rpt-stat-n" style="color:var(--amber)">${inprog}</div><div class="rpt-stat-l">In Prog</div></div>
      <div class="rpt-stat"><div class="rpt-stat-n" style="color:var(--red)">${crit}</div><div class="rpt-stat-l">Critical</div></div>
    </div>

    <!-- PROGRESS RING + LABEL -->
    <div class="panel" style="padding:14px 16px;margin-bottom:12px">
      <div class="rpt-ring-wrap">
        <svg width="84" height="84" viewBox="0 0 84 84" style="flex-shrink:0">
          <circle cx="42" cy="42" r="${R}" fill="none" stroke="var(--bg4)" stroke-width="6"/>
          <circle cx="42" cy="42" r="${R}" fill="none" stroke="${pc}" stroke-width="6"
            stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
            stroke-linecap="round" transform="rotate(-90 42 42)" style="transition:stroke-dashoffset .6s"/>
          <text x="42" y="47" text-anchor="middle" font-family="var(--mono)" font-size="14" font-weight="500" fill="${pc}">${pct}%</text>
        </svg>
        <div class="rpt-ring-labels">
          <div class="rpt-ring-pct" style="color:${pc}">${pct}% complete</div>
          <div class="rpt-ring-sub">${done} of ${total} tasks done · ${monthLabel(selMonth)}</div>
        </div>
      </div>
    </div>

    <!-- SCORECARD -->
    ${buildScorecardHTML(mt, allMt)}

    <!-- ALERTS (overdue / CIP) -->
    ${buildAlertsHTML(mt, selMonth)}

    <!-- AI NARRATIVE -->
    <div class="rpt-ai-card" id="ai-narrative-card">
      <div class="rpt-ai-header">
        <div class="rpt-ai-label">AI Summary</div>
      </div>
      <div id="ai-narrative-body"></div>
    </div>

    <!-- CHARTS -->
    <div class="rpt-charts-grid">
      <div class="rpt-chart-card"><div class="rpt-chart-title">Status</div><div class="rpt-chart-wrap"><canvas id="chart-status"></canvas></div></div>
      <div class="rpt-chart-card"><div class="rpt-chart-title">Priority</div><div class="rpt-chart-wrap"><canvas id="chart-priority"></canvas></div></div>
      <div class="rpt-chart-card"><div class="rpt-chart-title">By Member</div><div class="rpt-chart-wrap"><canvas id="chart-member"></canvas></div></div>
      ${namedProjs.length?`<div class="rpt-chart-card"><div class="rpt-chart-title">By Project</div><div class="rpt-chart-wrap"><canvas id="chart-project"></canvas></div></div>`:''}
    </div>

    <!-- BY PROJECT -->
    ${namedProjs.length?`
    <div class="rpt-sec-hd"><div class="rpt-sec-title">By Project</div><div class="rpt-sec-count">${namedProjs.length} project${namedProjs.length>1?'s':''}</div></div>
    ${namedProjs.map((proj,idx)=>{
      const pt=byProj[proj];
      const pd=pt.filter(t=>t.status==='done').length;
      const pp=pt.length?Math.round(pd/pt.length*100):0;
      const pc2=pctColor(pp);
      return `<div class="rpt-project">
        <div class="rpt-project-hd" onclick="toggleProject('rp-${idx}')">
          <div class="rpt-project-name">
            &#128193; ${esc(proj)}
            ${isProjectCompletedForMonth(proj,selMonth)?'<span style="font-size:9px;font-weight:700;color:var(--green);background:rgba(52,199,89,.1);padding:2px 7px;border-radius:8px;margin-left:4px">✓ Done</span>':''}
          </div>
          <div class="rpt-project-meta" style="gap:6px">
            <div class="rpt-project-bar-wrap"><div class="rpt-project-bar" style="width:${pp}%;background:${pc2}"></div></div>
            <span class="rpt-project-pct" style="color:${pc2}">${pp}%</span>
            <button onclick="event.stopPropagation();toggleProjectComplete('${proj.replace(/'/g,"\\'")}',${idx})"
              style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:var(--sans);flex-shrink:0"
              id="proj-btn-${idx}">${isProjectCompletedForMonth(proj,selMonth)?'↺ Reopen':'✓ Mark Complete'}</button>
            <span class="rpt-project-arrow" id="rp-arr-${idx}">▾</span>
          </div>
        </div>
        <div class="rpt-project-body" id="rp-${idx}" style="display:none">
          ${pt.map(t=>taskRowHTML(t)).join('')}
        </div>
      </div>`;
    }).join('')}`:''}

    <!-- SHIPPED -->
    ${shipped.length?`
    <div class="rpt-sec-hd"><div class="rpt-sec-title">What We Shipped</div><div class="rpt-sec-count">${shipped.length}</div></div>
    ${shipped.map(t=>taskRowHTML(t)).join('')}`:''}

    <!-- CRITICAL OPEN -->
    ${critOpen.length?`
    <div class="rpt-sec-hd" style="margin-top:16px"><div class="rpt-sec-title" style="color:var(--red)">Critical Open</div><div class="rpt-sec-count">${critOpen.length}</div></div>
    ${critOpen.map(t=>taskRowHTML(t)).join('')}`:''}

    <!-- PENDING -->
    ${pending.length?`
    <div class="rpt-sec-hd" style="margin-top:16px"><div class="rpt-sec-title">Pending / Carry-forward</div><div class="rpt-sec-count">${pending.length}</div></div>
    ${pending.filter(t=>t.priority!=='critical').map(t=>taskRowHTML(t)).join('')}`:''}

    <!-- MEMBER BREAKDOWN -->
    <div class="rpt-sec-hd" style="margin-top:16px"><div class="rpt-sec-title">By Member</div></div>
    ${allMembers.map(m=>{
      const mTasks=allMt.filter(t=>(t.members||[]).some(mm=>mm.name&&mm.name.toLowerCase()===m.name.toLowerCase()));
      if(!mTasks.length) return '';
      const mDone=mTasks.filter(t=>{const mid=(t.members||[]).find(mm=>mm.name&&mm.name.toLowerCase()===m.name.toLowerCase())?.id;return mid?(t.memberStatus||{})[mid]==='done':t.status==='done';}).length;
      const mp=mTasks.length?Math.round(mDone/mTasks.length*100):0;
      const initials=m.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      return `<div class="rpt-member-row">
        <div class="rpt-member-av">${initials}</div>
        <div class="rpt-member-info">
          <div class="rpt-member-name">${esc(m.name)}</div>
          <div class="rpt-member-bar-bg"><div class="rpt-member-bar-fill" style="width:${mp}%"></div></div>
        </div>
        <div class="rpt-member-pct">${mp}%</div>
      </div>`;
    }).join('')}
  `;

  setTimeout(()=>renderCharts(mt),30);

  // Load saved narrative from localStorage
  const saved = loadSavedNarrative(selMonth);
  _cachedNarrative = saved;
  const nb = document.getElementById('ai-narrative-body');
  if(nb) nb.innerHTML = saved ? renderNarrativeBody(saved) : renderNarrativeEmpty();
}
window.renderMonthly=renderMonthly;

function renderNarrativeBody(text) {

    + '<button class="rpt-ai-regen" onclick="editNarrative()" style="margin-top:4px">✏ Edit</button>';
}

function renderNarrativeEdit(text) {
  return '<textarea id="narrative-input" placeholder="Write a 2–3 sentence summary of this month…" '

  myReportPeriod=period;
  document.querySelectorAll('.rpt-period-btn').forEach(b=>b.classList.toggle('active',b.dataset.period===period));
  renderMyReport();

function getMyReportTasks(memberId){
  const now=new Date();
  const memberObj=allMembers.find(m=>m.id===memberId);
  const memberName=memberObj?memberObj.name.toLowerCase():'';
  const isMine=t=>memberName
    ?(t.members||[]).some(m=>m.name&&m.name.toLowerCase()===memberName)
    :(t.members||[]).some(m=>m.id===memberId);

  if(myReportPeriod==='week'){
    const cutoff=new Date(now); cutoff.setDate(cutoff.getDate()-7);
    return allTasks.filter(t=>{
      if(!isMine(t)) return false;
      if(t.status!=='done') return true;
      const ca=t.completedAt?(t.completedAt.toDate?t.completedAt.toDate():new Date(t.completedAt)):null;
      const cr=t.createdAt?(t.createdAt.toDate?t.createdAt.toDate():new Date(t.createdAt)):null;
      return (ca&&ca>=cutoff)||(cr&&cr>=cutoff);
    });
  } else if(myReportPeriod==='quarter'){
    const months=[];
    for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}`);}
    return allTasks.filter(t=>isMine(t)&&months.includes(t.month));
  } else {
    return allTasks.filter(t=>t.month===selMonth&&isMine(t));
  }
}

function getPeriodLabel(){
  if(myReportPeriod==='week') return 'Last 7 Days';
  if(myReportPeriod==='quarter') return 'Last Quarter (3 months)';
  return monthLabel(selMonth);
}

// ── WEEKLY DIGEST ──────────────────────────────────────────────────────────
function renderWeekly(){
  const now=new Date();
  const monday=new Date(now); monday.setDate(now.getDate()-((now.getDay()+6)%7));
  const toStr=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const mondayStr=toStr(monday), todayStr=toStr(now);

  const weekTasks=allTasks.filter(t=>{
    if((t.taskType||'mbc')!=='mbc') return false;
    const cr=t.createdAt?(t.createdAt.toDate?t.createdAt.toDate():new Date(t.createdAt)):null;
    const ca=t.completedAt?(t.completedAt.toDate?t.completedAt.toDate():new Date(t.completedAt)):null;
    if(t.status!=='done') return true;
    return (ca&&toStr(ca)>=mondayStr)||(cr&&toStr(cr)>=mondayStr);
  });

  const done=weekTasks.filter(t=>t.status==='done');
  const inprog=weekTasks.filter(t=>t.status==='inprog');
  const todo=weekTasks.filter(t=>t.status==='todo');

  // Member stats
  const memberStats={};
  weekTasks.forEach(t=>{(t.members||[]).forEach(m=>{
    if(!memberStats[m.name]) memberStats[m.name]={done:0,total:0};
    memberStats[m.name].total++;
    const ms=(t.memberStatus||{})[m.id]||t.status;
    if(ms==='done') memberStats[m.name].done++;
  });});

  const weekLabel=`Mon ${fmtDate(mondayStr)} — ${fmtDate(todayStr)}`;
  const el=document.getElementById('weekly-content');

  el.innerHTML=`
    <div class="panel-hd" style="margin:-0px -0px 12px;padding:0 0 12px;border-bottom:1px solid var(--border)">
      <div class="panel-title">Weekly Digest</div>
      <div style="font-size:11px;color:var(--text3)">${weekLabel}</div>
    </div>

    <!-- Stats -->
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div class="digest-stat"><div class="digest-stat-n" style="color:var(--green)">${done.length}</div><div class="digest-stat-l">Done</div></div>
      <div class="digest-stat"><div class="digest-stat-n" style="color:var(--amber)">${inprog.length}</div><div class="digest-stat-l">In Prog</div></div>
      <div class="digest-stat"><div class="digest-stat-n" style="color:var(--text2)">${todo.length}</div><div class="digest-stat-l">Todo</div></div>
    </div>

    <!-- Done this week -->
    ${done.length?`
    <div class="rpt-sec-hd"><div class="rpt-sec-title">Completed This Week</div><div class="rpt-sec-count">${done.length}</div></div>
    ${done.map(t=>taskRowHTML(t)).join('')}`:`<div class="rpt-empty" style="padding:16px"><div class="rpt-empty-icon">✅</div>No tasks completed yet this week</div>`}

    <!-- In progress -->
    ${inprog.length?`
    <div class="rpt-sec-hd" style="margin-top:16px"><div class="rpt-sec-title">In Progress</div><div class="rpt-sec-count">${inprog.length}</div></div>
    ${inprog.map(t=>taskRowHTML(t)).join('')}`:''}

    <!-- Team -->
    <div class="rpt-sec-hd" style="margin-top:16px"><div class="rpt-sec-title">Team This Week</div></div>
    ${Object.entries(memberStats).sort((a,b)=>b[1].done-a[1].done).map(([name,s])=>{
      const mp=s.total?Math.round(s.done/s.total*100):0;
      const initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      return `<div class="rpt-member-row">
        <div class="rpt-member-av">${initials}</div>
        <div class="rpt-member-info">
          <div class="rpt-member-name">${esc(name)}</div>
          <div class="rpt-member-bar-bg"><div class="rpt-member-bar-fill" style="width:${mp}%"></div></div>
        </div>
        <div class="rpt-member-pct">${s.done}/${s.total}</div>
      </div>`;
    }).join('') || '<div class="rpt-empty" style="padding:12px">No assignments this week</div>'}

    <!-- Copy for WhatsApp -->
    <button onclick="copyWeeklyDigest()" style="width:100%;margin-top:16px;padding:12px;border-radius:var(--r);border:none;background:var(--neon2);color:#0c0c0f;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer">
      📋 Copy for WhatsApp
    </button>
  `;

  // Store for copy
  window._weekDigestData={done,inprog,memberStats,weekLabel};
}

window.exportPDF=()=>{
  const allMt = allTasks.filter(t => t.month===selMonth && (t.taskType||'mbc')==='mbc');
  const mt = applyActiveFilters(allMt);
  if (!mt.length) { alert('No tasks for this month.'); return; }

  const lbl = monthLabel(selMonth);
  const total = mt.length;
  const done  = mt.filter(t=>t.status==='done').length;
  const inprog = mt.filter(t=>t.status==='inprog').length;
  const todoC  = mt.filter(t=>t.status==='todo').length;
  const crit   = mt.filter(t=>t.priority==='critical'&&t.status!=='done').length;
  const pct    = total ? Math.round(done/total*100) : 0;
  const pc     = pct>=80?'#34c759':pct>=50?'#ff9f0a':'#dc2626';

  // Group by project, sort: named projects first, then no-project
  const byProj = {};
  mt.forEach(t => {
    const p = t.project || '— No Project —';
    if (!byProj[p]) byProj[p] = [];
    byProj[p].push(t);
  });
  const projKeys = Object.keys(byProj).sort((a,b) => {
    if (a==='— No Project —') return 1;
    if (b==='— No Project —') return -1;
    return a.localeCompare(b);
  });

  // Sort tasks within each project: done first (by completedAt desc), then inprog, then todo
  function sortTasks(tasks) {
    return [...tasks].sort((a,b) => {
      const order = {done:0, inprog:1, todo:2};
      const ao = order[a.status]??2, bo = order[b.status]??2;
      if (ao !== bo) return ao - bo;
      if (a.status === 'done') {
        const ca = a.completedAt?.toDate ? a.completedAt.toDate() : new Date(a.completedAt||0);
        const cb = b.completedAt?.toDate ? b.completedAt.toDate() : new Date(b.completedAt||0);
        return cb - ca; // most recently done first
      }
      return 0;
    });
  }

  function statusBadge(s) {
    if (s==='done')   return '<span style="display:inline-block;padding:2px 7px;background:#dcfce7;color:#16a34a;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase">✓ Done</span>';
    if (s==='inprog') return '<span style="display:inline-block;padding:2px 7px;background:#fef3c7;color:#d97706;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase">↻ In Progress</span>';
    return '<span style="display:inline-block;padding:2px 7px;background:#f3f4f6;color:#6b7280;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase">○ Todo</span>';
  }

  function prioBadge(p) {
    const map = {critical:['#fee2e2','#dc2626'],high:['#fef3c7','#d97706'],medium:['#dbeafe','#2563eb'],low:['#f3f4f6','#6b7280']};

window.exportMyReportPDF=()=>{
  const sel=document.getElementById('my-report-member');
  const member=allMembers.find(m=>m.id===sel?.value);
  if(!member) return;
  const mt=getMyReportTasks(sel.value);
  const memberId=sel.value;
  const periodLabel=getPeriodLabel();

  const totalDone=mt.filter(t=>{const mid=(t.members||[]).find(m=>m.name&&m.name.toLowerCase()===member.name.toLowerCase())?.id;return mid?(t.memberStatus||{})[mid]==='done':t.status==='done';}).length;
  const total=mt.length;
  const pct=total?Math.round(totalDone/total*100):0;
  const pc=pct>=80?'#34c759':pct>=50?'#ff9f0a':'#ff453a';

  const byProj={};
  mt.forEach(t=>{const p=t.project||'— No Project —';if(!byProj[p])byProj[p]=[];byProj[p].push(t);});
  const projKeys=Object.keys(byProj).sort((a,b)=>{if(a==='— No Project —')return 1;if(b==='— No Project —')return-1;return a.localeCompare(b);});

  function pdfRow(t){
    const ms=(t.memberStatus||{})[memberId]||t.status||'todo';
    const sc=ms==='done'?'#34c759':ms==='inprog'?'#ff9f0a':'#6b7280';
    const si=ms==='done'?'✓':ms==='inprog'?'↻':'○';
    const pc2={critical:'#dc2626',high:'#d97706',medium:'#2563eb',low:'#6b7280'}[t.priority||'medium'];
    return `<tr style="border-bottom:1px solid #f3f4f6">
      <td style="padding:5px 8px;font-size:11px;color:${sc};font-weight:700">${si}</td>
      <td style="padding:5px 8px;font-size:11px;color:#111">${esc(t.label)}</td>
      <td style="padding:5px 8px;font-size:9px;font-weight:700;color:${pc2};text-transform:uppercase">${t.priority||'med'}</td>
      <td style="padding:5px 8px;font-size:10px;color:#6b7280">${t.taskDueDate?fmtDate(t.taskDueDate):''}</td>
    </tr>`;
  }

  const sections=projKeys.map(proj=>{
    const pt=byProj[proj];
    const pd=pt.filter(t=>{const mid=(t.members||[]).find(m=>m.name&&m.name.toLowerCase()===member.name.toLowerCase())?.id;return mid?(t.memberStatus||{})[mid]==='done':t.status==='done';}).length;
    const pp=pt.length?Math.round(pd/pt.length*100):0;
    const pbar=pp>=80?'#34c759':pp>=50?'#ff9f0a':'#dc2626';
    return `<div style="margin-bottom:16px;page-break-inside:avoid">
      <div style="display:flex;justify-content:space-between;padding:7px 10px;background:#f5f3ff;border-left:3px solid #5e5ce6;border-radius:4px;margin-bottom:4px">
        <span style="font-weight:800;font-size:11px;color:#1e1b4b">&#128193; ${esc(proj)}</span>
        <span style="font-size:10px;font-weight:700;color:${pbar}">${pd}/${pt.length} · ${pp}%</span>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:#f9fafb">
          <th style="padding:4px 8px;font-size:9px;font-weight:700;text-align:left;color:#6b7280;width:24px"></th>
          <th style="padding:4px 8px;font-size:9px;font-weight:700;text-align:left;color:#6b7280">Task</th>
          <th style="padding:4px 8px;font-size:9px;font-weight:700;text-align:left;color:#6b7280;width:64px">Priority</th>
          <th style="padding:4px 8px;font-size:9px;font-weight:700;text-align:left;color:#6b7280;width:60px">Due</th>
        </tr></thead>
        <tbody>${pt.map(pdfRow).join('')}</tbody>
      </table>
    </div>`;
  }).join('');

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head>
    <title>My Report — ${esc(member.name)} — ${periodLabel}</title>
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;color:#111;padding:0}@page{size:A4;margin:16mm 14mm}@media print{.no-print{display:none}}</style>
  </head><body>
    <!-- How to read -->
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:10px 14px;margin-bottom:16px">
      <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#059669;margin-bottom:4px">📖 How to Read This Report</div>
      <div style="font-size:10px;color:#374151;line-height:1.6">Tasks for <strong>${esc(member.name)}</strong> · <strong>${periodLabel}</strong>. Grouped by project. ✓ Done &nbsp;·&nbsp; ↻ In Progress &nbsp;·&nbsp; ○ Todo. Percentage shows completion per project and overall.</div>
    </div>
    <!-- Header -->
    <div style="background:#111827;color:#fff;padding:18px 22px;border-radius:6px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">BBM-IN · M/MBC-IN · Internal Communications</div>
        <div style="font-size:18px;font-weight:800">My Report · <span style="color:#0a84ff">${esc(member.name)}</span></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:rgba(255,255,255,.5)">Period</div>
        <div style="font-size:13px;font-weight:700">${periodLabel}</div>
        <div style="font-size:22px;font-weight:800;color:${pc};margin-top:4px">${pct}%</div>
      </div>
    </div>
    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
      <div style="text-align:center;padding:10px;background:#f9fafb;border-radius:6px;border:1px solid #e5e7eb"><div style="font-size:20px;font-weight:800;color:#111">${total}</div><div style="font-size:9px;color:#6b7280;text-transform:uppercase;font-weight:700">Total</div></div>
      <div style="text-align:center;padding:10px;background:#f0fdf4;border-radius:6px;border:1px solid #bbf7d0"><div style="font-size:20px;font-weight:800;color:#059669">${totalDone}</div><div style="font-size:9px;color:#6b7280;text-transform:uppercase;font-weight:700">Done</div></div>
      <div style="text-align:center;padding:10px;background:${pct>=80?'#f0fdf4':pct>=50?'#fffbeb':'#fef2f2'};border-radius:6px;border:1px solid ${pct>=80?'#bbf7d0':pct>=50?'#fde68a':'#fecaca'}"><div style="font-size:20px;font-weight:800;color:${pc}">${pct}%</div><div style="font-size:9px;color:#6b7280;text-transform:uppercase;font-weight:700">Complete</div></div>
    </div>
    ${sections}
    <div style="margin-top:20px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:9px;color:#9ca3af;display:flex;justify-content:space-between">
      <span>WorkDesk · BBM-IN · MBC-IN</span>
      <span>Generated ${new Date().toLocaleString('en-GB')}</span>
    </div>
  </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(),400);
};
