<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WorkDesk — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#07090f">
  <style>
    /* ── TASK CARD STATUS COLORS ── */
    .task-card.status-inprog {
      background: rgba(245,168,0,.07);
      border-color: rgba(245,168,0,.35);
      box-shadow: 0 0 0 1px rgba(245,168,0,.1), 0 4px 16px rgba(245,168,0,.08);
    }
    .task-card.status-done {
      background: rgba(0,229,184,.05);
      border-color: rgba(0,229,184,.2);
      opacity: .55;
    }

    /* ── SLIM TIMER — clock expands to 2/3, controls shrink to 1/3 ── */
    .timer-slim {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      transition: all .35s ease;
    }
    .timer-slim-clock {
      flex: 1;
      text-align: center;
      transition: flex .35s ease;
    }
    .timer-slim-clock.big { flex: 2; }
    .timer-slim-digits {
      font-family: var(--sans);
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--text);
      line-height: 1;
      transition: font-size .35s ease, color .25s;
    }
    .timer-slim-clock.big .timer-slim-digits { font-size: 58px; }
    .timer-slim-digits.run { color: var(--neon); }
    .timer-slim-digits.end { color: var(--red); animation: blink .7s infinite alternate; }
    @keyframes blink { to { opacity:.2 } }
    .timer-slim-st {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 4px;
      transition: color .25s;
    }
    .timer-slim-clock.big .timer-slim-st { color: var(--neon); }
    .timer-slim-controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
      transition: flex .35s ease;
      overflow: hidden;
    }
    .timer-slim-controls.small { flex: 0.5; }
    .timer-slim-presets { display: flex; gap: 6px; }
    .timer-slim-presets .t-pre { flex: 1; padding: 7px 2px; font-size: 13px; white-space: nowrap; overflow: hidden; }
    .timer-slim-btns { display: flex; gap: 6px; }
    .timer-slim-btns .t-btn { flex: 1; padding: 9px 4px; font-size: 13px; }

    /* ── STATS FILTER ── */
    .stat-pill {
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .stat-pill:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.3); }
    .stat-pill.active-filter { border-color: var(--neon) !important; box-shadow: 0 0 0 2px rgba(0,229,184,.15); }

    /* ── COMPACT TASK ROW ── */
    .task-row-compact {
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;
      border-radius:12px;margin-bottom:6px;
      border:1px solid var(--border2);
      background:var(--bg2);
      cursor:pointer;
      transition:all .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .task-row-compact:hover { border-color:var(--neon2);background:var(--bg3); }
    .task-row-compact.status-inprog {
      background:rgba(245,168,0,.06);border-color:rgba(245,168,0,.28);
    }
    .task-row-compact.status-done { opacity:.5; }
    .trc-left { flex:1;min-width:0; }
    .trc-name {
      font-size:14px;font-weight:700;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      margin-bottom:4px;
    }
    .trc-meta { display:flex;align-items:center;gap:5px;flex-wrap:wrap; }
    .trc-members {
      font-size:11px;color:var(--text2);font-weight:600;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      max-width:160px;
    }
    .trc-expand {
      flex-shrink:0;width:28px;height:28px;border-radius:50%;
      border:1px solid var(--border2);background:var(--bg3);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;color:var(--text2);transition:all .2s;
      cursor:pointer;
    }
    .trc-expand.open { transform:rotate(180deg);border-color:var(--neon);color:var(--neon); }
    /* Expanded detail panel */
    .task-detail {
      display:none;
      margin-bottom:8px;margin-top:-2px;
      padding:12px 14px;
      border-radius:0 0 12px 12px;
      border:1px solid var(--border2);border-top:none;
      background:var(--bg3);
      animation:sld .18s ease;
    }
    .task-detail.open { display:block; }

    /* ── DONE SECTION ── */
    .done-section-toggle {
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 12px;margin-top:8px;
      border-radius:10px;border:1px solid var(--border2);
      background:var(--bg2);cursor:pointer;
      font-size:12px;font-weight:700;color:var(--text2);
      user-select:none;-webkit-tap-highlight-color:transparent;
      transition:all .15s;
    }
    .done-section-toggle:hover { border-color:var(--neon2);color:var(--text) }
    .done-section-arrow { transition:transform .2s;font-size:10px }
    .done-section-arrow.open { transform:rotate(180deg) }
    .done-section-body { display:none;margin-top:4px }
    .done-section-body.open { display:block }
    /* Collapsible month within done section */
    .done-month-toggle {
      display:flex;align-items:center;justify-content:space-between;
      padding:7px 10px;margin:4px 0 2px;
      border-radius:8px;background:var(--bg3);
      font-size:10px;font-weight:800;color:var(--text2);
      letter-spacing:.06em;text-transform:uppercase;
      cursor:pointer;user-select:none;transition:all .15s;
    }
    .done-month-toggle:hover { background:var(--bg2);color:var(--text) }
    .done-month-arrow { font-size:9px;transition:transform .18s }
    .done-month-arrow.open { transform:rotate(180deg) }
    .done-month-body { display:none }
    .done-month-body.open { display:block }

    /* Collapsible By Member card */
    .member-card {
      background:var(--panel);border:1px solid var(--border2);
      border-radius:14px;margin-bottom:8px;overflow:hidden;
      box-shadow:var(--shadow-card);
    }
    .member-card-hd {
      display:flex;align-items:center;gap:10px;
      padding:12px 14px;cursor:pointer;
      transition:background .12s;
      user-select:none;-webkit-tap-highlight-color:transparent;
    }
    .member-card-hd:hover { background:var(--bg3) }
    .member-card-body { display:none;padding:0 14px 12px }
    .member-card-body.open { display:block }
    .member-card-arrow { font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0 }
    .member-card-arrow.open { transform:rotate(180deg) }
    .member-card-rank {
      font-size:10px;font-weight:800;color:var(--text3);
      width:18px;text-align:center;flex-shrink:0;
    }
    .member-card-rank.gold   { color:#f5a800 }
    .member-card-rank.silver { color:#94a3b8 }
    .member-card-rank.bronze { color:#b87333 }

    /* ── INDIVIDUAL TASK BADGE ── */
    .individual-badge {
      display:inline-flex;align-items:center;gap:3px;
      padding:2px 7px;border-radius:20px;font-size:9px;font-weight:800;
      background:rgba(157,126,255,.1);color:var(--purple);
      border:1px solid rgba(157,126,255,.25);flex-shrink:0;
    }

    /* ── COMMS CARD (calendar events in My Tasks) ── */
    .comms-card {
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;border-radius:12px;margin-bottom:6px;
      border:1.5px solid rgba(157,126,255,.3);
      background:rgba(157,126,255,.07);
      cursor:pointer;transition:all .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .comms-card:hover { background:rgba(157,126,255,.12) }
    .comms-card-left { flex:1;min-width:0 }
    .comms-card-type {
      font-size:10px;font-weight:800;color:var(--purple);
      letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;
    }
    .comms-card-subject {
      font-size:14px;font-weight:700;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;
    }
    .comms-card-meta { font-size:11px;color:var(--text2) }
    .comms-status-planned { color:#60a5fa;font-weight:800 }
    .comms-status-sent    { color:#34d399;font-weight:800 }
    .comms-status-delayed { color:#f87171;font-weight:800 }
    .comms-section-label {
      font-size:10px;font-weight:700;color:var(--purple);
      letter-spacing:.1em;text-transform:uppercase;
      padding:6px 0 4px;display:flex;align-items:center;gap:6px;
    }
    .comms-section-label::before {
      content:'';flex:1;height:1px;background:rgba(157,126,255,.2);
    }
    .comms-section-label::after {
      content:'';flex:1;height:1px;background:rgba(157,126,255,.2);
    }

    /* ── DUE TODAY HIGHLIGHT ── */
    .task-row-compact.due-today {
      border-left:3px solid var(--red) !important;
      background:rgba(255,58,94,.07) !important;
      border-color:rgba(255,58,94,.35) !important;
      box-shadow:0 0 0 1px rgba(255,58,94,.1);
    }
    .due-today-badge {
      display:inline-flex;align-items:center;gap:3px;
      padding:2px 7px;border-radius:20px;
      font-size:9px;font-weight:800;
      background:rgba(255,58,94,.15);color:var(--red);
      border:1px solid rgba(255,58,94,.3);
      animation:pulse-badge 1.5s ease-in-out infinite;
    }
    @keyframes pulse-badge {
      0%,100%{opacity:1} 50%{opacity:.6}
    }
    .due-soon-badge {
      display:inline-flex;align-items:center;gap:3px;
      padding:2px 7px;border-radius:20px;
      font-size:9px;font-weight:800;
      background:rgba(245,168,0,.12);color:var(--amber);
      border:1px solid rgba(245,168,0,.3);
    }

    /* ── GREETING BAR ── */
    .greeting-bar {
      padding:14px 16px;
      background:var(--panel);
      border:1px solid var(--border2);
      border-radius:var(--rr);
      margin-bottom:12px;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:var(--shadow-card);
    }
    .greeting-text { font-size:15px;font-weight:700;color:var(--text);line-height:1.4 }
    .greeting-sub  { font-size:12px;color:var(--text2);margin-top:2px }
    .streak-badge  {
      display:flex;align-items:center;gap:5px;
      background:rgba(245,168,0,.1);border:1px solid rgba(245,168,0,.25);
      border-radius:20px;padding:5px 12px;
      font-size:13px;font-weight:800;color:var(--amber);
      white-space:nowrap;flex-shrink:0;
    }

    /* ── CONFETTI ── */
    .confetti-wrap {
      position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;
    }
    .confetti-piece {
      position:absolute;width:8px;height:8px;border-radius:2px;
      animation:confetti-fall 1s ease-in forwards;
      top:-10px;
    }
    @keyframes confetti-fall {
      0%   { transform:translateY(0) rotate(0deg);   opacity:1; }
      100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
    }

    /* ── COMMENTS ── */
    .comment-section { margin-top:10px;border-top:1px solid var(--border);padding-top:10px }
    .comment-list { max-height:150px;overflow-y:auto;margin-bottom:8px }
    .comment-item {
      padding:6px 9px;border-radius:8px;margin-bottom:5px;
      background:var(--bg2);border:1px solid var(--border);
    }
    .comment-author { font-size:11px;font-weight:700;color:var(--neon);margin-bottom:2px }
    .comment-text   { font-size:12px;color:var(--text);line-height:1.4 }
    .comment-time   { font-size:9px;color:var(--text3);margin-top:2px }
    .comment-edit-inp {
      flex:1;background:var(--bg2);border:1.5px solid var(--neon);
      border-radius:7px;padding:5px 9px;color:var(--text);
      font-family:var(--sans);font-size:12px;outline:none;
    }
    .comment-edit-row { display:flex;gap:6px;margin-top:5px }
    .comment-edit-save {
      padding:4px 10px;border-radius:7px;border:none;
      background:var(--neon);color:var(--bg);
      font-family:var(--sans);font-size:11px;font-weight:800;cursor:pointer;
    }
    .comment-edit-cancel {
      padding:4px 10px;border-radius:7px;
      border:1px solid var(--border2);background:none;color:var(--text2);
      font-family:var(--sans);font-size:11px;font-weight:700;cursor:pointer;
    }
    .comment-edit-btn {
      background:none;border:none;cursor:pointer;
      font-size:11px;color:var(--text3);padding:2px 5px;
      border-radius:5px;transition:color .12s;
    }
    .comment-edit-btn:hover { color:var(--neon) }
    .comment-input-row { display:flex;gap:7px }
    .comment-inp {
      flex:1;background:var(--bg2);border:1.5px solid var(--border2);
      border-radius:9px;padding:7px 10px;color:var(--text);
      font-family:var(--sans);font-size:13px;outline:none;
    }
    .comment-inp:focus { border-color:var(--neon) }
    .comment-send {
      padding:7px 12px;border-radius:9px;border:none;
      background:var(--neon);color:var(--bg);
      font-family:var(--sans);font-size:12px;font-weight:800;
      cursor:pointer;white-space:nowrap;
    }

    /* ── REMINDER ── */
    .reminder-row {
      display:flex;align-items:center;gap:8px;
      margin-top:8px;flex-wrap:wrap;
    }
    .reminder-badge {
      display:inline-flex;align-items:center;gap:5px;
      padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;
      background:rgba(157,126,255,.1);color:var(--purple);
      border:1px solid rgba(157,126,255,.25);cursor:pointer;
    }
    .reminder-badge:hover { background:rgba(157,126,255,.18) }
    .reminder-modal {
      position:fixed;inset:0;background:rgba(0,0,0,.6);
      z-index:300;display:none;align-items:center;justify-content:center;
      backdrop-filter:blur(4px);
    }
    .reminder-modal.open { display:flex }
    .reminder-box {
      background:var(--panel);border:1.5px solid var(--border2);
      border-radius:18px;padding:20px;width:90%;max-width:340px;
      box-shadow:0 8px 40px rgba(0,0,0,.5);
    }
    .reminder-title { font-size:14px;font-weight:800;color:var(--text);margin-bottom:14px }
    .reminder-fields { display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap }
    .reminder-fields input {
      flex:1;min-width:120px;background:var(--bg2);border:1.5px solid var(--border2);
      border-radius:9px;padding:8px 11px;color:var(--text);
      font-family:var(--sans);font-size:13px;outline:none;
    }
    .reminder-fields input:focus { border-color:var(--purple) }
    .reminder-btns { display:flex;gap:8px;justify-content:flex-end }
    .reminder-set { padding:8px 18px;border-radius:9px;border:none;background:var(--purple);color:#fff;font-family:var(--sans);font-size:13px;font-weight:800;cursor:pointer }
    .reminder-cancel { padding:8px 14px;border-radius:9px;border:1.5px solid var(--border2);background:none;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer }
    .reminder-dismiss { padding:8px 14px;border-radius:9px;border:1.5px solid rgba(255,58,94,.3);background:none;color:var(--red);font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer }

    /* ── PULL TO REFRESH ── */
    .ptr-indicator {
      text-align:center;padding:14px;
      font-size:13px;font-weight:700;color:var(--text2);
      display:none;
    }
    .ptr-indicator.visible { display:block }

    /* ── WEEKLY DIGEST ── */
    .digest-panel { }

    /* ── FILTER BANNER ── */
    .filter-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(0,229,184,.06);
      border: 1px solid rgba(0,229,184,.2);
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--neon);
    }
    .filter-clear {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--sans);
      padding: 2px 6px;
      border-radius: 6px;
    }
    .filter-clear:hover { color: var(--red); }
  </style>
</head>

  <!-- SLIM TIMER — at top -->
  <div class="panel fi" style="animation-delay:.02s">
    <div class="panel-hd"><span class="panel-title">Focus Timer</span></div>
    <div class="timer-slim">
      <div class="timer-slim-clock" id="t-clock">
        <div class="timer-slim-digits" id="t-disp">45:00</div>
        <div class="timer-slim-st" id="t-st">Ready</div>
      </div>

        </div>
      </div>
    </div>
  </div>

  <!-- STATS — clickable filters -->
  <div class="stats-row fi" style="animation-delay:.05s">

    </div>
  </div>

<!-- REMINDER MODAL -->
<div class="reminder-modal" id="reminder-modal">
  <div class="reminder-box">
    <div class="reminder-title">🔔 Set Reminder</div>
    <div id="reminder-task-name" style="font-size:12px;color:var(--text2);margin-bottom:12px;font-weight:600"></div>
    <div class="reminder-fields">
      <input type="date" id="reminder-date">
      <input type="time" id="reminder-time" value="09:00">
    </div>
    <div class="reminder-btns">
      <button class="reminder-cancel" onclick="closeReminderModal()">Cancel</button>
      <button class="reminder-dismiss" id="reminder-dismiss-btn" onclick="dismissReminderNow()" style="display:none">Remove</button>
      <button class="reminder-set" onclick="confirmReminder()">Set Reminder</button>
    </div>
  </div>
</div>

<script type="module">
import { onUserReady, onTasksChanged, getMembers, updateTask, getUserData, saveUserData, onUserDataChanged, getStreak, recordTaskCompletion, addComment, updateComment, onCommentsChanged, setReminder, snoozeReminder, dismissReminder, onCalendarChanged } from './js/firebase.js';
import { initTheme, toggleThemePanel } from './js/theme.js';
import { initAudio, playTimerDone, playTaskAssigned, playMarkDone, playReopen, toggleMute, getMuted } from './js/sounds.js';

let tasks = [], members = [];
let calendarEvents = {}; // comms calendar events
let todayStr = new Date().toISOString().slice(0,10); // date string, refreshed daily
let MY_NAME = localStorage.getItem('wd_myname') || '';
const ADMIN_NAME = 'Harshit'; // Admin can mark anyone's tasks done
let activeFilter = null; // 'total'|'inprog'|'done'|'critical'|null

// Theme handled by theme.js
initTheme();
window.toggleThemePanel = toggleThemePanel;
initAudio();

// Mute button init
function updateMuteBtn() {
  const btn = document.getElementById('mute-btn');
  if (btn) btn.textContent = getMuted() ? '🔇' : '🔊';
}
window.handleMuteToggle = () => { toggleMute(); updateMuteBtn(); };
updateMuteBtn();

// BOOTSTRAP
onUserReady(async () => {
  // Ask for name first (before listener fires so renderAll has MY_NAME)
  if (!MY_NAME) {
    MY_NAME = prompt('Your name (to show your tasks):') || '';
    if (MY_NAME) localStorage.setItem('wd_myname', MY_NAME);
  }

  // Load members once (they don't change often)
  members = await getMembers();

  // Real-time task listener — fires immediately + on every change
  onTasksChanged(({ tasks: liveTasks, changes }) => {
    tasks = liveTasks;

    // Check for newly added tasks that include this user
    changes.forEach(({ type, task }) => {
      if (type === 'added') {
        const assignedToMe = MY_NAME &&
          (task.members || []).some(m => m.name.toLowerCase() === MY_NAME.toLowerCase());
        if (assignedToMe) {
          playTaskAssigned();
          toast('📋 New task assigned to you!');
        }
      }
      if (type === 'modified') {
        // If a task just became done and you're assigned, play a chime
        const assignedToMe = MY_NAME &&
          (task.members || []).some(m => m.name.toLowerCase() === MY_NAME.toLowerCase());
        if (assignedToMe && task.status === 'done') {
          // Only play if it wasn't done before (avoid re-playing on unrelated updates)
          const prev = tasks.find(t => t.id === task.id);
          if (prev && prev.status !== 'done') playTimerDone();
        }
      }
    });

    renderAll();

    // Show main content on first load
    const loader = document.getElementById('page-loader');
    if (loader) {
      loader.style.display = 'none';
      document.getElementById('main').style.display = '';
      initNotes(); // init notes after DOM is visible and MY_NAME is set
    }
  });
});

function renderAll() { renderStats(); renderMyTasks(); renderByMember(); renderFollowup(); renderGreeting(); }

// ── STATS FILTER ───────────────────────────────────────────────────────────
window.filterTasks = (type) => {
  if (activeFilter === type) {
    // toggle off
    activeFilter = null;
    document.querySelectorAll('.stat-pill').forEach(p => p.classList.remove('active-filter'));
  } else {
    activeFilter = type;
    document.querySelectorAll('.stat-pill').forEach(p => p.classList.remove('active-filter'));
    document.getElementById('sp-' + (type === 'critical' ? 'crit' : type === 'total' ? 'total' : type)).classList.add('active-filter');
  }
  // Switch to My Tasks tab to show filtered results
  switchTab('mytasks', document.querySelector('.tab'));
  renderMyTasks();
};

window.clearFilter = () => {
  activeFilter = null;
  document.querySelectorAll('.stat-pill').forEach(p => p.classList.remove('active-filter'));
  renderMyTasks();
};

// ── STATS ──────────────────────────────────────────────────────────────────
function renderStats() {
  // Exclude individual tasks from all stats and progress bar
  const mbcTasks = tasks.filter(t => (t.taskType||'mbc') === 'mbc');
  const total = mbcTasks.length;
  const done  = mbcTasks.filter(t => t.status === 'done').length;
  const inprog = mbcTasks.filter(t => t.status === 'inprog').length;
  const crit  = mbcTasks.filter(t => t.priority === 'critical' && t.status !== 'done').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  set('s-total', total); set('s-inprog', inprog); set('s-done', done); set('s-crit', crit);
  set('prog-pct', pct + '%');
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ── MY TASKS ───────────────────────────────────────────────────────────────
function renderMyTasks() {
  const el = document.getElementById('my-tasks-list');

  // Get base task list — if filter active show ALL tasks in that filter, not just mine
  let taskList;
  if (activeFilter && activeFilter !== 'total') {
    // Show all tasks matching the filter (not just assigned to me)
    if (activeFilter === 'inprog') taskList = tasks.filter(t => t.status === 'inprog');
    else if (activeFilter === 'done') taskList = tasks.filter(t => t.status === 'done');
    else if (activeFilter === 'critical') taskList = tasks.filter(t => t.priority === 'critical' && t.status !== 'done');
  } else if (activeFilter === 'total') {
    taskList = [...tasks];
  } else {
    // Default: only my tasks
    taskList = MY_NAME
      ? tasks.filter(t => (t.members||[]).some(m => m.name.toLowerCase() === MY_NAME.toLowerCase()))
      : tasks;
  }

  // Filter banner
  const filterLabels = { total: 'All Tasks', inprog: 'In Progress', done: 'Done', critical: 'Critical' };
  const banner = activeFilter
    ? `<div class="filter-banner">
        Showing: ${filterLabels[activeFilter]} (${taskList.length})
        <button class="filter-clear" onclick="clearFilter()">✕ Clear</button>
       </div>`
    : '';

  if (!taskList.length) {
    el.innerHTML = banner + `<div class="empty"><div class="ei">◈</div>${activeFilter ? 'No tasks in this category' : MY_NAME ? `Nothing on your plate right now, ${esc(MY_NAME)} 🎉` : 'No tasks yet — add one in the Input tab'}</div>`;
    return;
  }

  const po = {critical:0,high:1,medium:2,low:3}, so = {inprog:0,todo:1,done:2};
  const now16   = new Date().toISOString().slice(0,16);
  const todayStr = new Date().toISOString().slice(0,10);
  const sorted = [...taskList].sort((a,b) => {
    // 1st: tasks due today (taskDueDate === today) that aren't done
    const aDueToday = a.taskDueDate === todayStr && a.status !== 'done' ? -1 : 0;
    const bDueToday = b.taskDueDate === todayStr && b.status !== 'done' ? -1 : 0;
    if (aDueToday !== bDueToday) return aDueToday - bDueToday;
    // 2nd: tasks with active reminders due now
    const aRem = a.reminder?.active && `${a.reminder.date}T${a.reminder.time}` <= now16 ? -1 : 0;
    const bRem = b.reminder?.active && `${b.reminder.date}T${b.reminder.time}` <= now16 ? -1 : 0;
    if (aRem !== bRem) return aRem - bRem;
    // 3rd: status + priority
    return (so[a.status]??1)-(so[b.status]??1)||(po[a.priority]??2)-(po[b.priority]??2);
  });
  // Build comms cards from calendar for this user
  const myCommsCards = [];
  Object.entries(calendarEvents).forEach(([date, evts]) => {
    if (!Array.isArray(evts)) return;
    evts.forEach(ev => {
      if (!ev.people) return;
      const people = ev.people.split(',').map(p => p.trim().toLowerCase());
      const isMe = MY_NAME && people.some(p => p === MY_NAME.toLowerCase());
      if (!isMe) return;
      if (ev.status === 'Sent') return; // done — hide from My Tasks
      // Show if today or upcoming (within 7 days) or overdue
      const daysFromToday = Math.ceil((new Date(date) - new Date(todayStr)) / 86400000);
      if (daysFromToday > 7) return; // too far in future
      myCommsCards.push({ date, daysFromToday, ev });
    });
  });

  // Sort: overdue first, then today, then upcoming
  myCommsCards.sort((a,b) => a.daysFromToday - b.daysFromToday);

  const commsHTML = myCommsCards.length ? `
    <div class="comms-section-label">📡 Communications</div>
    ${myCommsCards.map(({date, daysFromToday, ev}) => {
      const st = ev.status || 'Planned';
      const stClass = 'comms-status-' + st.toLowerCase();
      const stIcon = st === 'Sent' ? '✅' : st === 'Delayed' ? '⚠️' : '🔵';
      const dateLabel = daysFromToday < 0 ? `Overdue by ${Math.abs(daysFromToday)}d`
                      : daysFromToday === 0 ? 'Today'
                      : `In ${daysFromToday}d · ${date}`;
      return `<div class="comms-card" onclick="window.open('calendar.html','_self')">
        <div class="comms-card-left">
          <div class="comms-card-type">${esc(ev.type||'Comms')}</div>
          <div class="comms-card-subject">${esc(ev.subject)}</div>
          <div class="comms-card-meta">
            📅 ${dateLabel} &nbsp;·&nbsp; <span class="${stClass}">${stIcon} ${st}</span>
          </div>
        </div>
      </div>`;
    }).join('')}
    <div class="comms-section-label">📋 Tasks</div>
  ` : '';

  // Separate active from done tasks
  const activeTasks = sorted.filter(t => t.status !== 'done');
  const doneTasks   = sorted.filter(t => t.status === 'done');

  // Group done tasks by month
  const doneByMonth = {};
  doneTasks.forEach(t => {
    const key = t.month || 'Unknown';
    if (!doneByMonth[key]) doneByMonth[key] = [];
    doneByMonth[key].push(t);
  });

  const doneMonthKeys = Object.keys(doneByMonth).sort((a,b) => b.localeCompare(a));
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtMonthKey(key) {
    const [y,m] = key.split('-');
    return m ? MONTH_NAMES[parseInt(m)-1] + ' ' + y : key;
  }

  const doneHTML = doneTasks.length ? `
    <div class="done-section-toggle" onclick="toggleDoneSection()" id="done-toggle">
      <span>✅ Done (${doneTasks.length})</span>
      <span class="done-section-arrow" id="done-arrow">▼</span>
    </div>
    <div class="done-section-body" id="done-body">
      ${doneMonthKeys.map((key, mi) => `
        <div class="done-month-toggle" onclick="toggleDoneMonth('dm-${mi}')" id="dm-toggle-${mi}">
          <span>${fmtMonthKey(key)} · ${doneByMonth[key].length} task${doneByMonth[key].length>1?'s':''}</span>
          <span class="done-month-arrow" id="dm-arrow-${mi}">▼</span>
        </div>
        <div class="done-month-body" id="dm-${mi}">
          ${doneByMonth[key].map((t,i) => myTaskCard(t, i)).join('')}
        </div>
      `).join('')}
    </div>
  ` : '';

  el.innerHTML = banner + commsHTML + activeTasks.map((t,i) => myTaskCard(t, i)).join('') + doneHTML;
}

// Track which task rows are expanded
const expandedTasks = new Set();

let _doneOpen = false;
window.toggleDoneSection = () => {
  _doneOpen = !_doneOpen;
  const body  = document.getElementById('done-body');
  const arrow = document.getElementById('done-arrow');
  if (body)  body.classList.toggle('open', _doneOpen);
  if (arrow) arrow.classList.toggle('open', _doneOpen);
};
const _doneMonthOpen = {};
window.toggleDoneMonth = (id) => {
  _doneMonthOpen[id] = !_doneMonthOpen[id];
  const body  = document.getElementById(id);
  const arrow = document.getElementById('dm-arrow-' + id.replace('dm-',''));
  if (body)  body.classList.toggle('open', _doneMonthOpen[id]);
  if (arrow) arrow.classList.toggle('open', _doneMonthOpen[id]);
};

window.toggleTaskExpand = (id) => {
  if (expandedTasks.has(id)) expandedTasks.delete(id);
  else expandedTasks.add(id);
  const detail = document.getElementById('trd-' + id);
  const btn    = document.getElementById('trx-' + id);
  if (!detail || !btn) return;
  const isOpen = expandedTasks.has(id);
  detail.classList.toggle('open', isOpen);
  btn.classList.toggle('open', isOpen);
  // Load comments when expanded
  if (isOpen) {
    const commentContainer = document.getElementById('comments-' + id);
    if (commentContainer && !commentContainer.dataset.loaded) {
      commentContainer.dataset.loaded = '1';
      renderCommentSection(id, commentContainer);
    }
  }
};

function myTaskCard(t, i) {
  const pc = {critical:'pc',high:'ph',medium:'pm',low:'pl'}[t.priority||'medium'];
  const pTag = {critical:'t-crit',high:'t-high',medium:'t-med',low:'t-low'}[t.priority||'medium'];
  const stTag = {todo:'t-todo',inprog:'t-ip',done:'t-done'}[t.status||'todo'];
  const stLbl = {todo:'Todo',inprog:'In Progress',done:'Done'}[t.status||'todo'];
  const isDone = t.status === 'done';
  const isInprog = t.status === 'inprog';
  const statusClass = isDone ? 'status-done' : isInprog ? 'status-inprog' : '';
  const isExpanded = expandedTasks.has(t.id);

  const myMemberData = (t.members||[]).find(m => m.name.toLowerCase() === (MY_NAME||'').toLowerCase());
  const myRespTask = myMemberData?.role || '';
  const myMemberId = myMemberData ? members.find(m => m.name.toLowerCase() === (MY_NAME||'').toLowerCase())?.id : null;
  const myStatus = myMemberId ? getMemberStatus(t, myMemberId) : t.status;
  const myIsDone = myStatus === 'done';
  const others = (t.members||[]).filter(m => m.name.toLowerCase() !== (MY_NAME||'').toLowerCase());
  const allNames = ['You', ...others.map(m => esc(m.name))].join(', ');
  // Left accent color based on priority
  const accentColor = {critical:'var(--red)',high:'var(--amber)',medium:'var(--neon2)',low:'var(--text3)'}[t.priority||'medium'];

  return `
    <div style="animation-delay:${i*.03}s" class="fi">
      <!-- COMPACT ROW -->
      <div class="task-row-compact ${statusClass}${t.taskDueDate === todayStr && t.status !== 'done' ? ' due-today' : ''}" id="trc-${t.id}"
        onclick="toggleTaskExpand('${t.id}')"
        style="border-left:3px solid ${t.taskDueDate === todayStr && t.status !== 'done' ? 'var(--red)' : accentColor}">
        <div class="trc-left">
          <div class="trc-name">${esc(t.label)}</div>
          <div class="trc-meta">
            ${t.taskType === 'individual' ? '<span class="individual-badge">👤 Individual</span>' : ''}
            <span class="tag ${pTag}" style="font-size:9px;padding:2px 6px">${t.priority||'medium'}</span>
            <span class="tag ${stTag}" style="font-size:9px;padding:2px 6px">${stLbl}</span>
            ${t.taskDueDate && t.status !== 'done' ? (() => {
              const daysLeft = Math.ceil((new Date(t.taskDueDate) - new Date(todayStr)) / 86400000);
              if (daysLeft < 0)  return '<span class="due-today-badge">⚠ Overdue</span>';
              if (daysLeft === 0) return '<span class="due-today-badge">🔴 Due Today</span>';
              if (daysLeft <= 3) return `<span class="due-soon-badge">⏰ ${daysLeft}d left</span>`;
              return '';
            })() : ''}
            <span class="trc-members">· ${allNames}</span>
          </div>
        </div>
        <div class="trc-expand${isExpanded?' open':''}" id="trx-${t.id}">▾</div>
      </div>

      <!-- EXPANDED DETAIL -->
      <div class="task-detail${isExpanded?' open':''}" id="trd-${t.id}">
        ${t.taskDueDate && t.status !== 'done' ? (() => {
          const daysLeft = Math.ceil((new Date(t.taskDueDate) - new Date(todayStr)) / 86400000);
          const label = daysLeft < 0 ? '⚠ Overdue by ' + Math.abs(daysLeft) + ' day' + (Math.abs(daysLeft)>1?'s':'')
                      : daysLeft === 0 ? '🔴 Due Today'
                      : '📅 Due in ' + daysLeft + ' day' + (daysLeft>1?'s':'');
          const col = daysLeft <= 0 ? 'var(--red)' : daysLeft <= 3 ? 'var(--amber)' : 'var(--text2)';
          return `<div style="font-size:12px;font-weight:700;color:${col};margin-bottom:8px">${label} — ${t.taskDueDate}</div>`;
        })() : ''}
        <div class="tc-members" style="margin-bottom:10px">
          <span class="m-pill">
            <span class="m-pill-name">You${myIsDone?' ✓':''}</span>
            <span class="m-pill-role">${myRespTask ? esc(myRespTask) : 'No resp. task set'}</span>
          </span>
          ${others.map(m => {
            const otherId = members.find(mm => mm.name.toLowerCase() === m.name.toLowerCase())?.id;
            const otherDone = otherId ? getMemberStatus(t, otherId) === 'done' : false;
            return `<span class="m-pill" style="${otherDone?'opacity:.6':''}">
              <span class="m-pill-name">${esc(m.name)}${otherDone?' ✓':''}</span>
              <span class="m-pill-role">${m.role ? esc(m.role) : 'No resp. task set'}</span>
            </span>`;
          }).join('')}
        </div>
        <div class="tc-actions">
          ${!isDone ? `<button class="sc-btn" onclick="event.stopPropagation();cycleOverall('${t.id}')">
            ${t.status === 'todo' ? 'Start →' : 'Back to Todo ↩'}
          </button>` : ''}
          ${myMemberId ? `
          <button class="mark-done-btn${myIsDone?' undone':''}"
            onclick="event.stopPropagation();setMemberStatusWindow('${t.id}','${myMemberId}','${myIsDone?'todo':'done'}')">
            ${myIsDone ? '↩ Reopen My Task' : '✓ My Task Done'}
          </button>` : ''}
          <button class="reminder-badge" onclick="event.stopPropagation();openReminderModal('${t.id}')"
            title="Set reminder">
            ${t.reminder?.active ? '🔔 Reminder set' : '🔔 Remind me'}
          </button>
        </div>
        <div id="comments-${t.id}" onclick="event.stopPropagation()"></div>
      </div>
    </div>`;
}

// ── BY MEMBER ──────────────────────────────────────────────────────────────
function renderByMember() {
  const el = document.getElementById('by-member-list');
  if (!members.length) { el.innerHTML = '<div class="empty"><div class="ei">◈</div>No members yet.</div>'; return; }
  let html = '';
  // Sort members by completion % — highest first (leaderboard)
  const sortedMembers = [...members].sort((a, b) => {
    const aTasks = tasks.filter(t => (t.members||[]).some(mm => mm.id === a.id));
    const bTasks = tasks.filter(t => (t.members||[]).some(mm => mm.id === b.id));
    const aPct = aTasks.length ? aTasks.filter(t => getMemberStatus(t,a.id)==='done').length/aTasks.length : 0;
    const bPct = bTasks.length ? bTasks.filter(t => getMemberStatus(t,b.id)==='done').length/bTasks.length : 0;
    return bPct - aPct;
  });
  const expandedMembers = new Set();
  window.toggleMemberCard = (mid) => {
    if (expandedMembers.has(mid)) expandedMembers.delete(mid);
    else expandedMembers.add(mid);
    const body  = document.getElementById('mc-body-' + mid);
    const arrow = document.getElementById('mc-arrow-' + mid);
    if (body)  body.classList.toggle('open', expandedMembers.has(mid));
    if (arrow) arrow.classList.toggle('open', expandedMembers.has(mid));
  };
  const expandedMemberDone = {};
  window.toggleMemberDone = (mid) => {
    expandedMemberDone[mid] = !expandedMemberDone[mid];
    const body  = document.getElementById('mc-done-' + mid);
    const arrow = document.getElementById('mc-done-arrow-' + mid);
    if (body)  body.classList.toggle('open', expandedMemberDone[mid]);
    if (arrow) arrow.classList.toggle('open', expandedMemberDone[mid]);
  };
  const expandedMemberMonth = {};
  window.toggleMemberMonth = (key) => {
    expandedMemberMonth[key] = !expandedMemberMonth[key];
    const body  = document.getElementById('mc-month-' + key);
    const arrow = document.getElementById('mc-month-arrow-' + key);
    if (body)  body.classList.toggle('open', expandedMemberMonth[key]);
    if (arrow) arrow.classList.toggle('open', expandedMemberMonth[key]);
  };

  const MONTH_NAMES_BM = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const fmtBMKey = key => { const [y,m] = key.split('-'); return m ? MONTH_NAMES_BM[parseInt(m)-1]+' '+y : key; };
  const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
  const rankIcon  = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)+'';

  sortedMembers.forEach((m, rank) => {
    const mTasks = tasks.filter(t => {
      if (!(t.members||[]).some(mm => mm.id === m.id)) return false;
      if (t.taskType !== 'individual') return true;
      const isAdminView = MY_NAME && MY_NAME.toLowerCase() === 'harshit';
      const isOwnSection = MY_NAME && m.name.toLowerCase() === MY_NAME.toLowerCase();
      return isAdminView || isOwnSection;
    });
    const activeTasks = mTasks.filter(t => getMemberStatus(t, m.id) !== 'done');
    const doneTasks   = mTasks.filter(t => getMemberStatus(t, m.id) === 'done');
    const memberDone  = doneTasks.length;
    const total = mTasks.length;
    const pct   = total ? Math.round(memberDone / total * 100) : 0;
    const isOpen = expandedMembers.has(m.id);

    // Group done tasks by month
    const doneByMonthBM = {};
    doneTasks.forEach(t => {
      const key = m.id + '-' + (t.month || 'Unknown');
      if (!doneByMonthBM[key]) doneByMonthBM[key] = [];
      doneByMonthBM[key].push(t);
    });
    const doneMonthKeysBM = Object.keys(doneByMonthBM).sort((a,b) => b.localeCompare(a));

    const doneSection = doneTasks.length ? `
      <div class="done-section-toggle" style="margin-top:8px"
        onclick="event.stopPropagation();toggleMemberDone('${m.id}')">
        <span>✅ Done (${doneTasks.length})</span>
        <span class="done-section-arrow" id="mc-done-arrow-${m.id}">▼</span>
      </div>
      <div class="done-section-body" id="mc-done-${m.id}">
        ${doneMonthKeysBM.map(key => `
          <div class="done-month-toggle"
            onclick="event.stopPropagation();toggleMemberMonth('${key}')">
            <span>${fmtBMKey(key.split('-').slice(1).join('-'))} · ${doneByMonthBM[key].length}</span>
            <span class="done-month-arrow" id="mc-month-arrow-${key}">▼</span>
          </div>
          <div class="done-month-body" id="mc-month-${key}">
            ${doneByMonthBM[key].map((t,i) => memberTaskCard(t, m, i)).join('')}
          </div>
        `).join('')}
      </div>` : '';

    html += `<div class="member-card">
      <div class="member-card-hd" onclick="toggleMemberCard('${m.id}')">
        <div class="member-card-rank ${rankClass(rank)}">${rankIcon(rank)}</div>
        <span class="member-av">${initials(m.name)}</span>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <span class="member-name">${esc(m.name)}</span>
            <span class="member-cnt">${memberDone}/${total} · ${pct}%</span>
          </div>
          <div class="member-prog"><div class="member-prog-fill" style="width:${pct}%"></div></div>
        </div>
        <span class="member-card-arrow${isOpen?' open':''}" id="mc-arrow-${m.id}">▼</span>
      </div>
      <div class="member-card-body${isOpen?' open':''}" id="mc-body-${m.id}">
        ${activeTasks.length
          ? activeTasks.map((t,i) => memberTaskCard(t, m, i)).join('')
          : '<div class="empty" style="padding:8px 0 4px;font-size:12px">No active tasks</div>'}
        ${doneSection}
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function memberTaskCard(t, member, i) {
  const mData = (t.members||[]).find(mm => mm.id === member.id);
  const respTask = mData?.role || '';
  const pc = {critical:'pc',high:'ph',medium:'pm',low:'pl'}[t.priority||'medium'];
  const memberStatus = getMemberStatus(t, member.id);
  const stTag = {todo:'t-todo',inprog:'t-ip',done:'t-done'}[memberStatus];
  const stLbl = {todo:'Todo',inprog:'In Progress',done:'Done'}[memberStatus];
  const isDone = memberStatus === 'done';
  const statusClass = isDone ? 'status-done' : t.status === 'inprog' ? 'status-inprog' : '';

  // Show button if: this is your own card, OR you are the admin
  const isMyCard = MY_NAME && member.name.toLowerCase() === MY_NAME.toLowerCase();
  const isAdmin  = MY_NAME && MY_NAME.toLowerCase() === ADMIN_NAME.toLowerCase();
  const canAct   = isMyCard || isAdmin;

  return `
    <div class="task-card ${pc} ${statusClass}" style="margin-left:12px">
      <div class="tc-title">${esc(t.label)}</div>
      <div class="tc-meta">
        <span class="tag ${stTag}">${stLbl}</span>
        <span class="m-pill" style="display:inline-flex">
          <span class="m-pill-name">Resp. Task</span>
          <span class="m-pill-role">${respTask ? esc(respTask) : 'Not set'}</span>
        </span>
      </div>
      ${canAct ? `
      <div class="tc-actions">
        <button class="mark-done-btn${isDone?' undone':''}"
          onclick="setMemberStatusWindow('${t.id}','${member.id}','${isDone?'todo':'done'}')">
          ${isDone ? '↩ Reopen Resp. Task' : '✓ Resp. Task Done'}
        </button>
      </div>` : ''}
    </div>`;
}

// ── FOLLOW-UP ──────────────────────────────────────────────────────────────
function renderFollowup() {
  const el = document.getElementById('followup-list');
  const others = MY_NAME
    ? members.filter(m => m.name.toLowerCase() !== MY_NAME.toLowerCase())
    : members;
  if (!others.length) { el.innerHTML = '<div class="empty"><div class="ei">◈</div>No other team members</div>'; return; }
  let html = '';
  others.forEach(m => {
    const allT = tasks.filter(t => (t.members||[]).some(mm => mm.id === m.id));
    const working = allT.filter(t => getMemberStatus(t,m.id) === 'inprog');
    const todo = allT.filter(t => getMemberStatus(t,m.id) === 'todo').slice(0,2);
    const memberDone = allT.filter(t => getMemberStatus(t,m.id) === 'done').length;
    const pct = allT.length ? Math.round(memberDone/allT.length*100) : 0;
    if (!allT.length) return;
    html += `<div class="fu-card">
      <div class="fu-person">
        <span class="fu-av">${initials(m.name)}</span>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="fu-name">${esc(m.name)}</span>
            <span style="font-size:12px;font-weight:600;color:var(--text3)">${memberDone}/${allT.length} done</span>
          </div>
          <div class="member-prog" style="margin-top:5px"><div class="member-prog-fill" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    if (working.length) {
      html += `<div class="fu-section-label" style="color:var(--amber)">● Working on now</div>`;
      working.forEach(t => {
        const mData=(t.members||[]).find(mm=>mm.id===m.id);
        const isDone = getMemberStatus(t,m.id)==='done';
        html += `<div class="fu-task-row">
          <div class="fu-task-name">${esc(t.label)}</div>
          <div class="fu-task-role">Resp. Task: ${mData?.role ? esc(mData.role) : 'Not set'}</div>
          <div class="fu-task-actions">
            <button class="mark-done-btn${isDone?' undone':''}"
              onclick="setMemberStatusWindow('${t.id}','${m.id}','${isDone?'todo':'done'}')">
              ${isDone?'↩ Reopen':'✓ Mark Done'}
            </button>
          </div>
        </div>`;
      });
    }
    if (todo.length) {
      html += `<div class="fu-section-label" style="color:var(--text2);margin-top:10px">Next up</div>`;
      todo.forEach(t => {
        const mData=(t.members||[]).find(mm=>mm.id===m.id);
        html += `<div class="fu-task-row" style="border-left-color:var(--text3);opacity:.7">
          <div class="fu-task-name">${esc(t.label)}</div>
          <div class="fu-task-role">Resp. Task: ${mData?.role ? esc(mData.role) : 'Not set'}</div>
        </div>`;
      });
    }
    html += `</div>`;
  });
  el.innerHTML = html || '<div class="empty"><div class="ei">✓</div>No active tasks for teammates</div>';
}

// ── HELPER: get member's individual status ─────────────────────────────────
function getMemberStatus(task, memberId) {
  if (task.memberStatus && task.memberStatus[memberId] !== undefined) {
    return task.memberStatus[memberId];
  }
  return task.status || 'todo';
}

// ── UPDATE member's individual status ─────────────────────────────────────
async function setMemberStatus(taskId, memberId, newStatus) {
  const t = tasks.find(t => t.id === taskId); if (!t) return;
  if (!t.memberStatus) t.memberStatus = {};
  t.memberStatus[memberId] = newStatus;
  const memberIds = (t.members||[]).map(m => m.id);
  const allDone = memberIds.length > 0 && memberIds.every(id => (t.memberStatus[id]||'todo') === 'done');
  let overallStatus;
  if (allDone) { overallStatus = 'done'; }
  else if (t.status === 'done') { overallStatus = 'inprog'; }
  else { overallStatus = t.status || 'todo'; }
  t.status = overallStatus;
  const updates = { status: overallStatus };
  updates[`memberStatus.${memberId}`] = newStatus;
  await updateTask(taskId, updates);
  renderAll();
  if (allDone) {
    playTimerDone(); launchConfetti();
    toast('🎉 All done! Task complete!');
    recordTaskCompletion().then(s => { streakData = s; renderGreeting(); });
  } else if (newStatus === 'done') {
    playMarkDone(); launchConfetti();
    toast('✓ Your part is done!');
    recordTaskCompletion().then(s => { streakData = s; renderGreeting(); });
  } else { playReopen(); toast('↩ Reopened'); }
}

// ── CYCLE OVERALL (todo ↔ inprog only) ────────────────────────────────────
window.cycleOverall = async (id) => {
  const t = tasks.find(t => t.id === id); if (!t) return;
  if (t.status === 'done') return;
  const next = t.status === 'todo' ? 'inprog' : 'todo';
  t.status = next;
  await updateTask(id, {status: next});
  renderAll(); toast(next === 'inprog' ? 'Marked in progress' : 'Moved back to Todo');
};

window.setMemberStatusWindow = (taskId, memberId, newStatus) => {

// ── TIMER ──────────────────────────────────────────────────────────────────
// Persists to localStorage so switching pages never resets the timer.
let tTotal=45*60, tLeft=45*60, tRunning=false, tInterval=null;
const pad = n => String(n).padStart(2,'0');
const fmtTime = s => pad(Math.floor(s/60))+':'+pad(s%60);

// Save full timer state + wall-clock timestamp
function saveTimer() {
  localStorage.setItem('wd_timer', JSON.stringify({
    total: tTotal, left: tLeft, running: tRunning,
    savedAt: tRunning ? Date.now() : null
  }));
}

// Restore timer state on page load, correcting for time elapsed away
function loadTimer() {
  try {
    const raw = localStorage.getItem('wd_timer');
    if (!raw) return;
    const s = JSON.parse(raw);
    tTotal = s.total || 45*60;
    tLeft  = s.left  || tTotal;
    if (s.running && s.savedAt) {
      const elapsed = Math.floor((Date.now() - s.savedAt) / 1000);
      tLeft = Math.max(0, tLeft - elapsed);
      tRunning = tLeft > 0;
      if (tLeft === 0) { tRunning = false; playTimerDone(); }
    }
  } catch(e) {}
}

loadTimer(); // restore before first render

function updateTimerUI() {
  const d   = document.getElementById('t-disp');
  const s   = document.getElementById('t-st');
  const clk = document.getElementById('t-clock');
  const ctl = document.getElementById('t-controls');
  const pre = document.getElementById('t-presets-row');
  const tog = document.getElementById('t-toggle');
  d.textContent = fmtTime(tLeft);
  if (!tRunning) {
    d.className = 'timer-slim-digits';
    s.textContent = tLeft === 0 ? 'Done! ✓' : 'Ready';
    clk.classList.remove('big'); ctl.classList.remove('small');
    pre.style.display = '';
    if(tog){ tog.className='t-btn t-go';
      tog.textContent = (tLeft>0 && tLeft<tTotal) ? '▶ Resume' : '▶ Start'; }
  } else if (tLeft <= 60) {
    d.className = 'timer-slim-digits end'; s.textContent = 'Ending!';
    clk.classList.add('big'); ctl.classList.add('small');
    pre.style.display = 'none';
    if(tog){ tog.className='t-btn t-pa'; tog.textContent='⏸ Pause'; }
  } else {
    d.className = 'timer-slim-digits run'; s.textContent = 'Running';
    clk.classList.add('big'); ctl.classList.add('small');
    pre.style.display = 'none';
    if(tog){ tog.className='t-btn t-pa'; tog.textContent='⏸ Pause'; }
  }
}

let tStartedAt = null; // wall-clock time when timer was last started/resumed

function startTick() {
  tStartedAt = Date.now();
  const leftAtStart = tLeft;
  tInterval = setInterval(() => {
    // Use wall-clock elapsed time — survives phone lock / tab throttle
    const elapsed = Math.floor((Date.now() - tStartedAt) / 1000);
    tLeft = Math.max(0, leftAtStart - elapsed);
    if (tLeft <= 0) {
      tLeft = 0;
      clearInterval(tInterval); tRunning = false;
      saveTimer(); updateTimerUI(); playTimerDone(); return;
    }
    updateTimerUI();
    // Save every 5s to avoid excessive localStorage writes
    if (elapsed % 5 === 0) saveTimer();
  }, 1000);
}

// When app comes back from background/lock, resync the timer immediately
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && tRunning && tStartedAt) {
    const elapsed = Math.floor((Date.now() - tStartedAt) / 1000);
    const leftAtStart = parseInt(localStorage.getItem('wd_timer_left') || tLeft);
    tLeft = Math.max(0, leftAtStart - elapsed);
    if (tLeft <= 0) {
      tLeft = 0;
      clearInterval(tInterval); tRunning = false;
      playTimerDone();
    }
    updateTimerUI();
  }
});

// If timer was running when we left, resume the interval
if (tRunning) startTick();

window.setPreset = (mins, btn) => {
  clearInterval(tInterval); tRunning = false;
  tTotal = mins*60; tLeft = tTotal;
  document.querySelectorAll('.t-pre').forEach(b => b.classList.remove('ap'));
  btn.classList.add('ap');
  document.getElementById('t-custom').value = '';
  saveTimer(); updateTimerUI();
};
window.setCustom = () => {
  const v = parseInt(document.getElementById('t-custom').value);
  if (!v || v < 1) return;
  clearInterval(tInterval); tRunning = false;
  tTotal = v*60; tLeft = tTotal;
  document.querySelectorAll('.t-pre').forEach(b => b.classList.remove('ap'));
  saveTimer(); updateTimerUI();
};
window.toggleTimer = () => {
  if (tRunning) {
    clearInterval(tInterval); tRunning = false;
    saveTimer(); updateTimerUI(); return;
  }
  if (tLeft === 0) tLeft = tTotal;
  tRunning = true;
  localStorage.setItem('wd_timer_left', tLeft); // snapshot for lock recovery
  saveTimer(); updateTimerUI(); startTick();
};
window.resetTimer = () => {
  clearInterval(tInterval); tRunning = false; tLeft = tTotal;
  document.getElementById('t-clock').classList.remove('big');
  document.getElementById('t-controls').classList.remove('small');
  saveTimer(); updateTimerUI();
};

// Save on tab switch / page close
window.addEventListener('visibilitychange', saveTimer);
window.addEventListener('beforeunload', saveTimer);

// ── NOTES — initialised inside onUserReady (needs MY_NAME + DOM ready) ────
const MAX_NOTES = 500;
let _notesSaveTimer = null;

function initNotes() {
  const nta = document.getElementById('notes-ta');
  if (!nta) return;
  document.getElementById('notes-cnt').textContent = '0 / ' + MAX_NOTES;
  nta.setAttribute('maxlength', MAX_NOTES);

  nta.addEventListener('input', () => {
    if (nta.value.length > MAX_NOTES) nta.value = nta.value.slice(0, MAX_NOTES);
    document.getElementById('notes-cnt').textContent = nta.value.length + ' / ' + MAX_NOTES;
    clearTimeout(_notesSaveTimer);
    _notesSaveTimer = setTimeout(() => {
      if (MY_NAME) saveUserData(MY_NAME, { notes: nta.value });
    }, 1000);
  });

  window.clearNotes = () => {
    if (!confirm('Clear notes?')) return;
    nta.value = '';
    document.getElementById('notes-cnt').textContent = '0 / ' + MAX_NOTES;
    if (MY_NAME) saveUserData(MY_NAME, { notes: '' });
  };

  // Load from Firestore and set up live sync
  if (MY_NAME) {
    getUserData(MY_NAME).then(data => {
      if (data.notes !== undefined) {
        nta.value = data.notes || '';
        document.getElementById('notes-cnt').textContent = nta.value.length + ' / ' + MAX_NOTES;
      }
    });

    // Live listener — updates from other devices
    onUserDataChanged(MY_NAME, (data) => {
      if (document.activeElement !== nta && data.notes !== undefined) {
        nta.value = data.notes || '';
        document.getElementById('notes-cnt').textContent = nta.value.length + ' / ' + MAX_NOTES;
      }
    });
  }
}

// FEATURE 1: GREETING + STREAK
// ═══════════════════════════════════════════════════════
let streakData = { currentStreak: 0 };

async function renderGreeting() {
  streakData = await getStreak();
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const name  = MY_NAME ? `, ${MY_NAME}` : '';
  const myTasks  = tasks.filter(t => (t.members||[]).some(m => m.name.toLowerCase() === (MY_NAME||'').toLowerCase()));
  const inprog   = myTasks.filter(t => t.status === 'inprog').length;
  const critical = myTasks.filter(t => t.priority === 'critical' && t.status !== 'done').length;
  let sub = '';
  if (inprog > 0) sub += `${inprog} task${inprog>1?'s':''} in progress`;
  if (critical > 0) sub += `${sub?' · ':''}${critical} critical`;
  if (!sub && myTasks.filter(t=>t.status==='todo').length > 0)
    sub = `${myTasks.filter(t=>t.status==='todo').length} task${myTasks.filter(t=>t.status==='todo').length>1?'s':''} to start`;
  if (!sub) sub = myTasks.length === 0 ? 'No tasks assigned yet' : 'All caught up! 🎉';
  const s = streakData.currentStreak || 0;
  const streakHTML = s > 0
    ? `<div class="streak-badge">🔥 ${s} day streak</div>`
    : `<div class="streak-badge" style="opacity:.4">🔥 0</div>`;
  const el = document.getElementById('greeting-bar');
  if (el) el.innerHTML = `
    <div>
      <div class="greeting-text">${greet}${esc(name)} 👋</div>
      <div class="greeting-sub">${sub}</div>
    </div>
    ${streakHTML}`;
}

function launchConfetti() {
  const wrap = document.createElement('div');

  document.body.appendChild(wrap);
  const colors = ['#00e5b8','#f5a800','#ff3a5e','#9d7eff','#00b4e5','#ffffff'];

    const p = document.createElement('div');

      left:${Math.random()*100}%;

      animation-duration:${0.7+Math.random()*0.6}s;

}

const commentUnsubs = {}; // track active listeners

function renderCommentSection(taskId, container) {
  container.innerHTML = `
    <div class="comment-section">
      <div class="comment-list" id="clist-${taskId}">
        <div style="font-size:11px;color:var(--text3);padding:4px 0">Loading comments...</div>
      </div>
      <div class="comment-input-row" onclick="event.stopPropagation()">
        <input class="comment-inp" id="cinp-${taskId}" placeholder="Add a note..." maxlength="200"
          onclick="event.stopPropagation()"
          onkeydown="if(event.key==='Enter'){event.stopPropagation();submitComment('${taskId}')}">
        <button class="comment-send" onclick="event.stopPropagation();submitComment('${taskId}')">Send</button>
      </div>
    </div>`;

  // Unsubscribe previous listener if any
  if (commentUnsubs[taskId]) { commentUnsubs[taskId](); }
  commentUnsubs[taskId] = onCommentsChanged(taskId, (comments) => {
    const list = document.getElementById('clist-' + taskId);
    if (!list) return;
    if (!comments.length) {
      list.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:4px 0">No comments yet</div>';
      return;
    }
    list.innerHTML = comments.map(cm => {
      const ts = cm.createdAt?.toDate ? cm.createdAt.toDate().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      const edited = cm.editedAt ? ' · edited' : '';
      const canEdit = MY_NAME && cm.author && cm.author.toLowerCase() === MY_NAME.toLowerCase();
      return `<div class="comment-item" id="ci-${cm.id}">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="comment-author">${esc(cm.author||'Unknown')}</div>
          ${canEdit ? `<button class="comment-edit-btn" onclick="startEditComment('${taskId}','${cm.id}',this)" title="Edit">✎ Edit</button>` : ''}
        </div>
        <div class="comment-text" id="ct-${cm.id}">${esc(cm.text)}</div>
        <div class="comment-time">${ts}${edited}</div>
      </div>`;
    }).join('');
    list.scrollTop = list.scrollHeight;
  });
}

window.startEditComment = (taskId, commentId, btn) => {
  const textEl = document.getElementById('ct-' + commentId);
  if (!textEl) return;
  const currentText = textEl.textContent;
  // Replace text div with inline input
  textEl.style.display = 'none';
  btn.style.display = 'none';
  const editRow = document.createElement('div');
  editRow.className = 'comment-edit-row';
  editRow.id = 'ce-' + commentId;
  editRow.innerHTML = `
    <input class="comment-edit-inp" id="cei-${commentId}" value="${currentText.replace(/"/g,'&quot;')}" maxlength="200">
    <button class="comment-edit-save" onclick="saveEditComment('${taskId}','${commentId}')">Save</button>
    <button class="comment-edit-cancel" onclick="cancelEditComment('${commentId}')">Cancel</button>
  `;
  textEl.parentNode.insertBefore(editRow, textEl.nextSibling);
  const inp = document.getElementById('cei-' + commentId);
  if (inp) { inp.focus(); inp.select(); }
};

window.cancelEditComment = (commentId) => {
  const textEl = document.getElementById('ct-' + commentId);
  const editRow = document.getElementById('ce-' + commentId);
  const btn = document.querySelector(`#ci-${commentId} .comment-edit-btn`);
  if (textEl) textEl.style.display = '';
  if (editRow) editRow.remove();
  if (btn) btn.style.display = '';
};

window.saveEditComment = async (taskId, commentId) => {
  const inp = document.getElementById('cei-' + commentId);
  if (!inp) return;
  const newText = inp.value.trim();
  if (!newText) return;
  await updateComment(taskId, commentId, newText);
  // The onCommentsChanged listener will re-render automatically
};

window.submitComment = async (taskId) => {
  const inp = document.getElementById('cinp-' + taskId);
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  await addComment(taskId, MY_NAME || 'Anonymous', text);
};

// Check reminders every minute
function scheduleReminderCheck() {
  setInterval(checkReminders, 60000);
}
scheduleReminderCheck();

function checkReminders() {
  const now = new Date();
  const nowStr = now.toISOString().slice(0,16); // YYYY-MM-DDTHH:MM
  tasks.forEach(t => {
    if (!t.reminder?.active) return;
    const reminderDT = `${t.reminder.date}T${t.reminder.time}`;
    if (reminderDT <= nowStr) {
      showReminderAlert(t);
    }
  });
}

function showReminderAlert(t) {
  // Play sound
  playTaskAssigned();
  // Show toast with snooze option
  const el = document.getElementById('toast');
  el.innerHTML = `🔔 Reminder: <strong>${esc(t.label)}</strong>
    <button onclick="openReminderModal('${t.id}')" style="margin-left:8px;background:none;border:1px solid currentColor;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:11px;color:inherit">Snooze</button>
    <button onclick="dismissReminder('${t.id}')" style="margin-left:4px;background:none;border:1px solid currentColor;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:11px;color:inherit">Dismiss</button>`;
  el.className = 'toast show';
  el.style.maxWidth = '320px';
  // Don't auto-hide reminder toasts
}

// ═══════════════════════════════════════════════════════
// FEATURE 5: PULL TO REFRESH
// ═══════════════════════════════════════════════════════
(function initPullToRefresh() {
  let startY = 0, pulling = false;
  const indicator = document.getElementById('ptr-indicator');
  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 60) { if (indicator) indicator.classList.add('visible'); }
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    if (indicator) indicator.classList.remove('visible');
    if (dy > 80) {
      toast('Refreshing...');
      // The real-time listener already keeps tasks live,
      // but we reload members and re-render for a clean refresh feel
      getMembers().then(m => { members = m; renderAll(); renderGreeting(); toast('✓ Refreshed'); });
    }
  });
})();

function set(id,val){const el=document.getElementById(id);if(el)el.textContent=val}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type;
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2400);
}

updateTimerUI();
