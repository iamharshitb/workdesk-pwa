<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">

  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WorkDesk — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#07090f">
  <style>
    /* ── TASK CARD STATUS COLORS ── */
    .task-card.status-inprog {
      background: rgba(245,168,0,.07);
      border-color: rgba(245,168,0,.35);
      box-shadow: 0 0 0 1px rgba(245,168,0,.1), 0 4px 16px rgba(245,168,0,.08);
    }
    .task-card.status-done {
      background: rgba(0,229,184,.05);
      border-color: rgba(0,229,184,.2);
      opacity: .55;
    }

    /* ── SLIM TIMER — clock expands to 2/3, controls shrink to 1/3 ── */
    .timer-slim {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      transition: all .35s ease;
    }
    .timer-slim-clock {
      flex: 1;
      text-align: center;
      transition: flex .35s ease;
    }
    .timer-slim-clock.big { flex: 2; }
    .timer-slim-digits {
      font-family: var(--sans);
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--text);
      line-height: 1;
      transition: font-size .35s ease, color .25s;
    }
    .timer-slim-clock.big .timer-slim-digits { font-size: 58px; }
    .timer-slim-digits.run { color: var(--neon); }
    .timer-slim-digits.end { color: var(--red); animation: blink .7s infinite alternate; }
    @keyframes blink { to { opacity:.2 } }
    .timer-slim-st {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 4px;
      transition: color .25s;
    }
    .timer-slim-clock.big .timer-slim-st { color: var(--neon); }
    .timer-slim-controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
      transition: flex .35s ease;
      overflow: hidden;
    }
    .timer-slim-controls.small { flex: 0.5; }
    .timer-slim-presets { display: flex; gap: 6px; }
    .timer-slim-presets .t-pre { flex: 1; padding: 7px 2px; font-size: 13px; white-space: nowrap; overflow: hidden; }
    .timer-slim-btns { display: flex; gap: 6px; }
    .timer-slim-btns .t-btn { flex: 1; padding: 9px 4px; font-size: 13px; }

    /* ── STATS FILTER ── */
    .stat-pill {
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .stat-pill:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.3); }
    .stat-pill.active-filter { border-color: var(--neon) !important; box-shadow: 0 0 0 2px rgba(0,229,184,.15); }

    /* ── COMPACT TASK ROW ── */
    .task-row-compact {
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;
      border-radius:12px;margin-bottom:6px;
      border:1px solid var(--border2);
      background:var(--bg2);
      cursor:pointer;
      transition:all .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .task-row-compact:hover { border-color:var(--neon2);background:var(--bg3); }
    .task-row-compact.status-inprog {
      background:rgba(245,168,0,.06);border-color:rgba(245,168,0,.28);
    }
    .task-row-compact.status-done { opacity:.5; }
    .trc-left { flex:1;min-width:0; }
    .trc-name {
      font-size:14px;font-weight:700;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      margin-bottom:4px;
    }
    .trc-meta { display:flex;align-items:center;gap:5px;flex-wrap:wrap; }
    .trc-members {
      font-size:11px;color:var(--text2);font-weight:600;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      max-width:160px;
    }
    .trc-expand {
      flex-shrink:0;width:28px;height:28px;border-radius:50%;
      border:1px solid var(--border2);background:var(--bg3);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;color:var(--text2);transition:all .2s;
      cursor:pointer;
    }
    .trc-expand.open { transform:rotate(180deg);border-color:var(--neon);color:var(--neon); }
    /* Expanded detail panel */
    .task-detail {
      display:none;
      margin-bottom:8px;margin-top:-2px;
      padding:12px 14px;
      border-radius:0 0 12px 12px;
      border:1px solid var(--border2);border-top:none;
      background:var(--bg3);
      animation:sld .18s ease;
    }
    .task-detail.open { display:block; }

    /* ── FILTER BANNER ── */
    .filter-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(0,229,184,.06);
      border: 1px solid rgba(0,229,184,.2);
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--neon);
    }
    .filter-clear {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--sans);
      padding: 2px 6px;
      border-radius: 6px;
    }
    .filter-clear:hover { color: var(--red); }
  </style>
</head>

<div id="page-loader"><span class="loader"></span>Loading...</div>

<div class="page" id="main" style="display:none">

  <!-- SLIM TIMER — at top -->
  <div class="panel fi" style="animation-delay:.02s">
    <div class="panel-hd"><span class="panel-title">Focus Timer</span></div>
    <div class="timer-slim">
      <div class="timer-slim-clock" id="t-clock">
        <div class="timer-slim-digits" id="t-disp">45:00</div>
        <div class="timer-slim-st" id="t-st">Ready</div>
      </div>
      <div class="timer-slim-controls" id="t-controls">
        <div class="timer-slim-presets" id="t-presets-row">
          <button class="t-pre" onclick="setPreset(30,this)">30m</button>
          <button class="t-pre ap" onclick="setPreset(45,this)">45m</button>
          <input class="t-ci" type="number" id="t-custom" placeholder="mm" min="1" max="300" onchange="setCustom()" style="width:52px;flex-shrink:0">
        </div>
        <div class="timer-slim-btns">
          <button class="t-btn t-go" id="t-toggle" onclick="toggleTimer()">▶ Start</button>
          <button class="t-btn t-rst" onclick="resetTimer()">↺ Reset</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS — clickable filters -->
  <div class="stats-row fi" style="animation-delay:.05s">
    <div class="stat-pill" id="sp-total" onclick="filterTasks('total')">
      <div class="stat-n sn-b" id="s-total">0</div><div class="stat-l">Total</div>
    </div>
    <div class="stat-pill" id="sp-inprog" onclick="filterTasks('inprog')">
      <div class="stat-n sn-a" id="s-inprog">0</div><div class="stat-l">In Prog</div>
    </div>
    <div class="stat-pill" id="sp-done" onclick="filterTasks('done')">
      <div class="stat-n sn-g" id="s-done">0</div><div class="stat-l">Done</div>
    </div>
    <div class="stat-pill" id="sp-crit" onclick="filterTasks('critical')">
      <div class="stat-n sn-r" id="s-crit">0</div><div class="stat-l">Critical</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="prog-wrap fi" style="animation-delay:.08s">
    <div class="prog-top">
      <span class="prog-label">Overall Progress</span>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <!-- TASK TABS -->
  <div class="panel fi" style="animation-delay:.11s">
    <div class="panel-hd"><span class="panel-title">Task Tracker</span></div>
    <div class="panel-body">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('mytasks',this)">My Tasks</button>
        <button class="tab" onclick="switchTab('bymember',this)">By Member</button>
        <button class="tab" onclick="switchTab('followup',this)">Follow-up</button>
      </div>
      <div id="tab-mytasks"><div id="my-tasks-list"></div></div>
      <div id="tab-bymember" style="display:none"><div id="by-member-list"></div></div>
      <div id="tab-followup" style="display:none"><div id="followup-list"></div></div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="panel fi" style="animation-delay:.15s">
    <div class="panel-hd"><span class="panel-title">Quick Notes</span></div>
    <div class="panel-body">
      <textarea class="notes-ta" id="notes-ta" placeholder="Scratch pad — type anything..."></textarea>
      <div class="notes-foot">
        <span class="notes-cnt" id="notes-cnt">0 chars</span>
        <button class="notes-clr" onclick="clearNotes()">Clear</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script type="module">
import { onUserReady, onTasksChanged, getMembers, updateTask } from './js/firebase.js';
import { initTheme, toggleThemePanel } from './js/theme.js';
import { initAudio, playTimerDone, playTaskAssigned, playMarkDone, playReopen, toggleMute, getMuted } from './js/sounds.js';

let tasks = [], members = [];
let MY_NAME = localStorage.getItem('wd_myname') || '';
let activeFilter = null; // 'total'|'inprog'|'done'|'critical'|null

// Theme handled by theme.js
initTheme();
window.toggleThemePanel = toggleThemePanel;
initAudio();

// Mute button init
function updateMuteBtn() {
  const btn = document.getElementById('mute-btn');
  if (btn) btn.textContent = getMuted() ? '🔇' : '🔊';
}
window.handleMuteToggle = () => { toggleMute(); updateMuteBtn(); };
updateMuteBtn();

// BOOTSTRAP
onUserReady(async () => {
  // Ask for name first (before listener fires so renderAll has MY_NAME)
  if (!MY_NAME) {
    MY_NAME = prompt('Your name (to show your tasks):') || '';
    if (MY_NAME) localStorage.setItem('wd_myname', MY_NAME);
  }

  // Load members once (they don't change often)
  members = await getMembers();

  // Real-time task listener — fires immediately + on every change
  onTasksChanged(({ tasks: liveTasks, changes }) => {
    tasks = liveTasks;

    // Check for newly added tasks that include this user
    changes.forEach(({ type, task }) => {
      if (type === 'added') {
        const assignedToMe = MY_NAME &&
          (task.members || []).some(m => m.name.toLowerCase() === MY_NAME.toLowerCase());
        if (assignedToMe) {
          playTaskAssigned();
          toast('📋 New task assigned to you!');
        }
      }
      if (type === 'modified') {
        // If a task just became done and you're assigned, play a chime
        const assignedToMe = MY_NAME &&
          (task.members || []).some(m => m.name.toLowerCase() === MY_NAME.toLowerCase());
        if (assignedToMe && task.status === 'done') {
          // Only play if it wasn't done before (avoid re-playing on unrelated updates)
          const prev = tasks.find(t => t.id === task.id);
          if (prev && prev.status !== 'done') playTimerDone();
        }
      }
    });

    renderAll();

    // Show main content on first load
    const loader = document.getElementById('page-loader');
    if (loader) {
      loader.style.display = 'none';
      document.getElementById('main').style.display = '';
    }
  });
});

function renderAll() { renderStats(); renderMyTasks(); renderByMember(); renderFollowup(); }

// ── STATS FILTER ───────────────────────────────────────────────────────────
window.filterTasks = (type) => {
  if (activeFilter === type) {
    // toggle off
    activeFilter = null;
    document.querySelectorAll('.stat-pill').forEach(p => p.classList.remove('active-filter'));
  } else {
    activeFilter = type;
    document.querySelectorAll('.stat-pill').forEach(p => p.classList.remove('active-filter'));
    document.getElementById('sp-' + (type === 'critical' ? 'crit' : type === 'total' ? 'total' : type)).classList.add('active-filter');
  }
  // Switch to My Tasks tab to show filtered results
  switchTab('mytasks', document.querySelector('.tab'));
  renderMyTasks();
};

window.clearFilter = () => {
  activeFilter = null;
  document.querySelectorAll('.stat-pill').forEach(p => p.classList.remove('active-filter'));
  renderMyTasks();
};

// ── STATS ──────────────────────────────────────────────────────────────────
function renderStats() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const inprog = tasks.filter(t => t.status === 'inprog').length;
  const crit = tasks.filter(t => t.priority === 'critical' && t.status !== 'done').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  set('s-total', total); set('s-inprog', inprog); set('s-done', done); set('s-crit', crit);
  set('prog-pct', pct + '%');
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ── MY TASKS ───────────────────────────────────────────────────────────────
function renderMyTasks() {
  const el = document.getElementById('my-tasks-list');

  // Get base task list — if filter active show ALL tasks in that filter, not just mine
  let taskList;
  if (activeFilter && activeFilter !== 'total') {
    // Show all tasks matching the filter (not just assigned to me)
    if (activeFilter === 'inprog') taskList = tasks.filter(t => t.status === 'inprog');
    else if (activeFilter === 'done') taskList = tasks.filter(t => t.status === 'done');
    else if (activeFilter === 'critical') taskList = tasks.filter(t => t.priority === 'critical' && t.status !== 'done');
  } else if (activeFilter === 'total') {
    taskList = [...tasks];
  } else {
    // Default: only my tasks
    taskList = MY_NAME
      ? tasks.filter(t => (t.members||[]).some(m => m.name.toLowerCase() === MY_NAME.toLowerCase()))
      : tasks;
  }

  // Filter banner
  const filterLabels = { total: 'All Tasks', inprog: 'In Progress', done: 'Done', critical: 'Critical' };
  const banner = activeFilter
    ? `<div class="filter-banner">
        Showing: ${filterLabels[activeFilter]} (${taskList.length})
        <button class="filter-clear" onclick="clearFilter()">✕ Clear</button>
       </div>`
    : '';

  if (!taskList.length) {
    el.innerHTML = banner + `<div class="empty"><div class="ei">◈</div>${activeFilter ? 'No tasks in this category' : MY_NAME ? 'No tasks assigned to you yet' : 'No tasks yet'}</div>`;
    return;
  }

  const po = {critical:0,high:1,medium:2,low:3}, so = {inprog:0,todo:1,done:2};
  const sorted = [...taskList].sort((a,b) => (so[a.status]??1)-(so[b.status]??1)||(po[a.priority]??2)-(po[b.priority]??2));
  el.innerHTML = banner + sorted.map((t,i) => myTaskCard(t, i)).join('');
}

// Track which task rows are expanded
const expandedTasks = new Set();

window.toggleTaskExpand = (id) => {
  if (expandedTasks.has(id)) expandedTasks.delete(id);
  else expandedTasks.add(id);
  // Toggle classes without full re-render
  const row = document.getElementById('trc-' + id);
  const detail = document.getElementById('trd-' + id);
  const btn = document.getElementById('trx-' + id);
  if (!row || !detail || !btn) return;
  const isOpen = expandedTasks.has(id);
  detail.classList.toggle('open', isOpen);
  btn.classList.toggle('open', isOpen);
};

function myTaskCard(t, i) {
  const pc = {critical:'pc',high:'ph',medium:'pm',low:'pl'}[t.priority||'medium'];
  const pTag = {critical:'t-crit',high:'t-high',medium:'t-med',low:'t-low'}[t.priority||'medium'];
  const stTag = {todo:'t-todo',inprog:'t-ip',done:'t-done'}[t.status||'todo'];
  const stLbl = {todo:'Todo',inprog:'In Progress',done:'Done'}[t.status||'todo'];
  const isDone = t.status === 'done';
  const isInprog = t.status === 'inprog';
  const statusClass = isDone ? 'status-done' : isInprog ? 'status-inprog' : '';
  const isExpanded = expandedTasks.has(t.id);

  const myMemberData = (t.members||[]).find(m => m.name.toLowerCase() === (MY_NAME||'').toLowerCase());
  const myRespTask = myMemberData?.role || '';
  const myMemberId = myMemberData ? members.find(m => m.name.toLowerCase() === (MY_NAME||'').toLowerCase())?.id : null;
  const myStatus = myMemberId ? getMemberStatus(t, myMemberId) : t.status;
  const myIsDone = myStatus === 'done';
  const others = (t.members||[]).filter(m => m.name.toLowerCase() !== (MY_NAME||'').toLowerCase());
  const allNames = ['You', ...others.map(m => esc(m.name))].join(', ');
  // Left accent color based on priority
  const accentColor = {critical:'var(--red)',high:'var(--amber)',medium:'var(--neon2)',low:'var(--text3)'}[t.priority||'medium'];

  return `
    <div style="animation-delay:${i*.03}s" class="fi">
      <!-- COMPACT ROW -->
      <div class="task-row-compact ${statusClass}" id="trc-${t.id}"
        onclick="toggleTaskExpand('${t.id}')"
        style="border-left:3px solid ${accentColor}">
        <div class="trc-left">
          <div class="trc-name">${esc(t.label)}</div>
          <div class="trc-meta">
            <span class="tag ${pTag}" style="font-size:9px;padding:2px 6px">${t.priority||'medium'}</span>
            <span class="tag ${stTag}" style="font-size:9px;padding:2px 6px">${stLbl}</span>
            <span class="trc-members">· ${allNames}</span>
          </div>
        </div>
        <div class="trc-expand${isExpanded?' open':''}" id="trx-${t.id}">▾</div>
      </div>

      <!-- EXPANDED DETAIL -->
      <div class="task-detail${isExpanded?' open':''}" id="trd-${t.id}">
        <div class="tc-members" style="margin-bottom:10px">
          <span class="m-pill">
            <span class="m-pill-name">You${myIsDone?' ✓':''}</span>
            <span class="m-pill-role">${myRespTask ? esc(myRespTask) : 'No resp. task set'}</span>
          </span>
          ${others.map(m => {
            const otherId = members.find(mm => mm.name.toLowerCase() === m.name.toLowerCase())?.id;
            const otherDone = otherId ? getMemberStatus(t, otherId) === 'done' : false;
            return `<span class="m-pill" style="${otherDone?'opacity:.6':''}">
              <span class="m-pill-name">${esc(m.name)}${otherDone?' ✓':''}</span>
              <span class="m-pill-role">${m.role ? esc(m.role) : 'No resp. task set'}</span>
            </span>`;
          }).join('')}
        </div>
        <div class="tc-actions">
          ${!isDone ? `<button class="sc-btn" onclick="event.stopPropagation();cycleOverall('${t.id}')">
            ${t.status === 'todo' ? 'Start →' : 'Back to Todo ↩'}
          </button>` : ''}
          ${myMemberId ? `
          <button class="mark-done-btn${myIsDone?' undone':''}"
            onclick="event.stopPropagation();setMemberStatusWindow('${t.id}','${myMemberId}','${myIsDone?'todo':'done'}')">
            ${myIsDone ? '↩ Reopen My Task' : '✓ My Task Done'}
          </button>` : ''}
        </div>
      </div>
    </div>`;
}

// ── BY MEMBER ──────────────────────────────────────────────────────────────
function renderByMember() {
  const el = document.getElementById('by-member-list');
  if (!members.length) { el.innerHTML = '<div class="empty"><div class="ei">◈</div>No members yet.</div>'; return; }
  let html = '';
  members.forEach(m => {
    const mTasks = tasks.filter(t => (t.members||[]).some(mm => mm.id === m.id));
    const memberDone = mTasks.filter(t => getMemberStatus(t, m.id) === 'done').length;
    const total = mTasks.length;
    const pct = total ? Math.round(memberDone / total * 100) : 0;
    html += `<div class="member-section">
      <div class="member-hd">
        <span class="member-av">${initials(m.name)}</span>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="member-name">${esc(m.name)}</span>
            <span class="member-cnt">${memberDone}/${total} · ${pct}%</span>
          </div>
          <div class="member-prog"><div class="member-prog-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      ${mTasks.length
        ? mTasks.map((t,i) => memberTaskCard(t, m, i)).join('')
        : '<div class="empty" style="padding:12px 0 4px"><div class="ei">·</div>No tasks assigned</div>'}
    </div>`;
  });
  el.innerHTML = html;
}

function memberTaskCard(t, member, i) {
  const mData = (t.members||[]).find(mm => mm.id === member.id);
  const respTask = mData?.role || '';
  const pc = {critical:'pc',high:'ph',medium:'pm',low:'pl'}[t.priority||'medium'];
  const memberStatus = getMemberStatus(t, member.id);
  const stTag = {todo:'t-todo',inprog:'t-ip',done:'t-done'}[memberStatus];
  const stLbl = {todo:'Todo',inprog:'In Progress',done:'Done'}[memberStatus];
  const isDone = memberStatus === 'done';
  const statusClass = isDone ? 'status-done' : t.status === 'inprog' ? 'status-inprog' : '';
  return `
    <div class="task-card ${pc} ${statusClass}" style="margin-left:12px">
      <div class="tc-title">${esc(t.label)}</div>
      <div class="tc-meta">
        <span class="tag ${stTag}">${stLbl}</span>
        <span class="m-pill" style="display:inline-flex">
          <span class="m-pill-name">Resp. Task</span>
          <span class="m-pill-role">${respTask ? esc(respTask) : 'Not set'}</span>
        </span>
      </div>
      <div class="tc-actions">
        <button class="mark-done-btn${isDone?' undone':''}"
          onclick="setMemberStatusWindow('${t.id}','${member.id}','${isDone?'todo':'done'}')">
          ${isDone ? '↩ Reopen Resp. Task' : '✓ Resp. Task Done'}
        </button>
      </div>
    </div>`;
}

// ── FOLLOW-UP ──────────────────────────────────────────────────────────────
function renderFollowup() {
  const el = document.getElementById('followup-list');
  const others = MY_NAME
    ? members.filter(m => m.name.toLowerCase() !== MY_NAME.toLowerCase())
    : members;
  if (!others.length) { el.innerHTML = '<div class="empty"><div class="ei">◈</div>No other team members</div>'; return; }
  let html = '';
  others.forEach(m => {
    const allT = tasks.filter(t => (t.members||[]).some(mm => mm.id === m.id));
    const working = allT.filter(t => getMemberStatus(t,m.id) === 'inprog');
    const todo = allT.filter(t => getMemberStatus(t,m.id) === 'todo').slice(0,2);
    const memberDone = allT.filter(t => getMemberStatus(t,m.id) === 'done').length;
    const pct = allT.length ? Math.round(memberDone/allT.length*100) : 0;
    if (!allT.length) return;
    html += `<div class="fu-card">
      <div class="fu-person">
        <span class="fu-av">${initials(m.name)}</span>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="fu-name">${esc(m.name)}</span>
            <span style="font-size:12px;font-weight:600;color:var(--text3)">${memberDone}/${allT.length} done</span>
          </div>
          <div class="member-prog" style="margin-top:5px"><div class="member-prog-fill" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    if (working.length) {
      html += `<div class="fu-section-label" style="color:var(--amber)">● Working on now</div>`;
      working.forEach(t => {
        const mData=(t.members||[]).find(mm=>mm.id===m.id);
        const isDone = getMemberStatus(t,m.id)==='done';
        html += `<div class="fu-task-row">
          <div class="fu-task-name">${esc(t.label)}</div>
          <div class="fu-task-role">Resp. Task: ${mData?.role ? esc(mData.role) : 'Not set'}</div>
          <div class="fu-task-actions">
            <button class="mark-done-btn${isDone?' undone':''}"
              onclick="setMemberStatusWindow('${t.id}','${m.id}','${isDone?'todo':'done'}')">
              ${isDone?'↩ Reopen':'✓ Mark Done'}
            </button>
          </div>
        </div>`;
      });
    }
    if (todo.length) {
      html += `<div class="fu-section-label" style="color:var(--text2);margin-top:10px">Next up</div>`;
      todo.forEach(t => {
        const mData=(t.members||[]).find(mm=>mm.id===m.id);
        html += `<div class="fu-task-row" style="border-left-color:var(--text3);opacity:.7">
          <div class="fu-task-name">${esc(t.label)}</div>
          <div class="fu-task-role">Resp. Task: ${mData?.role ? esc(mData.role) : 'Not set'}</div>
        </div>`;
      });
    }
    html += `</div>`;
  });
  el.innerHTML = html || '<div class="empty"><div class="ei">✓</div>No active tasks for teammates</div>';
}

// ── HELPER: get member's individual status ─────────────────────────────────
function getMemberStatus(task, memberId) {
  if (task.memberStatus && task.memberStatus[memberId] !== undefined) {
    return task.memberStatus[memberId];
  }
  return task.status || 'todo';
}

// ── UPDATE member's individual status ─────────────────────────────────────
async function setMemberStatus(taskId, memberId, newStatus) {
  const t = tasks.find(t => t.id === taskId); if (!t) return;
  if (!t.memberStatus) t.memberStatus = {};
  t.memberStatus[memberId] = newStatus;
  const memberIds = (t.members||[]).map(m => m.id);
  const allDone = memberIds.length > 0 && memberIds.every(id => (t.memberStatus[id]||'todo') === 'done');
  let overallStatus;
  if (allDone) { overallStatus = 'done'; }
  else if (t.status === 'done') { overallStatus = 'inprog'; }
  else { overallStatus = t.status || 'todo'; }
  t.status = overallStatus;
  const updates = { status: overallStatus };
  updates[`memberStatus.${memberId}`] = newStatus;
  await updateTask(taskId, updates);
  renderAll();
  if (allDone) { playTimerDone(); toast('🎉 All done! Task complete!'); }
  else if (newStatus === 'done') { playMarkDone(); toast('✓ Your part is done!'); }
  else { playReopen(); toast('↩ Reopened'); }
}

// ── CYCLE OVERALL (todo ↔ inprog only) ────────────────────────────────────
window.cycleOverall = async (id) => {
  const t = tasks.find(t => t.id === id); if (!t) return;
  if (t.status === 'done') return;
  const next = t.status === 'todo' ? 'inprog' : 'todo';
  t.status = next;
  await updateTask(id, {status: next});
  renderAll(); toast(next === 'inprog' ? 'Marked in progress' : 'Moved back to Todo');
};

window.setMemberStatusWindow = (taskId, memberId, newStatus) => {
  setMemberStatus(taskId, memberId, newStatus);
};

// ── TABS ───────────────────────────────────────────────────────────────────
window.switchTab = (id, btn) => {
  ['mytasks','bymember','followup'].forEach(t => document.getElementById('tab-'+t).style.display = t===id?'':'none');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.tab')[0].classList.add('active');
};

// ── TIMER ──────────────────────────────────────────────────────────────────
// Persists to localStorage so switching pages never resets the timer.
let tTotal=45*60, tLeft=45*60, tRunning=false, tInterval=null;
const pad = n => String(n).padStart(2,'0');
const fmtTime = s => pad(Math.floor(s/60))+':'+pad(s%60);

// Save full timer state + wall-clock timestamp
function saveTimer() {
  localStorage.setItem('wd_timer', JSON.stringify({
    total: tTotal, left: tLeft, running: tRunning,
    savedAt: tRunning ? Date.now() : null
  }));
}

// Restore timer state on page load, correcting for time elapsed away
function loadTimer() {
  try {
    const raw = localStorage.getItem('wd_timer');
    if (!raw) return;
    const s = JSON.parse(raw);
    tTotal = s.total || 45*60;
    tLeft  = s.left  || tTotal;
    if (s.running && s.savedAt) {
      const elapsed = Math.floor((Date.now() - s.savedAt) / 1000);
      tLeft = Math.max(0, tLeft - elapsed);
      tRunning = tLeft > 0;
      if (tLeft === 0) { tRunning = false; playTimerDone(); }
    }
  } catch(e) {}
}

loadTimer(); // restore before first render

function updateTimerUI() {
  const d   = document.getElementById('t-disp');
  const s   = document.getElementById('t-st');
  const clk = document.getElementById('t-clock');
  const ctl = document.getElementById('t-controls');
  const pre = document.getElementById('t-presets-row');
  const tog = document.getElementById('t-toggle');
  d.textContent = fmtTime(tLeft);
  if (!tRunning) {
    d.className = 'timer-slim-digits';
    s.textContent = tLeft === 0 ? 'Done! ✓' : 'Ready';
    clk.classList.remove('big'); ctl.classList.remove('small');
    pre.style.display = '';
    if(tog){ tog.className='t-btn t-go';
      tog.textContent = (tLeft>0 && tLeft<tTotal) ? '▶ Resume' : '▶ Start'; }
  } else if (tLeft <= 60) {
    d.className = 'timer-slim-digits end'; s.textContent = 'Ending!';
    clk.classList.add('big'); ctl.classList.add('small');
    pre.style.display = 'none';
    if(tog){ tog.className='t-btn t-pa'; tog.textContent='⏸ Pause'; }
  } else {
    d.className = 'timer-slim-digits run'; s.textContent = 'Running';
    clk.classList.add('big'); ctl.classList.add('small');
    pre.style.display = 'none';
    if(tog){ tog.className='t-btn t-pa'; tog.textContent='⏸ Pause'; }
  }
}

function startTick() {
  tInterval = setInterval(() => {
    if (tLeft <= 0) {
      clearInterval(tInterval); tRunning = false;
      saveTimer(); updateTimerUI(); playTimerDone(); return;
    }
    tLeft--; saveTimer(); updateTimerUI();
  }, 1000);
}

// If timer was running when we left, resume the interval
if (tRunning) startTick();

window.setPreset = (mins, btn) => {
  clearInterval(tInterval); tRunning = false;
  tTotal = mins*60; tLeft = tTotal;
  document.querySelectorAll('.t-pre').forEach(b => b.classList.remove('ap'));
  btn.classList.add('ap');
  document.getElementById('t-custom').value = '';
  saveTimer(); updateTimerUI();
};
window.setCustom = () => {
  const v = parseInt(document.getElementById('t-custom').value);
  if (!v || v < 1) return;
  clearInterval(tInterval); tRunning = false;
  tTotal = v*60; tLeft = tTotal;
  document.querySelectorAll('.t-pre').forEach(b => b.classList.remove('ap'));
  saveTimer(); updateTimerUI();
};
window.toggleTimer = () => {
  if (tRunning) {
    clearInterval(tInterval); tRunning = false;
    saveTimer(); updateTimerUI(); return;
  }
  if (tLeft === 0) tLeft = tTotal;
  tRunning = true;
  saveTimer(); updateTimerUI(); startTick();
};
window.resetTimer = () => {
  clearInterval(tInterval); tRunning = false; tLeft = tTotal;
  document.getElementById('t-clock').classList.remove('big');
  document.getElementById('t-controls').classList.remove('small');
  saveTimer(); updateTimerUI();
};

// Save on tab switch / page close
window.addEventListener('visibilitychange', saveTimer);
window.addEventListener('beforeunload', saveTimer);

// ── NOTES ──────────────────────────────────────────────────────────────────
const nta=document.getElementById('notes-ta');
nta.value=localStorage.getItem('wd_notes')||'';
document.getElementById('notes-cnt').textContent=nta.value.length+' chars';
nta.addEventListener('input',()=>{
  localStorage.setItem('wd_notes',nta.value);
  document.getElementById('notes-cnt').textContent=nta.value.length+' chars';
});
window.clearNotes=()=>{
  if(!confirm('Clear notes?'))return;
  nta.value=''; localStorage.removeItem('wd_notes');
  document.getElementById('notes-cnt').textContent='0 chars';
};

// ── UTILS ───────────────────────────────────────────────────────────────────
function set(id,val){const el=document.getElementById(id);if(el)el.textContent=val}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type;
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2400);
}

updateTimerUI();
